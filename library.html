<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d3a8a">
<meta name="build-version" content="__COMMIT_HASH__">
<title>Library</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/library.css">
</head>
<body>
  <script>
  // Apply the stored library theme before first paint to avoid a flash.
  try {
    var t = localStorage.getItem("library:theme");
    if (t && t !== "dark") document.body.classList.add("theme-" + t);
  } catch (e) {}
  </script>
  <header class="appbar">
    <nav class="crumbs" id="crumbs"></nav>
    <button class="icon-btn" id="searchBtn" aria-label="Search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" aria-label="Theme">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </header>

  <div class="searchrow" id="searchRow">
    <input type="search" id="searchInput" placeholder="Search title, author, tag…" autocomplete="off">
  </div>

  <main class="scroll" id="scroll"></main>

  <div class="backdrop" id="backdrop"></div>
  <section class="sheet" id="sheet" aria-label="Book details"></section>

<script type="module" src="js/library/library.js"></script>
<script type="module">
  import { registerServiceWorker } from './js/core/sw-register.js';
  registerServiceWorker();
</script>
</body>
</html>
