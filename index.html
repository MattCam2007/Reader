<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>RSVP Reader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .reader-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
  }

  .reader {
    width: 100%;
    max-width: 36rem;
  }

  .word-area {
    position: relative;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    padding: 0.45em 0;
  }

  .guide {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 14ch;
    max-width: 92%;
    height: 1px;
    background: rgba(255, 255, 255, 0.18);
    pointer-events: none;
  }
  .guide.top    { top: 0; }
  .guide.bottom { bottom: 0; }

  .word {
    position: relative;
    height: 1em;
    line-height: 1;
  }

  .word span {
    position: absolute;
    top: 0;
    white-space: pre;
    font-variant-ligatures: none;
  }

  .word .before {
    right: calc(65% + 0.5ch);
    text-align: right;
  }

  .word .orp {
    left: 35%;
    transform: translateX(-50%);
    color: #e74c3c;
  }

  .word .after {
    left: calc(35% + 0.5ch);
  }

  .word.break .orp {
    color: rgba(232, 232, 232, 0.3);
  }

  /* ---------- WPM picker ---------- */

  .wpm-bar {
    flex: 0 0 auto;
    padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    user-select: none;
    -webkit-user-select: none;
  }

  .wpm-display {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #cfcfcf;
    font-size: 1.05rem;
    line-height: 1.4;
  }
  .wpm-display .wpm-unit {
    color: rgba(207, 207, 207, 0.55);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-left: 0.3em;
  }

  .strip-wrap {
    position: relative;
    height: 46px;
    margin-top: 0.25rem;
  }

  .wpm-strip {
    position: absolute;
    inset: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    overscroll-behavior: contain;
    touch-action: pan-x;
  }
  .wpm-strip::-webkit-scrollbar { display: none; }

  .wpm-track {
    display: flex;
    align-items: flex-start;
    height: 100%;
  }

  .tick {
    flex: 0 0 18px;
    height: 100%;
    position: relative;
    scroll-snap-align: center;
    cursor: pointer;
  }
  .tick::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 4px;
    width: 1px;
    height: 8px;
    background: rgba(255, 255, 255, 0.22);
    transform: translateX(-50%);
  }
  .tick.major::before {
    height: 14px;
    background: rgba(255, 255, 255, 0.45);
  }
  .tick-label {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: rgba(255, 255, 255, 0.5);
    font-variant-numeric: tabular-nums;
  }

  .wpm-pointer {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e74c3c;
    transform: translateX(-1px);
    pointer-events: none;
    z-index: 2;
    border-radius: 1px;
  }
  .wpm-pointer::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -3px;
    width: 8px;
    height: 8px;
    background: #e74c3c;
    transform: translateX(-50%) rotate(45deg);
  }
</style>
</head>
<body>
  <div class="reader-wrap">
    <main class="reader" aria-label="RSVP reader">
      <div class="word-area">
        <div class="guide top"></div>
        <div class="word" id="word">
          <span class="before" id="before"></span><span class="orp" id="orp"></span><span class="after" id="after"></span>
        </div>
        <div class="guide bottom"></div>
      </div>
    </main>
  </div>

  <div class="wpm-bar" aria-label="Reading speed">
    <div class="wpm-display"><span id="wpmValue">400</span><span class="wpm-unit">WPM</span></div>
    <div class="strip-wrap">
      <div class="wpm-strip" id="wpmStrip">
        <div class="wpm-track" id="wpmTrack"></div>
      </div>
      <div class="wpm-pointer"></div>
    </div>
  </div>

<script>
(() => {
  const textToRead = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  const PARAGRAPH_BREAK = "\n";

  const MIN_WPM = 100;
  const MAX_WPM = 800;
  const STEP_WPM = 25;
  const TICK_PX = 18;
  let currentWPM = 400;

  function tokenize(text) {
    const tokens = [];
    const paragraphs = text.split(/\n\n+/);
    paragraphs.forEach((para, i) => {
      const words = para.trim().split(/\s+/).filter(Boolean);
      for (const w of words) tokens.push(w);
      if (i < paragraphs.length - 1) tokens.push(PARAGRAPH_BREAK);
    });
    return tokens;
  }

  function orpIndex(word) {
    const n = word.length;
    if (n <= 1)  return 0;
    if (n <= 5)  return 1;
    if (n <= 9)  return 2;
    if (n <= 13) return 3;
    return 4;
  }

  // Detect terminal punctuation even when wrapped by closing quotes/brackets,
  // so sentence endings inside dialog (e.g. `last?"`) still land.
  const TRAILING_CLOSERS = /[")'\]”’]+$/;

  function durationMultiplier(token) {
    if (token === PARAGRAPH_BREAK) return 2.5;
    let m = 1;
    if (token.length > 8) m = Math.max(m, 1.3);
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    if (last === "," || last === ";" || last === ":") m = Math.max(m, 1.5);
    if (last === "." || last === "!" || last === "?") m = Math.max(m, 2.2);
    return m;
  }

  const wordEl   = document.getElementById("word");
  const beforeEl = document.getElementById("before");
  const orpEl    = document.getElementById("orp");
  const afterEl  = document.getElementById("after");

  function render(token) {
    if (token === PARAGRAPH_BREAK) {
      wordEl.classList.add("break");
      beforeEl.textContent = "";
      orpEl.textContent    = "—";
      afterEl.textContent  = "";
      return;
    }
    wordEl.classList.remove("break");
    const i = orpIndex(token);
    beforeEl.textContent = token.slice(0, i);
    orpEl.textContent    = token.charAt(i);
    afterEl.textContent  = token.slice(i + 1);
  }

  const tokens = tokenize(textToRead);
  let idx = 0;

  function tick() {
    if (idx >= tokens.length) idx = 0;
    const tok = tokens[idx++];
    render(tok);
    const frameMs = 60000 / currentWPM;
    setTimeout(tick, frameMs * durationMultiplier(tok));
  }

  // ---------- WPM picker ----------

  const wpmValueEl = document.getElementById("wpmValue");
  const stripEl    = document.getElementById("wpmStrip");
  const trackEl    = document.getElementById("wpmTrack");

  function buildTrack() {
    const frag = document.createDocumentFragment();
    for (let w = MIN_WPM; w <= MAX_WPM; w += STEP_WPM) {
      const t = document.createElement("div");
      t.className = w % 100 === 0 ? "tick major" : "tick";
      t.dataset.wpm = w;
      if (w % 100 === 0) {
        const label = document.createElement("div");
        label.className = "tick-label";
        label.textContent = w;
        t.appendChild(label);
      }
      frag.appendChild(t);
    }
    trackEl.appendChild(frag);
  }

  function setEdgePadding() {
    const pad = (stripEl.clientWidth - TICK_PX) / 2;
    trackEl.style.paddingLeft  = pad + "px";
    trackEl.style.paddingRight = pad + "px";
  }

  function wpmToScrollLeft(w) {
    return ((w - MIN_WPM) / STEP_WPM) * TICK_PX;
  }

  function scrollLeftToWpm(sl) {
    const i = Math.round(sl / TICK_PX);
    const w = MIN_WPM + i * STEP_WPM;
    return Math.max(MIN_WPM, Math.min(MAX_WPM, w));
  }

  function syncFromScroll() {
    const w = scrollLeftToWpm(stripEl.scrollLeft);
    if (w !== currentWPM) {
      currentWPM = w;
      wpmValueEl.textContent = w;
    }
  }

  function scrollToWpm(w, smooth) {
    stripEl.scrollTo({
      left: wpmToScrollLeft(w),
      behavior: smooth ? "smooth" : "auto",
    });
  }

  function initPicker() {
    buildTrack();
    setEdgePadding();
    wpmValueEl.textContent = currentWPM;
    scrollToWpm(currentWPM, false);

    stripEl.addEventListener("scroll", syncFromScroll, { passive: true });

    // Translate vertical mouse-wheel into horizontal scroll for desktop.
    stripEl.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        stripEl.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    // Tap a tick to jump to it.
    trackEl.addEventListener("click", (e) => {
      const tick = e.target.closest(".tick");
      if (!tick) return;
      scrollToWpm(parseInt(tick.dataset.wpm, 10), true);
    });

    window.addEventListener("resize", () => {
      setEdgePadding();
      scrollToWpm(currentWPM, false);
    });
  }

  initPicker();
  tick();
})();
</script>
</body>
</html>
