<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>RSVP Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
  /* ===== Unit A: CSS Custom Properties (Theme System) ===== */
  :root {
    --bg: #1a1a1a;
    --fg: #e8e8e8;
    --fg-muted: rgba(255,255,255,0.55);
    --fg-muted-85: rgba(207,207,207,0.85);
    --fg-dim: #cfcfcf;
    --accent: #e74c3c;
    --accent-glow: rgba(231,76,60,0.5);
    --accent-dim: rgba(231,76,60,0.22);
    --accent-border: rgba(231,76,60,0.7);
    --accent-pressed: #c0392b;
    --control-bg: rgba(255,255,255,0.06);
    --control-bg-hover: rgba(255,255,255,0.14);
    --control-bg-active: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.16);
    --border-mid: rgba(255,255,255,0.14);
    --border-faint: rgba(255,255,255,0.07);
    --guide: rgba(255,255,255,0.18);
    --guide-tick: rgba(255,255,255,0.55);
    --tick-mark: rgba(255,255,255,0.22);
    --tick-major: rgba(255,255,255,0.45);
    --tick-label: rgba(255,255,255,0.5);
    --break-orp: rgba(232,232,232,0.3);
    --pause-dim: 0.55;
    --word-size: clamp(2.5rem, 8vw, 4.5rem);
    --word-font: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  body.theme-light {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --fg-muted: rgba(0,0,0,0.50);
    --fg-muted-85: rgba(60,60,60,0.85);
    --fg-dim: #444;
    --accent: #c0392b;
    --accent-glow: rgba(192,57,43,0.35);
    --accent-dim: rgba(192,57,43,0.15);
    --accent-border: rgba(192,57,43,0.5);
    --accent-pressed: #a93226;
    --control-bg: rgba(0,0,0,0.04);
    --control-bg-hover: rgba(0,0,0,0.08);
    --control-bg-active: rgba(0,0,0,0.06);
    --border: rgba(0,0,0,0.14);
    --border-mid: rgba(0,0,0,0.12);
    --border-faint: rgba(0,0,0,0.06);
    --guide: rgba(0,0,0,0.15);
    --guide-tick: rgba(0,0,0,0.45);
    --tick-mark: rgba(0,0,0,0.18);
    --tick-major: rgba(0,0,0,0.38);
    --tick-label: rgba(0,0,0,0.45);
    --break-orp: rgba(30,30,30,0.3);
  }

  body.theme-sepia {
    --bg: #f4ecd8;
    --fg: #3b2e1a;
    --fg-muted: rgba(59,46,26,0.55);
    --fg-muted-85: rgba(59,46,26,0.85);
    --fg-dim: #5a4a30;
    --accent: #a0522d;
    --accent-glow: rgba(160,82,45,0.35);
    --accent-dim: rgba(160,82,45,0.18);
    --accent-border: rgba(160,82,45,0.5);
    --accent-pressed: #8b4513;
    --control-bg: rgba(60,40,10,0.06);
    --control-bg-hover: rgba(60,40,10,0.10);
    --control-bg-active: rgba(60,40,10,0.08);
    --border: rgba(60,40,10,0.18);
    --border-mid: rgba(60,40,10,0.15);
    --border-faint: rgba(60,40,10,0.08);
    --guide: rgba(60,40,10,0.18);
    --guide-tick: rgba(60,40,10,0.50);
    --tick-mark: rgba(60,40,10,0.20);
    --tick-major: rgba(60,40,10,0.40);
    --tick-label: rgba(60,40,10,0.45);
    --break-orp: rgba(59,46,26,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ===== Unit H: Stats bar ===== */
  .stats-bar {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    padding: 0.35rem 0.9rem;
    font-size: 0.7rem;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
    border-bottom: 1px solid var(--border-faint);
  }
  .stats-sep { opacity: 0.4; }

  .main-area {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }

  .reader-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
    position: relative;
    cursor: pointer;
  }

  .reader {
    width: 100%;
    max-width: 36rem;
    transition: opacity 150ms ease;
  }

  .word-area {
    position: relative;
    font-size: var(--word-size);
    font-family: var(--word-font);
    padding: 0.45em 0;
  }

  .guide {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 14ch;
    max-width: 92%;
    height: 1px;
    background: var(--guide);
    pointer-events: none;
  }
  .guide.top    { top: 0; }
  .guide.bottom { bottom: 0; }

  .guide-tick {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 2px;
    height: 0.22em;
    background: var(--guide-tick);
    border-radius: 1px;
    pointer-events: none;
  }
  .guide-tick.top    { top: 0.12em; }
  .guide-tick.bottom { bottom: 0.12em; }

  .word {
    position: relative;
    height: 1em;
    line-height: 1;
  }

  .word span {
    position: absolute;
    top: 0;
    white-space: pre;
    font-variant-ligatures: none;
  }

  .word .before {
    right: calc(65% + 0.5ch);
    text-align: right;
  }

  .word .orp {
    left: 35%;
    transform: translateX(-50%);
    color: var(--accent);
  }

  .word .after {
    left: calc(35% + 0.5ch);
  }

  .word.break .orp {
    color: var(--break-orp);
  }

  .word.countdown .orp {
    color: var(--accent);
    font-size: 1.2em;
  }

  body.paused .reader { opacity: var(--pause-dim); }

  /* ===== Unit G: Context preview line ===== */
  .context-line {
    font-size: 0.75rem;
    line-height: 1.5;
    color: var(--fg-muted);
    text-align: center;
    max-width: 32rem;
    margin: 0.5rem auto 0;
    max-height: 3em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .context-line b {
    color: var(--fg);
    font-weight: 700;
  }
  body.paused .context-line { opacity: 0.7; }

  /* ===== Unit E: WPM toast ===== */
  .wpm-toast {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    padding: 0.4rem 1rem;
    background: var(--fg);
    color: var(--bg);
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
    z-index: 10;
  }
  .wpm-toast.show { opacity: 1; }

  /* ---------- Status overlay (loading / error) ---------- */
  .status-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    text-align: center;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms ease;
    z-index: 2;
  }
  body.loading .status-overlay,
  body.error   .status-overlay {
    opacity: 1;
    pointer-events: auto;
  }
  body.loading .reader,
  body.error   .reader {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  .status-msg {
    font-size: 1.05rem;
    color: var(--fg-dim);
    line-height: 1.45;
    max-width: 28rem;
    font-variant-numeric: tabular-nums;
  }
  .status-msg.error { color: var(--accent); }

  /* ---------- Control panel ---------- */
  .controls {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding: 0.5rem 0.9rem calc(0.6rem + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border-faint);
    transition: transform 400ms ease, opacity 400ms ease;
  }
  body.loading .controls,
  body.error   .controls {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== Unit I: Fullscreen auto-hide ===== */
  body.fs-hide-controls .controls {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  /* ===== Unit F: Chapter nav ===== */
  .chapter-nav {
    display: flex;
    gap: 0.4rem;
    align-items: stretch;
    max-width: 40rem;
    margin: 0 auto;
    width: 100%;
  }
  .chapter-select {
    flex: 1 1 auto;
    min-width: 0;
    padding: 0.4rem 0.6rem;
    background: var(--control-bg);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .seek {
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .seek-readout {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted-85);
    font-size: 0.8rem;
    letter-spacing: 0.02em;
  }

  .seek-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
    touch-action: none;
    --progress: 0%;
  }
  .seek-slider::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent) var(--progress), var(--guide) var(--progress));
  }
  .seek-slider::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent) var(--progress), var(--guide) var(--progress));
  }
  .seek-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    margin-top: -7px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .seek-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .grain {
    display: flex;
    gap: 0.4rem;
  }
  .grain-btn {
    flex: 1 1 0;
    padding: 0.5rem 0.6rem;
    background: var(--control-bg);
    color: var(--fg-dim);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .grain-btn.is-active {
    background: var(--accent-dim);
    color: var(--fg);
    border-color: var(--accent-border);
  }
  .grain-btn:active {
    background: var(--control-bg-hover);
  }

  .transport {
    display: flex;
    gap: 0.4rem;
    align-items: stretch;
  }
  .nav-btn {
    flex: 0 0 auto;
    min-width: 3rem;
    padding: 0.5rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--control-bg-active);
    color: var(--fg);
    font-size: 1.1rem;
    line-height: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .nav-btn:active { background: var(--control-bg-hover); }
  .nav-btn:disabled { opacity: 0.3; }

  .play-btn {
    flex: 1 1 auto;
    padding: 0.55rem 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #ffffff;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .play-btn:active {
    background: var(--accent-pressed);
    transform: translateY(1px);
  }

  /* ---------- Settings ---------- */
  .settings {
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
  }
  .settings > summary {
    list-style: none;
    cursor: pointer;
    text-align: center;
    color: var(--fg-muted);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.6rem;
    -webkit-tap-highlight-color: transparent;
  }
  .settings > summary::-webkit-details-marker { display: none; }

  .settings-section-label {
    color: var(--fg-muted);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 0 0.2rem;
    text-align: center;
  }

  .action-btn {
    padding: 0.6rem 1.4rem;
    background: var(--control-bg);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border-mid);
    border-radius: 999px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { background: var(--control-bg-hover); }

  .picker-actions {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding-top: 0.6rem;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    color: var(--fg-muted);
    font-size: 0.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-row input[type="checkbox"] {
    accent-color: var(--accent);
  }

  /* ---------- Picker bars ---------- */
  .picker {
    padding-top: 0.5rem;
    user-select: none;
    -webkit-user-select: none;
  }

  .picker-display {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: var(--fg-dim);
    font-size: 1.05rem;
    line-height: 1.4;
  }
  .picker-display .picker-unit {
    color: var(--fg-muted);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-left: 0.3em;
  }

  .strip-wrap {
    position: relative;
    height: 46px;
    margin-top: 0.25rem;
  }

  .picker-strip {
    position: absolute;
    inset: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    overscroll-behavior: contain;
    touch-action: pan-x;
  }
  .picker-strip::-webkit-scrollbar { display: none; }

  .picker-track {
    display: flex;
    align-items: flex-start;
    height: 100%;
    width: max-content;
  }

  .tick {
    flex: 0 0 18px;
    height: 100%;
    position: relative;
    scroll-snap-align: center;
    cursor: pointer;
  }
  .tick::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 4px;
    width: 1px;
    height: 8px;
    background: var(--tick-mark);
    transform: translateX(-50%);
  }
  .tick.major::before {
    height: 14px;
    background: var(--tick-major);
  }
  .tick-label {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: var(--tick-label);
    font-variant-numeric: tabular-nums;
  }

  .picker-pointer {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: translateX(-1px);
    pointer-events: none;
    z-index: 2;
    border-radius: 1px;
  }
  .picker-pointer::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -3px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    transform: translateX(-50%) rotate(45deg);
  }

  /* ===== Unit H: Training options ===== */
  .training-opts {
    padding: 0.2rem 0;
  }
</style>
</head>
<body>
  <!-- Unit H: Session stats bar -->
  <div class="stats-bar" id="statsBar">
    <span id="statWords">0 words</span>
    <span class="stats-sep">|</span>
    <span id="statTime">0:00</span>
    <span class="stats-sep">|</span>
    <span id="statAvg">&mdash; avg wpm</span>
  </div>

  <div class="main-area">
    <div class="reader-wrap" id="readerWrap">
      <main class="reader" aria-label="RSVP reader">
        <div class="word-area">
          <div class="guide top"></div>
          <div class="guide-tick top"></div>
          <div class="word" id="word">
            <span class="before" id="before"></span><span class="orp" id="orp"></span><span class="after" id="after"></span>
          </div>
          <div class="guide-tick bottom"></div>
          <div class="guide bottom"></div>
        </div>
        <!-- Unit G: Context preview -->
        <div class="context-line" id="contextLine"></div>
      </main>
      <div class="status-overlay" id="statusOverlay" aria-live="polite">
        <div class="status-msg" id="statusMsg">Loading&hellip;</div>
        <button class="action-btn" id="statusRetryBtn" type="button" hidden>Choose another file</button>
      </div>
      <!-- Unit E: Toast -->
      <div class="wpm-toast" id="wpmToast" aria-live="polite"></div>
    </div>
  </div>

  <input type="file" id="epubFileInput" accept=".epub,application/epub+zip" hidden>

  <div class="controls">
    <!-- Unit F: Chapter navigation -->
    <div class="chapter-nav" id="chapterNav" hidden>
      <button class="nav-btn" id="chPrev" type="button" aria-label="Previous chapter">&#9664;</button>
      <select class="chapter-select" id="chSelect" aria-label="Chapter"></select>
      <button class="nav-btn" id="chNext" type="button" aria-label="Next chapter">&#9654;</button>
    </div>

    <div class="seek">
      <div class="seek-readout" id="seekReadout"></div>
      <input class="seek-slider" id="seekSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Reading position">

      <!-- Unit C: Chunk mode selector -->
      <div class="grain" role="group" aria-label="Words per flash">
        <button class="grain-btn is-active" type="button" data-chunk="1">1 word</button>
        <button class="grain-btn" type="button" data-chunk="2">2 words</button>
        <button class="grain-btn" type="button" data-chunk="3">3 words</button>
      </div>

      <div class="grain" role="group" aria-label="Move by">
        <button class="grain-btn is-active" type="button" data-unit="word">Word</button>
        <button class="grain-btn" type="button" data-unit="sentence">Sentence</button>
        <button class="grain-btn" type="button" data-unit="paragraph">Paragraph</button>
      </div>
      <div class="transport">
        <button class="nav-btn" id="stepPrev" type="button" aria-label="Step back">&#9664;</button>
        <button class="play-btn" id="playPause" type="button" aria-label="Play or pause"><span id="playLabel">Play</span></button>
        <button class="nav-btn" id="stepNext" type="button" aria-label="Step forward">&#9654;</button>
        <!-- Unit I: Fullscreen -->
        <button class="nav-btn" id="fullscreenBtn" type="button" aria-label="Toggle fullscreen">&#x26F6;</button>
      </div>
    </div>

    <div class="picker" aria-label="Reading speed">
      <div class="picker-display"><span id="wpmValue">400</span><span class="picker-unit">WPM</span></div>
      <div class="strip-wrap">
        <div class="picker-strip" id="wpmStrip">
          <div class="picker-track" id="wpmTrack"></div>
        </div>
        <div class="picker-pointer"></div>
      </div>
    </div>

    <details class="settings" id="settings">
      <summary>Settings</summary>

      <!-- Unit A: Theme selector -->
      <div class="settings-section-label">Theme</div>
      <div class="grain" role="group" aria-label="Theme">
        <button class="grain-btn is-active" type="button" data-theme="dark">Dark</button>
        <button class="grain-btn" type="button" data-theme="light">Light</button>
        <button class="grain-btn" type="button" data-theme="sepia">Sepia</button>
      </div>

      <!-- Unit B: Font selector -->
      <div class="settings-section-label">Font</div>
      <div class="grain" role="group" aria-label="Font family">
        <button class="grain-btn" type="button" data-font="sans">Sans</button>
        <button class="grain-btn" type="button" data-font="serif">Serif</button>
        <button class="grain-btn is-active" type="button" data-font="mono">Mono</button>
        <button class="grain-btn" type="button" data-font="dyslexic">Dyslexic</button>
      </div>
      <div class="picker" aria-label="Font size">
        <div class="picker-display"><span id="fontSizeValue">48</span><span class="picker-unit">PX</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="fontSizeStrip">
            <div class="picker-track" id="fontSizeTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>

      <!-- Punctuation pickers -->
      <div class="settings-section-label">Timing</div>
      <div class="picker" aria-label="Long word pause intensity">
        <div class="picker-display"><span id="lenValue">50</span><span class="picker-unit">LENGTH</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="lenStrip">
            <div class="picker-track" id="lenTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Comma pause intensity">
        <div class="picker-display"><span id="commaValue">50</span><span class="picker-unit">COMMA %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="commaStrip">
            <div class="picker-track" id="commaTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Period pause intensity">
        <div class="picker-display"><span id="periodValue">120</span><span class="picker-unit">PERIOD %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="periodStrip">
            <div class="picker-track" id="periodTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Paragraph pause intensity">
        <div class="picker-display"><span id="paraValue">150</span><span class="picker-unit">PARAGRAPH %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="paraStrip">
            <div class="picker-track" id="paraTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>

      <!-- Unit K: Start paused + countdown toggles -->
      <div class="settings-section-label">Behavior</div>
      <label class="toggle-row"><input type="checkbox" id="startPausedToggle" checked><span>Start paused on load</span></label>
      <label class="toggle-row"><input type="checkbox" id="countdownToggle" checked><span>Countdown before resume</span></label>
      <label class="toggle-row"><input type="checkbox" id="contextToggle" checked><span>Show context line</span></label>
      <label class="toggle-row"><input type="checkbox" id="autoPauseToggle" checked><span>Pause when tab hidden</span></label>

      <!-- Unit H: Training mode -->
      <div class="settings-section-label">Training</div>
      <label class="toggle-row"><input type="checkbox" id="trainingToggle"><span>WPM training ramp</span></label>
      <div class="training-opts" id="trainingOpts" hidden>
        <div class="picker" aria-label="Training increment">
          <div class="picker-display"><span id="trainIncValue">10</span><span class="picker-unit">WPM / BUMP</span></div>
          <div class="strip-wrap">
            <div class="picker-strip" id="trainIncStrip">
              <div class="picker-track" id="trainIncTrack"></div>
            </div>
            <div class="picker-pointer"></div>
          </div>
        </div>
        <div class="picker" aria-label="Training interval">
          <div class="picker-display"><span id="trainIntValue">500</span><span class="picker-unit">WORDS / BUMP</span></div>
          <div class="strip-wrap">
            <div class="picker-strip" id="trainIntStrip">
              <div class="picker-track" id="trainIntTrack"></div>
            </div>
            <div class="picker-pointer"></div>
          </div>
        </div>
        <div class="picker" aria-label="Training ceiling">
          <div class="picker-display"><span id="trainCeilValue">600</span><span class="picker-unit">MAX WPM</span></div>
          <div class="strip-wrap">
            <div class="picker-strip" id="trainCeilStrip">
              <div class="picker-track" id="trainCeilTrack"></div>
            </div>
            <div class="picker-pointer"></div>
          </div>
        </div>
      </div>

      <div class="picker-actions">
        <button class="action-btn" id="openEpubBtn" type="button">Open EPUB</button>
        <button class="action-btn" id="resetStatsBtn" type="button">Reset Stats</button>
      </div>
    </details>
  </div>

<script>
(() => {
  const textToRead = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  const PARAGRAPH_BREAK = "\n";

  let currentWPM = 400;
  let lengthStrength = 50;
  let commaPause     = 50;
  let periodPause    = 120;
  let paraPause      = 150;
  const LEN_THRESHOLD = 4;
  const LEN_SCALE = 250;

  // ===== Unit C: Chunk mode =====
  let chunkSize = 1;

  // ===== Unit K: Start paused & countdown =====
  let startPaused = true;
  let countdownEnabled = true;
  let countdownTimer = null;

  // ===== Unit J: Auto-pause =====
  let autoPauseEnabled = true;

  // ===== Unit G: Context preview =====
  let contextEnabled = true;
  let lastSentenceIdx = -1;

  // ===== Unit H: Session stats =====
  let sessionWords = 0;
  let sessionPlayMs = 0;
  let sessionPlayStart = null;
  let statsInterval = null;

  // ===== Unit H: Training ramp =====
  let trainingEnabled = false;
  let trainingIncrement = 10;
  let trainingInterval = 500;
  let trainingCeiling = 600;
  let trainingCounter = 0;

  // ===== Unit F: Chapters =====
  let chapters = [];
  let isEpubLoaded = false;

  // ===== Unit J: Swipe tracking =====
  let swipeStart = null;
  let swipeFired = false;

  // ===== Unit I: Fullscreen =====
  let fsHideTimer = null;

  function tokenize(text) {
    const tokens = [];
    const paragraphs = [];
    const paragraphStarts = [];
    const tokenToPara = [];
    const wordTokenIndices = [];
    const tokenToWordOrdinal = [];
    const sentenceStarts = [];
    const paraTexts = text.split(/\n\n+/);
    let sentenceOpen = false;
    paraTexts.forEach((para, pi) => {
      const indices = [];
      const words = para.trim().split(/\s+/).filter(Boolean);
      for (const w of words) {
        const ti = tokens.length;
        if (!sentenceOpen) { sentenceStarts.push(ti); sentenceOpen = true; }
        tokenToPara.push(pi);
        tokenToWordOrdinal.push(wordTokenIndices.length);
        wordTokenIndices.push(ti);
        indices.push(ti);
        tokens.push(w);
        if (endsSentence(w)) sentenceOpen = false;
      }
      sentenceOpen = false;
      paragraphs.push(indices);
      if (indices.length) paragraphStarts.push(indices[0]);
      if (pi < paraTexts.length - 1) {
        tokenToPara.push(-1);
        tokenToWordOrdinal.push(-1);
        tokens.push(PARAGRAPH_BREAK);
      }
    });
    return {
      tokens, paragraphs, paragraphStarts, tokenToPara,
      wordTokenIndices, tokenToWordOrdinal, sentenceStarts,
    };
  }

  function orpIndex(word) {
    const n = word.length;
    if (n <= 1)  return 0;
    if (n <= 5)  return 1;
    if (n <= 9)  return 2;
    if (n <= 13) return 3;
    return 4;
  }

  const TRAILING_CLOSERS = /[")'\]"\u2019]+$/;

  function endsSentence(token) {
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    return last === "." || last === "!" || last === "?";
  }

  function lengthMultiplier(len) {
    const extra = Math.max(0, len - LEN_THRESHOLD);
    return 1 + extra * (lengthStrength / LEN_SCALE);
  }

  function durationMultiplier(token) {
    if (token === PARAGRAPH_BREAK) return 1 + paraPause / 100;
    let m = lengthMultiplier(token.length);
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    if (last === "," || last === ";" || last === ":") m = Math.max(m, 1 + commaPause / 100);
    if (endsSentence(token)) m = Math.max(m, 1 + periodPause / 100);
    return m;
  }

  const wordEl   = document.getElementById("word");
  const beforeEl = document.getElementById("before");
  const orpEl    = document.getElementById("orp");
  const afterEl  = document.getElementById("after");

  function render(token) {
    if (token === PARAGRAPH_BREAK) {
      wordEl.classList.add("break");
      wordEl.classList.remove("countdown");
      beforeEl.textContent = "";
      orpEl.textContent    = "\u2014";
      afterEl.textContent  = "";
      return;
    }
    wordEl.classList.remove("break");
    wordEl.classList.remove("countdown");
    const i = orpIndex(token);
    beforeEl.textContent = token.slice(0, i);
    orpEl.textContent    = token.charAt(i);
    afterEl.textContent  = token.slice(i + 1);
  }

  // ===== Unit C: Chunk rendering =====
  function renderChunk(chunk, pivotPos) {
    if (chunk.length === 1 && chunk[0].token === PARAGRAPH_BREAK) {
      render(PARAGRAPH_BREAK);
      return;
    }
    wordEl.classList.remove("break", "countdown");
    const pivotToken = chunk[pivotPos].token;
    const oi = orpIndex(pivotToken);

    const wordsBefore = chunk.slice(0, pivotPos).map(c => c.token);
    const wordsAfter  = chunk.slice(pivotPos + 1).map(c => c.token);

    const bPart = pivotToken.slice(0, oi);
    const oPart = pivotToken.charAt(oi);
    const aPart = pivotToken.slice(oi + 1);

    beforeEl.textContent = wordsBefore.length ? wordsBefore.join(" ") + " " + bPart : bPart;
    orpEl.textContent    = oPart;
    afterEl.textContent  = wordsAfter.length ? aPart + " " + wordsAfter.join(" ") : aPart;
  }

  let {
    tokens, paragraphs, paragraphStarts, tokenToPara,
    wordTokenIndices, tokenToWordOrdinal, sentenceStarts,
  } = tokenize(textToRead);

  // ---------- Playback state machine ----------

  const STATE_PLAYING   = "playing";
  const STATE_PAUSED    = "paused";
  const STATE_LOADING   = "loading";
  const STATE_ERROR     = "error";
  const STATE_COUNTDOWN = "countdown";

  let currentIdx     = 0;
  let pendingTimer   = null;
  let state          = STATE_PAUSED;
  let rampRemaining  = 0;
  let manuallySeeked = false;
  let granularity    = "word";
  let sliderDragging = false;

  function setState(s) {
    state = s;
    document.body.classList.remove("paused", "loading", "error");
    if (s === STATE_PAUSED)       document.body.classList.add("paused");
    else if (s === STATE_LOADING) document.body.classList.add("loading");
    else if (s === STATE_ERROR)   document.body.classList.add("error");
  }

  function clearPending() {
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
  }

  function rampSpeedFactor() {
    if (rampRemaining <= 0) return 1;
    return 0.5 + (5 - rampRemaining) * 0.125;
  }

  function play() {
    if (state !== STATE_PLAYING) return;
    if (currentIdx >= tokens.length) currentIdx = 0;
    clearPending();

    // Session stats: mark play start
    if (!sessionPlayStart) sessionPlayStart = Date.now();

    // ===== Unit C: Collect chunk =====
    const chunk = [];
    let scanIdx = currentIdx;
    while (chunk.length < chunkSize && scanIdx < tokens.length) {
      const tok = tokens[scanIdx];
      if (tok === PARAGRAPH_BREAK) {
        if (chunk.length === 0) {
          chunk.push({ token: tok, idx: scanIdx });
          scanIdx++;
        }
        break;
      }
      chunk.push({ token: tok, idx: scanIdx });
      scanIdx++;
    }

    if (!chunk.length) return;

    const pivotPos = Math.min(Math.floor((chunkSize - 1) / 2), chunk.length - 1);
    if (chunkSize > 1) {
      renderChunk(chunk, pivotPos);
    } else {
      render(chunk[0].token);
    }

    // Context preview uses the pivot word's index
    updateContext(chunk[pivotPos].idx);
    updateSeekUI();

    // Duration
    const baseMs = 60000 / currentWPM;
    let maxMul = 0;
    for (const c of chunk) maxMul = Math.max(maxMul, durationMultiplier(c.token));
    let dur = baseMs * maxMul;
    if (rampRemaining > 0 && chunk[0].token !== PARAGRAPH_BREAK) {
      dur = dur / rampSpeedFactor();
      rampRemaining--;
    }

    pendingTimer = setTimeout(() => {
      pendingTimer = null;
      // Count words read (only actual words, not paragraph breaks)
      const wordsInChunk = chunk.filter(c => c.token !== PARAGRAPH_BREAK).length;
      sessionWords += wordsInChunk;

      // Training ramp check
      if (trainingEnabled) {
        trainingCounter += wordsInChunk;
        if (trainingCounter >= trainingInterval && currentWPM < trainingCeiling) {
          trainingCounter = 0;
          adjustWPM(trainingIncrement);
        }
      }

      currentIdx = scanIdx;
      play();
    }, dur);
  }

  function pause() {
    if (state !== STATE_PLAYING) return;
    clearPending();
    // Session stats: accumulate play time
    if (sessionPlayStart) {
      sessionPlayMs += Date.now() - sessionPlayStart;
      sessionPlayStart = null;
    }
    stopStatsTimer();
    manuallySeeked = false;
    setState(STATE_PAUSED);
    updateSeekUI();
  }

  function resume() {
    if (state !== STATE_PAUSED) return;
    currentIdx = manuallySeeked
      ? Math.min(currentIdx, tokens.length - 1)
      : rewindWords(currentIdx, 3);
    manuallySeeked = false;

    if (countdownEnabled) {
      runCountdown();
    } else {
      rampRemaining = 5;
      setState(STATE_PLAYING);
      startStatsTimer();
      play();
    }
  }

  function togglePlay() {
    if (state === STATE_PLAYING) pause();
    else if (state === STATE_PAUSED) resume();
    else if (state === STATE_COUNTDOWN) cancelCountdown();
  }

  // ===== Unit K: Countdown =====
  function runCountdown() {
    setState(STATE_COUNTDOWN);
    document.body.classList.remove("paused");

    const nums = [3, 2, 1];
    let step = 0;

    function tick() {
      if (state !== STATE_COUNTDOWN) return;
      if (step < nums.length) {
        wordEl.classList.remove("break");
        wordEl.classList.add("countdown");
        beforeEl.textContent = "";
        orpEl.textContent = String(nums[step]);
        afterEl.textContent = "";
        step++;
        countdownTimer = setTimeout(tick, 600);
      } else {
        wordEl.classList.remove("countdown");
        countdownTimer = null;
        rampRemaining = 3;
        setState(STATE_PLAYING);
        startStatsTimer();
        play();
      }
    }
    tick();
  }

  function cancelCountdown() {
    if (countdownTimer) { clearTimeout(countdownTimer); countdownTimer = null; }
    wordEl.classList.remove("countdown");
    setState(STATE_PAUSED);
    render(tokens[currentIdx]);
    updateContext(currentIdx);
    updateSeekUI();
  }

  function rewindWords(from, count) {
    let i = Math.min(from, tokens.length - 1);
    let rewound = 0;
    while (rewound < count && i > 0) {
      i--;
      if (tokens[i] !== PARAGRAPH_BREAK) rewound++;
    }
    return i;
  }

  // ---------- Position navigation ----------

  function wordOrdinalAt(idx) {
    if (!wordTokenIndices.length) return 0;
    let i = Math.max(0, Math.min(idx, tokens.length - 1));
    if (tokenToWordOrdinal[i] >= 0) return tokenToWordOrdinal[i];
    let f = i;
    while (f < tokens.length && tokenToWordOrdinal[f] < 0) f++;
    if (f < tokens.length) return tokenToWordOrdinal[f];
    while (i >= 0 && tokenToWordOrdinal[i] < 0) i--;
    return i >= 0 ? tokenToWordOrdinal[i] : 0;
  }

  function ordinalToIdx(ord) {
    if (!wordTokenIndices.length) return 0;
    const o = Math.max(0, Math.min(ord, wordTokenIndices.length - 1));
    return wordTokenIndices[o];
  }

  function currentWordIdx(from) {
    return ordinalToIdx(wordOrdinalAt(from));
  }

  function stepWord(from, dir) {
    return ordinalToIdx(wordOrdinalAt(from) + dir);
  }

  function stepSentence(from, dir) {
    if (!sentenceStarts.length) return from;
    const cur = currentWordIdx(from);
    const si = lastIndexAtMost(sentenceStarts, cur);
    if (dir < 0) {
      if (cur > sentenceStarts[si]) return sentenceStarts[si];
      return sentenceStarts[Math.max(0, si - 1)];
    }
    return sentenceStarts[Math.min(sentenceStarts.length - 1, si + 1)];
  }

  function stepParagraph(from, dir) {
    if (!paragraphStarts.length) return from;
    const cur = currentWordIdx(from);
    const pi = lastIndexAtMost(paragraphStarts, cur);
    if (dir < 0) {
      if (cur > paragraphStarts[pi]) return paragraphStarts[pi];
      return paragraphStarts[Math.max(0, pi - 1)];
    }
    return paragraphStarts[Math.min(paragraphStarts.length - 1, pi + 1)];
  }

  function lastIndexAtMost(list, target) {
    let lo = 0, hi = list.length - 1, ans = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (list[mid] <= target) { ans = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    return ans;
  }

  function getParagraphIndex(idx) {
    if (idx < 0) return 0;
    if (idx >= tokens.length) return paragraphs.length - 1;
    if (tokenToPara[idx] >= 0) return tokenToPara[idx];
    let i = idx;
    while (i < tokens.length && tokenToPara[i] < 0) i++;
    if (i < tokens.length) return tokenToPara[i];
    i = idx;
    while (i >= 0 && tokenToPara[i] < 0) i--;
    return Math.max(0, tokenToPara[i] || 0);
  }

  function seekTo(idx) {
    currentIdx = Math.max(0, Math.min(idx, tokens.length - 1));
    manuallySeeked = true;
    render(tokens[currentIdx]);
    updateContext(currentIdx);
    updateSeekUI();
  }

  function stepFn() {
    if (granularity === "sentence")  return stepSentence;
    if (granularity === "paragraph") return stepParagraph;
    return stepWord;
  }

  function doStep(dir) {
    if (state === STATE_PLAYING) pause();
    else if (state === STATE_COUNTDOWN) cancelCountdown();
    seekTo(stepFn()(currentIdx, dir));
  }

  // ---------- Seek UI ----------

  const seekSliderEl  = document.getElementById("seekSlider");
  const seekReadoutEl = document.getElementById("seekReadout");
  const stepPrevEl    = document.getElementById("stepPrev");
  const stepNextEl    = document.getElementById("stepNext");
  const playLabelEl   = document.getElementById("playLabel");
  const grainBtns     = Array.from(document.querySelectorAll("[data-unit]"));

  function unitList() {
    if (granularity === "sentence")  return sentenceStarts;
    if (granularity === "paragraph") return paragraphStarts;
    return wordTokenIndices;
  }

  function unitIndexAt(idx) {
    const list = unitList();
    if (!list.length) return 0;
    return lastIndexAtMost(list, currentWordIdx(idx));
  }

  function updateSeekUI() {
    const total = wordTokenIndices.length;
    const wOrd = wordOrdinalAt(currentIdx);
    const frac = total > 1 ? wOrd / (total - 1) : 0;
    const pi = getParagraphIndex(currentIdx);

    // ===== Unit D: ETA =====
    const wordsLeft = Math.max(0, total - wOrd - 1);
    const etaSec = Math.max(0, Math.round(wordsLeft * 60 / currentWPM));
    let etaStr;
    if (etaSec >= 3600) {
      const h = Math.floor(etaSec / 3600);
      const m = Math.floor((etaSec % 3600) / 60);
      etaStr = "~" + h + "h " + m + "m left";
    } else if (etaSec >= 60) {
      const m = Math.floor(etaSec / 60);
      const s = etaSec % 60;
      etaStr = "~" + m + "m " + s + "s left";
    } else {
      etaStr = "~" + etaSec + "s left";
    }

    seekReadoutEl.textContent =
      "word " + (total ? wOrd + 1 : 0).toLocaleString() + " / " + total.toLocaleString() +
      "   \u00b7   \u00b6 " + (pi + 1) + " / " + paragraphs.length +
      "   \u00b7   " + Math.round(frac * 100) + "%" +
      "   \u00b7   " + etaStr;

    // ===== Unit D: Progress fill =====
    seekSliderEl.style.setProperty("--progress", (frac * 100).toFixed(1) + "%");

    const uMax = Math.max(0, unitList().length - 1);
    if (+seekSliderEl.max !== uMax) seekSliderEl.max = uMax;
    if (!sliderDragging) seekSliderEl.value = unitIndexAt(currentIdx);

    stepPrevEl.disabled = wOrd <= 0;
    stepNextEl.disabled = wOrd >= total - 1;

    playLabelEl.textContent = (state === STATE_PLAYING || state === STATE_COUNTDOWN) ? "Pause" : "Play";

    // ===== Unit F: Chapter tracking =====
    if (isEpubLoaded && chapters.length) {
      document.getElementById("chSelect").value = currentChapterIndex();
    }
  }

  // ===== Unit G: Context preview line =====
  function updateContext(tokenIdx) {
    const contextEl = document.getElementById("contextLine");
    if (!contextEnabled || contextEl.hidden) {
      contextEl.textContent = "";
      return;
    }
    if (tokenIdx < 0 || tokenIdx >= tokens.length || tokens[tokenIdx] === PARAGRAPH_BREAK) {
      contextEl.textContent = "";
      lastSentenceIdx = -1;
      return;
    }
    const si = sentenceIndexOf(tokenIdx);
    if (si !== lastSentenceIdx) {
      lastSentenceIdx = si;
      const start = sentenceStarts[si];
      const end = si + 1 < sentenceStarts.length ? sentenceStarts[si + 1] : tokens.length;
      let html = "";
      for (let i = start; i < end; i++) {
        if (tokens[i] === PARAGRAPH_BREAK) continue;
        const escaped = tokens[i].replace(/&/g, "&amp;").replace(/</g, "&lt;");
        if (i === tokenIdx) {
          html += '<b data-i="' + i + '">' + escaped + "</b> ";
        } else {
          html += '<span data-i="' + i + '">' + escaped + "</span> ";
        }
      }
      contextEl.innerHTML = html.trim();
    } else {
      const prevBold = contextEl.querySelector("b");
      if (prevBold) {
        const span = document.createElement("span");
        span.dataset.i = prevBold.dataset.i;
        span.textContent = prevBold.textContent;
        prevBold.replaceWith(span);
      }
      const target = contextEl.querySelector('[data-i="' + tokenIdx + '"]');
      if (target) {
        const b = document.createElement("b");
        b.dataset.i = target.dataset.i;
        b.textContent = target.textContent;
        target.replaceWith(b);
      }
    }
  }

  function sentenceIndexOf(tokenIdx) {
    const wi = currentWordIdx(tokenIdx);
    return lastIndexAtMost(sentenceStarts, wi);
  }

  // ===== Unit E: Speed adjust + toast =====
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById("wpmToast");
    el.textContent = msg;
    el.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.classList.remove("show"); toastTimer = null; }, 1000);
  }

  function adjustWPM(delta) {
    const newVal = Math.max(100, Math.min(800, currentWPM + delta));
    if (newVal === currentWPM) return;
    currentWPM = newVal;
    document.getElementById("wpmValue").textContent = newVal;
    wpmPicker.scrollTo(newVal);
    showToast(newVal + " WPM");
    updateSeekUI();
  }

  // ===== Unit H: Session stats =====
  function updateStats() {
    const totalMs = sessionPlayMs + (sessionPlayStart ? Date.now() - sessionPlayStart : 0);
    const totalSec = Math.floor(totalMs / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    document.getElementById("statWords").textContent = sessionWords.toLocaleString() + " words";
    document.getElementById("statTime").textContent = m + ":" + String(s).padStart(2, "0");
    document.getElementById("statAvg").textContent = totalMs > 2000

  const TICK_PX = 18;

  function createPicker(opts) {
    const { stripId, trackId, valueId, min, max, step, majorEvery, initial, onChange } = opts;
    const stripEl = document.getElementById(stripId);
    const trackEl = document.getElementById(trackId);
    const valueEl = document.getElementById(valueId);
    let current = initial;

    function buildTrack() {
      const frag = document.createDocumentFragment();
      for (let v = min; v <= max; v += step) {
        const t = document.createElement("div");
        const major = v % majorEvery === 0;
        t.className = major ? "tick major" : "tick";
        t.dataset.value = v;
        if (major) {
          const label = document.createElement("div");
          label.className = "tick-label";
          label.textContent = v;
          t.appendChild(label);
        }
        frag.appendChild(t);
      }
      trackEl.appendChild(frag);
    }

    function setEdgePadding() {
      const pad = (stripEl.clientWidth - TICK_PX) / 2;
      trackEl.style.paddingLeft  = pad + "px";
      trackEl.style.paddingRight = pad + "px";
    }

    function valueToScrollLeft(v) {
      return ((v - min) / step) * TICK_PX;
    }

    function scrollLeftToValue(sl) {
      const i = Math.round(sl / TICK_PX);
      const v = min + i * step;
      return Math.max(min, Math.min(max, v));
    }

    function syncFromScroll() {
      const v = scrollLeftToValue(stripEl.scrollLeft);
      if (v !== current) {
        current = v;
        valueEl.textContent = v;
        if (onChange) onChange(v);
      }
    }

    function scrollToValue(v, smooth) {
      stripEl.scrollTo({
        left: valueToScrollLeft(v),
        behavior: smooth ? "smooth" : "auto",
      });
    }

    function relayout() {
      setEdgePadding();
      scrollToValue(current, false);
    }

    buildTrack();
    valueEl.textContent = current;

    requestAnimationFrame(relayout);

    stripEl.addEventListener("scroll", syncFromScroll, { passive: true });

    stripEl.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        stripEl.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    trackEl.addEventListener("click", (e) => {
      const tick = e.target.closest(".tick");
      if (!tick) return;
      scrollToValue(parseInt(tick.dataset.value, 10), true);
    });

    window.addEventListener("resize", relayout);

    return {
      relayout,
      scrollTo: (v) => { current = v; scrollToValue(v, true); },
    };
  }

  const BLOCK_TAGS = new Set([
    "P", "DIV", "SECTION", "ARTICLE",
    "H1", "H2", "H3", "H4", "H5", "H6",
    "LI", "BLOCKQUOTE", "PRE", "DT", "DD",
  ]);
  const SKIP_TAGS = new Set([
    "SCRIPT", "STYLE", "NAV", "HEADER", "FOOTER",
    "ASIDE", "FORM", "BUTTON", "SELECT", "INPUT",
    "NOSCRIPT", "TEMPLATE", "IMG", "FIGURE", "FIGCAPTION",
  ]);

  function walkForText(node, buf) {
    if (!node) return;
    if (node.nodeType === Node.TEXT_NODE) {
      buf.push(node.nodeValue);
      return;
    }
    if (node.nodeType !== Node.ELEMENT_NODE) return;

    const tag = node.tagName.toUpperCase();
    if (SKIP_TAGS.has(tag)) return;
    if (tag === "BR") { buf.push("\n"); return; }

    const isBlock = BLOCK_TAGS.has(tag);
    if (isBlock) buf.push("\n\n");
    for (const child of node.childNodes) walkForText(child, buf);
    if (isBlock) buf.push("\n\n");
  }

  function extractTextFromDoc(docOrEl) {
    if (!docOrEl) return "";
    let root;
    if (docOrEl.nodeType === 9) {
      root = docOrEl.body
        || (docOrEl.querySelector && docOrEl.querySelector("body"))
        || docOrEl.documentElement;
    } else if (docOrEl.nodeType === 1) {
      const tag = docOrEl.tagName ? docOrEl.tagName.toUpperCase() : "";
      if (tag === "HTML") {
        root = (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl;
      } else {
        root = docOrEl;
      }
    } else {
      return "";
    }
    if (!root) return "";
    const buf = [];
    walkForText(root, buf);
    let text = buf.join("");
    text = text.replace(/\u00a0/g, " ");
    text = text.replace(/[^\S\n]+/g, " ");
    text = text.replace(/ ?\n ?/g, "\n");
    text = text.replace(/\n{3,}/g, "\n\n");
    return text.trim();
  }

  // ===== Unit F: Extract chapter title =====
  function extractChapterTitle(docOrEl, fallbackNum) {
    let root = docOrEl;
    if (docOrEl.nodeType === 9) root = docOrEl.body || docOrEl.documentElement;
    else if (docOrEl.tagName && docOrEl.tagName.toUpperCase() === "HTML") {
      root = (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl;
    }
    if (!root || !root.querySelector) return "Chapter " + fallbackNum;

    for (const sel of ["h1", "h2", "h3", "title"]) {
      const el = root.querySelector(sel);
      if (el) {
        const t = el.textContent.trim();
        if (t && t.length < 80) return t;
      }
    }
    return "Chapter " + fallbackNum;
  }

  async function extractFullText(book) {
    const items = (book.spine && book.spine.spineItems) || [];
    if (!items.length) throw new Error("This EPUB has no readable spine items.");

    const parts = [];
    const chapterMeta = [];
    let totalWords = 0;

    for (let i = 0; i < items.length; i++) {
      const section = items[i];
      statusMsgEl.textContent = "Parsing\u2026 " + (i + 1) + " / " + items.length;
      try {
        const doc = await section.load(book.load.bind(book));
        const text = extractTextFromDoc(doc);
        if (text) {
          const title = extractChapterTitle(doc, chapterMeta.length + 1);
          chapterMeta.push({ title, wordOffset: totalWords });
          totalWords += text.split(/\s+/).filter(Boolean).length;
          parts.push(text);
        }
      } catch (sectionErr) {
        console.warn("Skipping section:", section && section.href, sectionErr);
      } finally {
        if (section && typeof section.unload === "function") {
          try { section.unload(); } catch (_) {}
        }
      }
    }
    return { text: parts.join("\n\n"), chapters: chapterMeta };
  }

  function loadText(text, chapterMeta) {
    const result = tokenize(text);
    tokens             = result.tokens;
    paragraphs         = result.paragraphs;
    paragraphStarts    = result.paragraphStarts;
    tokenToPara        = result.tokenToPara;
    wordTokenIndices   = result.wordTokenIndices;
    tokenToWordOrdinal = result.tokenToWordOrdinal;
    sentenceStarts     = result.sentenceStarts;

    // ===== Unit F: Map chapter word offsets to token indices =====
    chapters = (chapterMeta || []).map(ch => ({
      title: ch.title,
      tokenIdx: ch.wordOffset < wordTokenIndices.length
        ? wordTokenIndices[ch.wordOffset]
        : tokens.length - 1,
    }));
    isEpubLoaded = chapters.length > 0;
    updateChapterUI();

    currentIdx     = 0;
    rampRemaining  = 0;
    manuallySeeked = false;
    lastSentenceIdx = -1;
    clearPending();

    resetStats();

    if (startPaused) {
      setState(STATE_PAUSED);
      if (tokens.length) render(tokens[0]);
      updateContext(0);
      updateSeekUI();
    } else {
      setState(STATE_PLAYING);
      startStatsTimer();
      play();
    }
  }

  });

  // ---------- Initial state ----------
  // Start paused by default — show first word, wait for user
  if (startPaused) {
    setState(STATE_PAUSED);
    if (tokens.length) render(tokens[0]);
    updateContext(0);
    updateSeekUI();
  } else {
    setState(STATE_PLAYING);
    startStatsTimer();
    play();
  }
})();
</script>
</body>
</html>
