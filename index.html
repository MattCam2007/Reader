<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>RSVP Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .main-area {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }

  .reader-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
    position: relative;
    cursor: pointer;
  }

  .reader {
    width: 100%;
    max-width: 36rem;
    transition: opacity 150ms ease;
  }

  .word-area {
    position: relative;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    padding: 0.45em 0;
  }

  .guide {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 14ch;
    max-width: 92%;
    height: 1px;
    background: rgba(255, 255, 255, 0.18);
    pointer-events: none;
  }
  .guide.top    { top: 0; }
  .guide.bottom { bottom: 0; }

  .guide-tick {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 2px;
    height: 0.22em;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 1px;
    pointer-events: none;
  }
  .guide-tick.top    { top: 0.12em; }
  .guide-tick.bottom { bottom: 0.12em; }

  .word {
    position: relative;
    height: 1em;
    line-height: 1;
  }

  .word span {
    position: absolute;
    top: 0;
    white-space: pre;
    font-variant-ligatures: none;
  }

  .word .before {
    right: calc(65% + 0.5ch);
    text-align: right;
  }

  .word .orp {
    left: 35%;
    transform: translateX(-50%);
    color: #e74c3c;
  }

  .word .after {
    left: calc(35% + 0.5ch);
  }

  .word.break .orp {
    color: rgba(232, 232, 232, 0.3);
  }

  /* Dim the word slightly while paused so the state is obvious. */
  body.paused .reader { opacity: 0.55; }

  /* ---------- Status overlay (loading / error) ---------- */

  .status-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    text-align: center;
    background: #1a1a1a;
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms ease;
    z-index: 2;
  }
  body.loading .status-overlay,
  body.error   .status-overlay {
    opacity: 1;
    pointer-events: auto;
  }
  body.loading .reader,
  body.error   .reader {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  .status-msg {
    font-size: 1.05rem;
    color: #cfcfcf;
    line-height: 1.45;
    max-width: 28rem;
    font-variant-numeric: tabular-nums;
  }
  .status-msg.error {
    color: #e74c3c;
  }

  /* ---------- Control panel (always on the one-word screen) ---------- */

  .controls {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding: 0.5rem 0.9rem calc(0.6rem + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }
  body.loading .controls,
  body.error   .controls {
    opacity: 0;
    pointer-events: none;
  }

  .seek {
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .seek-readout {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: rgba(207, 207, 207, 0.85);
    font-size: 0.8rem;
    letter-spacing: 0.02em;
  }

  .seek-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
    touch-action: none;
  }
  .seek-slider::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.18);
  }
  .seek-slider::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.18);
  }
  .seek-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    margin-top: -7px;
    border-radius: 50%;
    background: #e74c3c;
    border: 2px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
  }
  .seek-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #e74c3c;
    border: 2px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
  }

  /* Granularity selector: what one slide / step moves by. */
  .grain {
    display: flex;
    gap: 0.4rem;
  }
  .grain-btn {
    flex: 1 1 0;
    padding: 0.5rem 0.6rem;
    background: rgba(255, 255, 255, 0.06);
    color: #cfcfcf;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .grain-btn.is-active {
    background: rgba(231, 76, 60, 0.22);
    color: #ffffff;
    border-color: rgba(231, 76, 60, 0.7);
  }
  .grain-btn:active {
    background: rgba(255, 255, 255, 0.14);
  }

  /* Transport: step back / play-pause / step forward. */
  .transport {
    display: flex;
    gap: 0.4rem;
    align-items: stretch;
  }
  .nav-btn {
    flex: 0 0 auto;
    min-width: 3rem;
    padding: 0.5rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    color: #e8e8e8;
    font-size: 1.1rem;
    line-height: 1;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .nav-btn:active {
    background: rgba(255, 255, 255, 0.18);
  }
  .nav-btn:disabled {
    opacity: 0.3;
  }
  .play-btn {
    flex: 1 1 auto;
    padding: 0.55rem 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e74c3c;
    color: #ffffff;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
  }
  .play-btn:active {
    background: #c0392b;
    transform: translateY(1px);
  }

  /* ---------- Settings (speed, length, file) ---------- */

  .settings {
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
  }
  .settings > summary {
    list-style: none;
    cursor: pointer;
    text-align: center;
    color: rgba(207, 207, 207, 0.55);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.6rem;
    -webkit-tap-highlight-color: transparent;
  }
  .settings > summary::-webkit-details-marker { display: none; }

  .action-btn {
    padding: 0.6rem 1.4rem;
    background: rgba(255, 255, 255, 0.06);
    color: #e8e8e8;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active {
    background: rgba(255, 255, 255, 0.14);
  }

  .picker-actions {
    display: flex;
    justify-content: center;
    padding-top: 0.6rem;
  }

  /* ---------- Picker bars ---------- */

  .picker {
    padding-top: 0.5rem;
    user-select: none;
    -webkit-user-select: none;
  }

  .picker-display {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #cfcfcf;
    font-size: 1.05rem;
    line-height: 1.4;
  }
  .picker-display .picker-unit {
    color: rgba(207, 207, 207, 0.55);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-left: 0.3em;
  }

  .strip-wrap {
    position: relative;
    height: 46px;
    margin-top: 0.25rem;
  }

  .picker-strip {
    position: absolute;
    inset: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    overscroll-behavior: contain;
    touch-action: pan-x;
  }
  .picker-strip::-webkit-scrollbar { display: none; }

  .picker-track {
    display: flex;
    align-items: flex-start;
    height: 100%;
    width: max-content;
  }

  .tick {
    flex: 0 0 18px;
    height: 100%;
    position: relative;
    scroll-snap-align: center;
    cursor: pointer;
  }
  .tick::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 4px;
    width: 1px;
    height: 8px;
    background: rgba(255, 255, 255, 0.22);
    transform: translateX(-50%);
  }
  .tick.major::before {
    height: 14px;
    background: rgba(255, 255, 255, 0.45);
  }
  .tick-label {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: rgba(255, 255, 255, 0.5);
    font-variant-numeric: tabular-nums;
  }

  .picker-pointer {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e74c3c;
    transform: translateX(-1px);
    pointer-events: none;
    z-index: 2;
    border-radius: 1px;
  }
  .picker-pointer::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -3px;
    width: 8px;
    height: 8px;
    background: #e74c3c;
    transform: translateX(-50%) rotate(45deg);
  }
</style>
</head>
<body>
  <div class="main-area">
    <div class="reader-wrap" id="readerWrap">
      <main class="reader" aria-label="RSVP reader">
        <div class="word-area">
          <div class="guide top"></div>
          <div class="guide-tick top"></div>
          <div class="word" id="word">
            <span class="before" id="before"></span><span class="orp" id="orp"></span><span class="after" id="after"></span>
          </div>
          <div class="guide-tick bottom"></div>
          <div class="guide bottom"></div>
        </div>
      </main>
      <div class="status-overlay" id="statusOverlay" aria-live="polite">
        <div class="status-msg" id="statusMsg">Loading…</div>
        <button class="action-btn" id="statusRetryBtn" type="button" hidden>Choose another file</button>
      </div>
    </div>
  </div>

  <input type="file" id="epubFileInput" accept=".epub,application/epub+zip" hidden>

  <div class="controls">
    <div class="seek">
      <div class="seek-readout" id="seekReadout"></div>
      <input class="seek-slider" id="seekSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Reading position">
      <div class="grain" role="group" aria-label="Move by">
        <button class="grain-btn is-active" type="button" data-unit="word">Word</button>
        <button class="grain-btn" type="button" data-unit="sentence">Sentence</button>
        <button class="grain-btn" type="button" data-unit="paragraph">Paragraph</button>
      </div>
      <div class="transport">
        <button class="nav-btn" id="stepPrev" type="button" aria-label="Step back">◀</button>
        <button class="play-btn" id="playPause" type="button" aria-label="Play or pause"><span id="playLabel">Pause</span></button>
        <button class="nav-btn" id="stepNext" type="button" aria-label="Step forward">▶</button>
      </div>
    </div>

    <div class="picker" aria-label="Reading speed">
      <div class="picker-display"><span id="wpmValue">400</span><span class="picker-unit">WPM</span></div>
      <div class="strip-wrap">
        <div class="picker-strip" id="wpmStrip">
          <div class="picker-track" id="wpmTrack"></div>
        </div>
        <div class="picker-pointer"></div>
      </div>
    </div>

    <details class="settings" id="settings">
      <summary>Settings</summary>
      <div class="picker" aria-label="Long word pause intensity">
        <div class="picker-display"><span id="lenValue">50</span><span class="picker-unit">LENGTH</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="lenStrip">
            <div class="picker-track" id="lenTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Comma pause intensity">
        <div class="picker-display"><span id="commaValue">50</span><span class="picker-unit">COMMA %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="commaStrip">
            <div class="picker-track" id="commaTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Period pause intensity">
        <div class="picker-display"><span id="periodValue">120</span><span class="picker-unit">PERIOD %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="periodStrip">
            <div class="picker-track" id="periodTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker" aria-label="Paragraph pause intensity">
        <div class="picker-display"><span id="paraValue">150</span><span class="picker-unit">PARAGRAPH %</span></div>
        <div class="strip-wrap">
          <div class="picker-strip" id="paraStrip">
            <div class="picker-track" id="paraTrack"></div>
          </div>
          <div class="picker-pointer"></div>
        </div>
      </div>
      <div class="picker-actions">
        <button class="action-btn" id="openEpubBtn" type="button">Open EPUB</button>
      </div>
    </details>
  </div>

<script>
(() => {
  const textToRead = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  const PARAGRAPH_BREAK = "\n";

  let currentWPM = 400;
  // 0 = no length boost; default 50 gives an 8-letter word ≈ 1.80x and a
  // 13-letter word ≈ 2.80x; 100 nearly doubles that again (≈2.60x and 4.60x).
  let lengthStrength = 50;
  let commaPause     = 50;   // extra % for commas/semicolons/colons (50 → 1.5x)
  let periodPause    = 120;  // extra % for sentence ends            (120 → 2.2x)
  let paraPause      = 150;  // extra % for paragraph breaks         (150 → 2.5x)
  const LEN_THRESHOLD = 4;
  const LEN_SCALE = 250;

  function tokenize(text) {
    const tokens = [];
    const paragraphs = [];          // each is an array of token indices
    const paragraphStarts = [];     // first token index of each non-empty paragraph
    const tokenToPara = [];         // tokens[i] -> paragraph index, or -1 for breaks
    const wordTokenIndices = [];    // word ordinal -> token index (words only)
    const tokenToWordOrdinal = [];  // tokens[i] -> word ordinal, or -1 for breaks
    const sentenceStarts = [];      // token index of the first word of each sentence
    const paraTexts = text.split(/\n\n+/);
    let sentenceOpen = false;
    paraTexts.forEach((para, pi) => {
      const indices = [];
      const words = para.trim().split(/\s+/).filter(Boolean);
      for (const w of words) {
        const ti = tokens.length;
        if (!sentenceOpen) { sentenceStarts.push(ti); sentenceOpen = true; }
        tokenToPara.push(pi);
        tokenToWordOrdinal.push(wordTokenIndices.length);
        wordTokenIndices.push(ti);
        indices.push(ti);
        tokens.push(w);
        if (endsSentence(w)) sentenceOpen = false;
      }
      // A paragraph boundary always closes the current sentence.
      sentenceOpen = false;
      paragraphs.push(indices);
      if (indices.length) paragraphStarts.push(indices[0]);
      if (pi < paraTexts.length - 1) {
        tokenToPara.push(-1);
        tokenToWordOrdinal.push(-1);
        tokens.push(PARAGRAPH_BREAK);
      }
    });
    return {
      tokens, paragraphs, paragraphStarts, tokenToPara,
      wordTokenIndices, tokenToWordOrdinal, sentenceStarts,
    };
  }

  function orpIndex(word) {
    const n = word.length;
    if (n <= 1)  return 0;
    if (n <= 5)  return 1;
    if (n <= 9)  return 2;
    if (n <= 13) return 3;
    return 4;
  }

  // Detect terminal punctuation even when wrapped by closing quotes/brackets,
  // so sentence endings inside dialog (e.g. `last?"`) still land.
  const TRAILING_CLOSERS = /[")'\]”’]+$/;

  function endsSentence(token) {
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    return last === "." || last === "!" || last === "?";
  }

  function lengthMultiplier(len) {
    const extra = Math.max(0, len - LEN_THRESHOLD);
    return 1 + extra * (lengthStrength / LEN_SCALE);
  }

  function durationMultiplier(token) {
    if (token === PARAGRAPH_BREAK) return 1 + paraPause / 100;
    let m = lengthMultiplier(token.length);
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    if (last === "," || last === ";" || last === ":") m = Math.max(m, 1 + commaPause / 100);
    if (endsSentence(token)) m = Math.max(m, 1 + periodPause / 100);
    return m;
  }

  const wordEl   = document.getElementById("word");
  const beforeEl = document.getElementById("before");
  const orpEl    = document.getElementById("orp");
  const afterEl  = document.getElementById("after");

  function render(token) {
    if (token === PARAGRAPH_BREAK) {
      wordEl.classList.add("break");
      beforeEl.textContent = "";
      orpEl.textContent    = "—";
      afterEl.textContent  = "";
      return;
    }
    wordEl.classList.remove("break");
    const i = orpIndex(token);
    beforeEl.textContent = token.slice(0, i);
    orpEl.textContent    = token.charAt(i);
    afterEl.textContent  = token.slice(i + 1);
  }

  let {
    tokens, paragraphs, paragraphStarts, tokenToPara,
    wordTokenIndices, tokenToWordOrdinal, sentenceStarts,
  } = tokenize(textToRead);

  // ---------- Playback state machine ----------

  const STATE_PLAYING = "playing";
  const STATE_PAUSED  = "paused";
  const STATE_LOADING = "loading";
  const STATE_ERROR   = "error";

  let currentIdx     = 0;       // always points at the token currently displayed
  let pendingTimer   = null;    // single in-flight setTimeout cell
  let state          = STATE_PLAYING;
  let rampRemaining  = 0;       // 5..1 during ease-in after a resume, 0 otherwise
  let manuallySeeked = false;   // true once the user steps/scrubs during a pause
  let granularity    = "word";  // "word" | "sentence" | "paragraph"
  let sliderDragging = false;   // true while the user holds the position slider

  function setState(s) {
    state = s;
    document.body.classList.remove("paused", "loading", "error");
    if (s === STATE_PAUSED)       document.body.classList.add("paused");
    else if (s === STATE_LOADING) document.body.classList.add("loading");
    else if (s === STATE_ERROR)   document.body.classList.add("error");
  }

  function rampSpeedFactor() {
    // word 1 of resume = 0.5x, word 2 = 0.625x, ..., word 5 = 1.0x
    if (rampRemaining <= 0) return 1;
    return 0.5 + (5 - rampRemaining) * 0.125;
  }

  function play() {
    if (state !== STATE_PLAYING) return;
    if (currentIdx >= tokens.length) currentIdx = 0;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }

    const tok = tokens[currentIdx];
    render(tok);
    updateSeekUI();

    const baseMs = 60000 / currentWPM;
    let dur = baseMs * durationMultiplier(tok);
    if (rampRemaining > 0 && tok !== PARAGRAPH_BREAK) {
      dur = dur / rampSpeedFactor();
      rampRemaining--;
    }

    pendingTimer = setTimeout(() => {
      pendingTimer = null;
      currentIdx++;
      play();
    }, dur);
  }

  function pause() {
    if (state !== STATE_PLAYING) return;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    manuallySeeked = false;
    setState(STATE_PAUSED);
    updateSeekUI();
  }

  function resume() {
    if (state !== STATE_PAUSED) return;
    // After a deliberate seek, resume from the exact spot; for a plain
    // tap-to-pause, rewind a few words to help re-orient.
    currentIdx = manuallySeeked
      ? Math.min(currentIdx, tokens.length - 1)
      : rewindWords(currentIdx, 3);
    manuallySeeked = false;
    rampRemaining = 5;
    setState(STATE_PLAYING);
    play();
  }

  function togglePlay() {
    if (state === STATE_PLAYING) pause();
    else if (state === STATE_PAUSED) resume();
  }

  function rewindWords(from, count) {
    let i = Math.min(from, tokens.length - 1);
    let rewound = 0;
    while (rewound < count && i > 0) {
      i--;
      if (tokens[i] !== PARAGRAPH_BREAK) rewound++;
    }
    return i;
  }

  // ---------- Position navigation ----------

  function wordOrdinalAt(idx) {
    if (!wordTokenIndices.length) return 0;
    let i = Math.max(0, Math.min(idx, tokens.length - 1));
    if (tokenToWordOrdinal[i] >= 0) return tokenToWordOrdinal[i];
    // Landed on a paragraph break: snap to the next word, else the previous.
    let f = i;
    while (f < tokens.length && tokenToWordOrdinal[f] < 0) f++;
    if (f < tokens.length) return tokenToWordOrdinal[f];
    while (i >= 0 && tokenToWordOrdinal[i] < 0) i--;
    return i >= 0 ? tokenToWordOrdinal[i] : 0;
  }

  function ordinalToIdx(ord) {
    if (!wordTokenIndices.length) return 0;
    const o = Math.max(0, Math.min(ord, wordTokenIndices.length - 1));
    return wordTokenIndices[o];
  }

  function currentWordIdx(from) {
    return ordinalToIdx(wordOrdinalAt(from));
  }

  function stepWord(from, dir) {
    return ordinalToIdx(wordOrdinalAt(from) + dir);
  }

  function stepSentence(from, dir) {
    if (!sentenceStarts.length) return from;
    const cur = currentWordIdx(from);
    const si = lastIndexAtMost(sentenceStarts, cur);
    if (dir < 0) {
      // If mid-sentence, snap to the start of the current sentence first.
      if (cur > sentenceStarts[si]) return sentenceStarts[si];
      return sentenceStarts[Math.max(0, si - 1)];
    }
    return sentenceStarts[Math.min(sentenceStarts.length - 1, si + 1)];
  }

  function stepParagraph(from, dir) {
    if (!paragraphStarts.length) return from;
    const cur = currentWordIdx(from);
    const pi = lastIndexAtMost(paragraphStarts, cur);
    if (dir < 0) {
      // If mid-paragraph, snap to the start of the current paragraph first.
      if (cur > paragraphStarts[pi]) return paragraphStarts[pi];
      return paragraphStarts[Math.max(0, pi - 1)];
    }
    return paragraphStarts[Math.min(paragraphStarts.length - 1, pi + 1)];
  }

  // Largest index in a sorted ascending list whose value is <= target.
  function lastIndexAtMost(list, target) {
    let lo = 0, hi = list.length - 1, ans = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (list[mid] <= target) { ans = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    return ans;
  }

  function getParagraphIndex(idx) {
    if (idx < 0) return 0;
    if (idx >= tokens.length) return paragraphs.length - 1;
    if (tokenToPara[idx] >= 0) return tokenToPara[idx];
    // Land on a break: prefer next paragraph, fall back to previous.
    let i = idx;
    while (i < tokens.length && tokenToPara[i] < 0) i++;
    if (i < tokens.length) return tokenToPara[i];
    i = idx;
    while (i >= 0 && tokenToPara[i] < 0) i--;
    return Math.max(0, tokenToPara[i] || 0);
  }

  function seekTo(idx) {
    currentIdx = Math.max(0, Math.min(idx, tokens.length - 1));
    manuallySeeked = true;
    render(tokens[currentIdx]);
    updateSeekUI();
  }

  function stepFn() {
    if (granularity === "sentence")  return stepSentence;
    if (granularity === "paragraph") return stepParagraph;
    return stepWord;
  }

  function doStep(dir) {
    if (state === STATE_PLAYING) pause();
    seekTo(stepFn()(currentIdx, dir));
  }

  // ---------- Seek UI ----------

  const seekSliderEl  = document.getElementById("seekSlider");
  const seekReadoutEl = document.getElementById("seekReadout");
  const stepPrevEl    = document.getElementById("stepPrev");
  const stepNextEl    = document.getElementById("stepNext");
  const playLabelEl   = document.getElementById("playLabel");
  const grainBtns     = Array.from(document.querySelectorAll(".grain-btn"));

  function unitList() {
    if (granularity === "sentence")  return sentenceStarts;
    if (granularity === "paragraph") return paragraphStarts;
    return wordTokenIndices;
  }

  function unitIndexAt(idx) {
    const list = unitList();
    if (!list.length) return 0;
    return lastIndexAtMost(list, currentWordIdx(idx));
  }

  function updateSeekUI() {
    const total = wordTokenIndices.length;
    const wOrd = wordOrdinalAt(currentIdx);
    const frac = total > 1 ? wOrd / (total - 1) : 0;
    const pi = getParagraphIndex(currentIdx);

    seekReadoutEl.textContent =
      "word " + (total ? wOrd + 1 : 0).toLocaleString() + " / " + total.toLocaleString() +
      "   ·   ¶ " + (pi + 1) + " / " + paragraphs.length +
      "   ·   " + Math.round(frac * 100) + "%";

    const uMax = Math.max(0, unitList().length - 1);
    if (+seekSliderEl.max !== uMax) seekSliderEl.max = uMax;
    if (!sliderDragging) seekSliderEl.value = unitIndexAt(currentIdx);

    stepPrevEl.disabled = wOrd <= 0;
    stepNextEl.disabled = wOrd >= total - 1;

    playLabelEl.textContent = (state === STATE_PLAYING) ? "Pause" : "Play";
  }

  // ---------- Input ----------

  // Tap the word area (anywhere outside the controls) to play / pause.
  document.addEventListener("click", (e) => {
    if (e.target.closest(".controls")) return;
    if (e.target.closest(".status-overlay")) return;
    togglePlay();
  });

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); togglePlay(); return; }
    if (e.target === seekSliderEl) return; // let the range input handle arrows
    if (e.code === "ArrowLeft")       { e.preventDefault(); doStep(-1); }
    else if (e.code === "ArrowRight") { e.preventDefault(); doStep(1); }
    else if (e.code === "ArrowUp")    { e.preventDefault(); if (state === STATE_PLAYING) pause(); seekTo(stepParagraph(currentIdx, -1)); }
    else if (e.code === "ArrowDown")  { e.preventDefault(); if (state === STATE_PLAYING) pause(); seekTo(stepParagraph(currentIdx, 1)); }
  });

  // Position slider: grabbing it pauses; dragging scrubs by the current unit.
  function sliderSeek() {
    const list = unitList();
    if (!list.length) return;
    const v = Math.max(0, Math.min(parseInt(seekSliderEl.value, 10) || 0, list.length - 1));
    seekTo(list[v]);
  }
  seekSliderEl.addEventListener("pointerdown", () => {
    if (state === STATE_PLAYING) pause();
    sliderDragging = true;
  });
  seekSliderEl.addEventListener("keydown", () => {
    if (state === STATE_PLAYING) pause();
  });
  seekSliderEl.addEventListener("input", sliderSeek);
  function endSliderDrag() { sliderDragging = false; }
  seekSliderEl.addEventListener("change", endSliderDrag);
  window.addEventListener("pointerup", endSliderDrag);

  // Granularity selector.
  grainBtns.forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      granularity = btn.dataset.unit;
      grainBtns.forEach((b) => b.classList.toggle("is-active", b === btn));
      updateSeekUI();
    });
  });

  // Play / pause.
  document.getElementById("playPause").addEventListener("click", (e) => {
    e.stopPropagation();
    togglePlay();
  });

  // Step buttons with press-and-hold to repeat (slide through quickly).
  function bindHold(btn, dir) {
    let delayTimer = null;
    let repeatTimer = null;
    function stop() {
      if (delayTimer)  { clearTimeout(delayTimer);  delayTimer = null; }
      if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
      window.removeEventListener("pointerup", stop);
      window.removeEventListener("pointercancel", stop);
    }
    btn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      e.stopPropagation();
      doStep(dir);
      window.addEventListener("pointerup", stop);
      window.addEventListener("pointercancel", stop);
      delayTimer = setTimeout(() => {
        repeatTimer = setInterval(() => doStep(dir), 110);
      }, 350);
    });
  }
  bindHold(stepPrevEl, -1);
  bindHold(stepNextEl, 1);

  // ---------- Picker factory ----------

  const TICK_PX = 18;

  function createPicker(opts) {
    const { stripId, trackId, valueId, min, max, step, majorEvery, initial, onChange } = opts;
    const stripEl = document.getElementById(stripId);
    const trackEl = document.getElementById(trackId);
    const valueEl = document.getElementById(valueId);
    let current = initial;

    function buildTrack() {
      const frag = document.createDocumentFragment();
      for (let v = min; v <= max; v += step) {
        const t = document.createElement("div");
        const major = v % majorEvery === 0;
        t.className = major ? "tick major" : "tick";
        t.dataset.value = v;
        if (major) {
          const label = document.createElement("div");
          label.className = "tick-label";
          label.textContent = v;
          t.appendChild(label);
        }
        frag.appendChild(t);
      }
      trackEl.appendChild(frag);
    }

    function setEdgePadding() {
      const pad = (stripEl.clientWidth - TICK_PX) / 2;
      trackEl.style.paddingLeft  = pad + "px";
      trackEl.style.paddingRight = pad + "px";
    }

    function valueToScrollLeft(v) {
      return ((v - min) / step) * TICK_PX;
    }

    function scrollLeftToValue(sl) {
      const i = Math.round(sl / TICK_PX);
      const v = min + i * step;
      return Math.max(min, Math.min(max, v));
    }

    function syncFromScroll() {
      const v = scrollLeftToValue(stripEl.scrollLeft);
      if (v !== current) {
        current = v;
        valueEl.textContent = v;
        if (onChange) onChange(v);
      }
    }

    function scrollToValue(v, smooth) {
      stripEl.scrollTo({
        left: valueToScrollLeft(v),
        behavior: smooth ? "smooth" : "auto",
      });
    }

    function relayout() {
      setEdgePadding();
      scrollToValue(current, false);
    }

    buildTrack();
    valueEl.textContent = current;

    requestAnimationFrame(relayout);

    stripEl.addEventListener("scroll", syncFromScroll, { passive: true });

    stripEl.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        stripEl.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    trackEl.addEventListener("click", (e) => {
      const tick = e.target.closest(".tick");
      if (!tick) return;
      scrollToValue(parseInt(tick.dataset.value, 10), true);
    });

    window.addEventListener("resize", relayout);

    return { relayout };
  }

  createPicker({
    stripId: "wpmStrip", trackId: "wpmTrack", valueId: "wpmValue",
    min: 100, max: 800, step: 25, majorEvery: 100,
    initial: currentWPM,
    onChange: (v) => { currentWPM = v; },
  });

  const lenPicker = createPicker({
    stripId: "lenStrip", trackId: "lenTrack", valueId: "lenValue",
    min: 0, max: 100, step: 5, majorEvery: 25,
    initial: lengthStrength,
    onChange: (v) => { lengthStrength = v; },
  });

  const commaPicker = createPicker({
    stripId: "commaStrip", trackId: "commaTrack", valueId: "commaValue",
    min: 0, max: 200, step: 10, majorEvery: 50,
    initial: commaPause,
    onChange: (v) => { commaPause = v; },
  });

  const periodPicker = createPicker({
    stripId: "periodStrip", trackId: "periodTrack", valueId: "periodValue",
    min: 0, max: 300, step: 10, majorEvery: 100,
    initial: periodPause,
    onChange: (v) => { periodPause = v; },
  });

  const paraPicker = createPicker({
    stripId: "paraStrip", trackId: "paraTrack", valueId: "paraValue",
    min: 0, max: 400, step: 10, majorEvery: 100,
    initial: paraPause,
    onChange: (v) => { paraPause = v; },
  });

  // Pickers inside a closed <details> have no width to lay out against until
  // the panel is opened. Re-center them on first open.
  const settingsEl = document.getElementById("settings");
  settingsEl.addEventListener("toggle", () => {
    if (settingsEl.open) requestAnimationFrame(() => {
      lenPicker.relayout();
      commaPicker.relayout();
      periodPicker.relayout();
      paraPicker.relayout();
    });
  });

  // ---------- EPUB loading ----------

  const statusMsgEl     = document.getElementById("statusMsg");
  const statusRetryBtn  = document.getElementById("statusRetryBtn");
  const openEpubBtn     = document.getElementById("openEpubBtn");
  const epubFileInput   = document.getElementById("epubFileInput");

  const BLOCK_TAGS = new Set([
    "P", "DIV", "SECTION", "ARTICLE",
    "H1", "H2", "H3", "H4", "H5", "H6",
    "LI", "BLOCKQUOTE", "PRE", "DT", "DD",
  ]);
  const SKIP_TAGS = new Set([
    "SCRIPT", "STYLE", "NAV", "HEADER", "FOOTER",
    "ASIDE", "FORM", "BUTTON", "SELECT", "INPUT",
    "NOSCRIPT", "TEMPLATE", "IMG", "FIGURE", "FIGCAPTION",
  ]);

  function walkForText(node, buf) {
    if (!node) return;
    if (node.nodeType === Node.TEXT_NODE) {
      buf.push(node.nodeValue);
      return;
    }
    if (node.nodeType !== Node.ELEMENT_NODE) return;

    const tag = node.tagName.toUpperCase();
    if (SKIP_TAGS.has(tag)) return;
    if (tag === "BR") { buf.push("\n"); return; }

    const isBlock = BLOCK_TAGS.has(tag);
    if (isBlock) buf.push("\n\n");
    for (const child of node.childNodes) walkForText(child, buf);
    if (isBlock) buf.push("\n\n");
  }

  function extractTextFromDoc(docOrEl) {
    if (!docOrEl) return "";
    let root;
    if (docOrEl.nodeType === 9 /* DOCUMENT */) {
      root = docOrEl.body
        || (docOrEl.querySelector && docOrEl.querySelector("body"))
        || docOrEl.documentElement;
    } else if (docOrEl.nodeType === 1 /* ELEMENT */) {
      // epub.js' section.load() resolves with xml.documentElement (the <html>
      // element), not the Document. Look for body inside it; fall back to the
      // element itself if no body is present.
      const tag = docOrEl.tagName ? docOrEl.tagName.toUpperCase() : "";
      if (tag === "HTML") {
        root = (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl;
      } else {
        root = docOrEl;
      }
    } else {
      return "";
    }
    if (!root) return "";
    const buf = [];
    walkForText(root, buf);
    let text = buf.join("");
    text = text.replace(/ /g, " ");
    text = text.replace(/[^\S\n]+/g, " ");
    text = text.replace(/ ?\n ?/g, "\n");
    text = text.replace(/\n{3,}/g, "\n\n");
    return text.trim();
  }

  async function extractFullText(book) {
    const items = (book.spine && book.spine.spineItems) || [];
    if (!items.length) throw new Error("This EPUB has no readable spine items.");

    const parts = [];
    for (let i = 0; i < items.length; i++) {
      const section = items[i];
      statusMsgEl.textContent = "Parsing… " + (i + 1) + " / " + items.length;
      try {
        const doc = await section.load(book.load.bind(book));
        const text = extractTextFromDoc(doc);
        if (text) parts.push(text);
      } catch (sectionErr) {
        console.warn("Skipping section:", section && section.href, sectionErr);
      } finally {
        if (section && typeof section.unload === "function") {
          try { section.unload(); } catch (_) {}
        }
      }
    }
    return parts.join("\n\n");
  }

  function loadText(text) {
    const result = tokenize(text);
    tokens             = result.tokens;
    paragraphs         = result.paragraphs;
    paragraphStarts    = result.paragraphStarts;
    tokenToPara        = result.tokenToPara;
    wordTokenIndices   = result.wordTokenIndices;
    tokenToWordOrdinal = result.tokenToWordOrdinal;
    sentenceStarts     = result.sentenceStarts;
    currentIdx     = 0;
    rampRemaining  = 0;
    manuallySeeked = false;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    setState(STATE_PLAYING);
    play();
  }

  function showLoadError(msg) {
    setState(STATE_ERROR);
    statusMsgEl.classList.add("error");
    statusMsgEl.textContent = msg;
    statusRetryBtn.hidden = false;
  }

  async function loadEpub(file) {
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    rampRemaining = 0;
    setState(STATE_LOADING);
    statusMsgEl.classList.remove("error");
    statusRetryBtn.hidden = true;
    statusMsgEl.textContent = "Loading " + file.name + "…";

    let book = null;
    try {
      if (typeof ePub !== "function") {
        throw new Error("EPUB library failed to load. Check your connection.");
      }
      const buffer = await file.arrayBuffer();
      book = ePub(buffer);
      await book.ready;

      const text = await extractFullText(book);
      if (!text || text.length < 32) {
        throw new Error("No readable text found in this EPUB (it may be image-only or DRM-protected).");
      }
      loadText(text);
    } catch (err) {
      console.error("EPUB load failed:", err);
      showLoadError(err && err.message ? err.message : "Couldn't read that file.");
    } finally {
      if (book && typeof book.destroy === "function") {
        try { book.destroy(); } catch (_) {}
      }
    }
  }

  openEpubBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    epubFileInput.click();
  });

  statusRetryBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    epubFileInput.click();
  });

  epubFileInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";  // allow re-picking the same file
    if (file) loadEpub(file);
  });

  play();
})();
</script>
</body>
</html>
