<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>RSVP Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .main-area {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }

  .reader-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
    position: relative;
  }

  .reader {
    width: 100%;
    max-width: 36rem;
    transition: opacity 150ms ease;
  }
  body.paused .reader {
    opacity: 0;
    pointer-events: none;
  }

  .word-area {
    position: relative;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    padding: 0.45em 0;
  }

  .guide {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 14ch;
    max-width: 92%;
    height: 1px;
    background: rgba(255, 255, 255, 0.18);
    pointer-events: none;
  }
  .guide.top    { top: 0; }
  .guide.bottom { bottom: 0; }

  .guide-tick {
    position: absolute;
    left: 35%;
    transform: translateX(-50%);
    width: 2px;
    height: 0.22em;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 1px;
    pointer-events: none;
  }
  .guide-tick.top    { top: 0.12em; }
  .guide-tick.bottom { bottom: 0.12em; }

  .word {
    position: relative;
    height: 1em;
    line-height: 1;
  }

  .word span {
    position: absolute;
    top: 0;
    white-space: pre;
    font-variant-ligatures: none;
  }

  .word .before {
    right: calc(65% + 0.5ch);
    text-align: right;
  }

  .word .orp {
    left: 35%;
    transform: translateX(-50%);
    color: #e74c3c;
  }

  .word .after {
    left: calc(35% + 0.5ch);
  }

  .word.break .orp {
    color: rgba(232, 232, 232, 0.3);
  }

  /* ---------- Context view (paused state) ---------- */

  .context-view {
    position: absolute;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease;
    z-index: 50;
  }
  body.paused .context-view {
    opacity: 1;
    pointer-events: auto;
  }

  .context-text {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top, 0px) + 1rem) 1.25rem 1.5rem;
  }
  .context-text::-webkit-scrollbar { width: 6px; }
  .context-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .context-text-inner {
    max-width: 34rem;
    margin: 0 auto;
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Cambria, "Times New Roman", serif;
    font-size: 1.125rem;
    line-height: 1.7;
    color: #d8d8d8;
  }

  .context-para {
    margin: 0 0 1em;
    text-align: left;
  }
  .context-para:last-child { margin-bottom: 0; }

  .cw {
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    margin: 0 -1px;
    transition: background-color 100ms ease, color 100ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cw.current {
    background: rgba(231, 76, 60, 0.4);
    color: #ffffff;
  }
  .cw.flash {
    background: rgba(231, 76, 60, 0.8);
    color: #ffffff;
  }

  .context-footer {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.75rem 1rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(to top, #1a1a1a 78%, rgba(26, 26, 26, 0));
  }

  .resume-btn {
    padding: 1rem 3rem;
    background: #e74c3c;
    color: #ffffff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 0;
    border-radius: 999px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 6px 22px rgba(231, 76, 60, 0.4);
  }
  .resume-btn:active {
    background: #c0392b;
    transform: translateY(1px);
  }

  /* ---------- Seek bar (slim, visible while reading) ---------- */

  .seekbar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 22px;
    cursor: pointer;
    touch-action: none;
    z-index: 3;
    -webkit-tap-highlight-color: transparent;
  }
  .seekbar::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4px;
    background: rgba(255, 255, 255, 0.10);
  }
  .seekbar-fill {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0%;
    height: 4px;
    background: #e74c3c;
    pointer-events: none;
    transition: width 120ms linear;
  }
  body.loading .seekbar,
  body.error .seekbar {
    display: none;
  }

  /* ---------- Seek panel (full controls, paused state) ---------- */

  .seek-panel {
    width: 100%;
    max-width: 34rem;
    margin: 0 auto 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .seek-readout {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: rgba(207, 207, 207, 0.85);
    font-size: 0.8rem;
    letter-spacing: 0.02em;
  }

  .seek-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  .seek-slider::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.18);
  }
  .seek-slider::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.18);
  }
  .seek-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    margin-top: -7px;
    border-radius: 50%;
    background: #e74c3c;
    border: 2px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
  }
  .seek-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #e74c3c;
    border: 2px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
  }

  .seek-steps {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .step-btn {
    flex: 0 0 auto;
    min-width: 3rem;
    padding: 0.5rem 0.6rem;
    background: rgba(255, 255, 255, 0.06);
    color: #e8e8e8;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .step-btn:active {
    background: rgba(255, 255, 255, 0.16);
  }
  .step-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ---------- Status overlay (loading / error) ---------- */

  .status-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    text-align: center;
    background: #1a1a1a;
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms ease;
    z-index: 2;
  }
  body.loading .status-overlay,
  body.error   .status-overlay {
    opacity: 1;
    pointer-events: auto;
  }
  body.loading .reader,
  body.loading .context-view,
  body.error   .reader,
  body.error   .context-view {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  .status-msg {
    font-size: 1.05rem;
    color: #cfcfcf;
    line-height: 1.45;
    max-width: 28rem;
    font-variant-numeric: tabular-nums;
  }
  .status-msg.error {
    color: #e74c3c;
  }

  /* ---------- Action buttons ---------- */

  .action-btn {
    padding: 0.6rem 1.4rem;
    background: rgba(255, 255, 255, 0.06);
    color: #e8e8e8;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active {
    background: rgba(255, 255, 255, 0.14);
  }

  .picker-actions {
    display: flex;
    justify-content: center;
    padding-top: 0.5rem;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  /* ---------- Picker bars ---------- */

  .pickers {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
  }

  .picker {
    padding-top: 0.5rem;
    user-select: none;
    -webkit-user-select: none;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .picker-display {
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: #cfcfcf;
    font-size: 1.05rem;
    line-height: 1.4;
  }
  .picker-display .picker-unit {
    color: rgba(207, 207, 207, 0.55);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-left: 0.3em;
  }

  .strip-wrap {
    position: relative;
    height: 46px;
    margin-top: 0.25rem;
  }

  .picker-strip {
    position: absolute;
    inset: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    overscroll-behavior: contain;
    touch-action: pan-x;
  }
  .picker-strip::-webkit-scrollbar { display: none; }

  .picker-track {
    display: flex;
    align-items: flex-start;
    height: 100%;
    width: max-content;
  }

  .tick {
    flex: 0 0 18px;
    height: 100%;
    position: relative;
    scroll-snap-align: center;
    cursor: pointer;
  }
  .tick::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 4px;
    width: 1px;
    height: 8px;
    background: rgba(255, 255, 255, 0.22);
    transform: translateX(-50%);
  }
  .tick.major::before {
    height: 14px;
    background: rgba(255, 255, 255, 0.45);
  }
  .tick-label {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: rgba(255, 255, 255, 0.5);
    font-variant-numeric: tabular-nums;
  }

  .picker-pointer {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e74c3c;
    transform: translateX(-1px);
    pointer-events: none;
    z-index: 2;
    border-radius: 1px;
  }
  .picker-pointer::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -3px;
    width: 8px;
    height: 8px;
    background: #e74c3c;
    transform: translateX(-50%) rotate(45deg);
  }
</style>
</head>
<body>
  <div class="main-area">
    <div class="reader-wrap">
      <main class="reader" aria-label="RSVP reader">
        <div class="word-area">
          <div class="guide top"></div>
          <div class="guide-tick top"></div>
          <div class="word" id="word">
            <span class="before" id="before"></span><span class="orp" id="orp"></span><span class="after" id="after"></span>
          </div>
          <div class="guide-tick bottom"></div>
          <div class="guide bottom"></div>
        </div>
      </main>
      <div class="status-overlay" id="statusOverlay" aria-live="polite">
        <div class="status-msg" id="statusMsg">Loading…</div>
        <button class="action-btn" id="statusRetryBtn" type="button" hidden>Choose another file</button>
      </div>
      <div class="seekbar" id="seekbar" aria-hidden="true">
        <div class="seekbar-fill" id="seekbarFill"></div>
      </div>
    </div>

    <section class="context-view" id="contextView" aria-label="Reading context" aria-hidden="true">
      <div class="context-text" id="contextText">
        <div class="context-text-inner" id="contextTextInner"></div>
      </div>
      <div class="context-footer">
        <div class="seek-panel">
          <div class="seek-readout" id="seekReadout"></div>
          <input class="seek-slider" id="seekSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Seek by word">
          <div class="seek-steps">
            <button class="step-btn" id="prevPara" type="button" aria-label="Previous paragraph" title="Previous paragraph">◀¶</button>
            <button class="step-btn" id="prevSent" type="button" aria-label="Previous sentence" title="Previous sentence">◀S</button>
            <button class="step-btn" id="prevWord" type="button" aria-label="Previous word" title="Previous word">◀W</button>
            <button class="step-btn" id="nextWord" type="button" aria-label="Next word" title="Next word">W▶</button>
            <button class="step-btn" id="nextSent" type="button" aria-label="Next sentence" title="Next sentence">S▶</button>
            <button class="step-btn" id="nextPara" type="button" aria-label="Next paragraph" title="Next paragraph">¶▶</button>
          </div>
        </div>
        <button class="resume-btn" id="resumeBtn" type="button">Resume</button>
      </div>
    </section>
  </div>

  <input type="file" id="epubFileInput" accept=".epub,application/epub+zip" hidden>

  <div class="pickers">
    <div class="picker-actions">
      <button class="action-btn" id="openEpubBtn" type="button">Open EPUB</button>
    </div>
    <div class="picker" aria-label="Reading speed">
      <div class="picker-display"><span id="wpmValue">400</span><span class="picker-unit">WPM</span></div>
      <div class="strip-wrap">
        <div class="picker-strip" id="wpmStrip">
          <div class="picker-track" id="wpmTrack"></div>
        </div>
        <div class="picker-pointer"></div>
      </div>
    </div>
    <div class="picker" aria-label="Long word pause intensity">
      <div class="picker-display"><span id="lenValue">50</span><span class="picker-unit">LENGTH</span></div>
      <div class="strip-wrap">
        <div class="picker-strip" id="lenStrip">
          <div class="picker-track" id="lenTrack"></div>
        </div>
        <div class="picker-pointer"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const textToRead = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  const PARAGRAPH_BREAK = "\n";

  let currentWPM = 400;
  // 0 = no length boost; default 50 gives an 8-letter word ≈ 1.80x and a
  // 13-letter word ≈ 2.80x; 100 nearly doubles that again (≈2.60x and 4.60x).
  let lengthStrength = 50;
  const LEN_THRESHOLD = 4;
  const LEN_SCALE = 250;

  function tokenize(text) {
    const tokens = [];
    const paragraphs = [];          // each is an array of token indices
    const tokenToPara = [];         // tokens[i] -> paragraph index, or -1 for breaks
    const wordTokenIndices = [];    // word ordinal -> token index (words only)
    const tokenToWordOrdinal = [];  // tokens[i] -> word ordinal, or -1 for breaks
    const sentenceStarts = [];      // token index of the first word of each sentence
    const paraTexts = text.split(/\n\n+/);
    let sentenceOpen = false;
    paraTexts.forEach((para, pi) => {
      const indices = [];
      const words = para.trim().split(/\s+/).filter(Boolean);
      for (const w of words) {
        const ti = tokens.length;
        if (!sentenceOpen) { sentenceStarts.push(ti); sentenceOpen = true; }
        tokenToPara.push(pi);
        tokenToWordOrdinal.push(wordTokenIndices.length);
        wordTokenIndices.push(ti);
        indices.push(ti);
        tokens.push(w);
        if (endsSentence(w)) sentenceOpen = false;
      }
      // A paragraph boundary always closes the current sentence.
      sentenceOpen = false;
      paragraphs.push(indices);
      if (pi < paraTexts.length - 1) {
        tokenToPara.push(-1);
        tokenToWordOrdinal.push(-1);
        tokens.push(PARAGRAPH_BREAK);
      }
    });
    return { tokens, paragraphs, tokenToPara, wordTokenIndices, tokenToWordOrdinal, sentenceStarts };
  }

  function orpIndex(word) {
    const n = word.length;
    if (n <= 1)  return 0;
    if (n <= 5)  return 1;
    if (n <= 9)  return 2;
    if (n <= 13) return 3;
    return 4;
  }

  // Detect terminal punctuation even when wrapped by closing quotes/brackets,
  // so sentence endings inside dialog (e.g. `last?"`) still land.
  const TRAILING_CLOSERS = /[")'\]”’]+$/;

  function endsSentence(token) {
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    return last === "." || last === "!" || last === "?";
  }

  function lengthMultiplier(len) {
    const extra = Math.max(0, len - LEN_THRESHOLD);
    return 1 + extra * (lengthStrength / LEN_SCALE);
  }

  function durationMultiplier(token) {
    if (token === PARAGRAPH_BREAK) return 2.5;
    let m = lengthMultiplier(token.length);
    const trimmed = token.replace(TRAILING_CLOSERS, "");
    const last = trimmed.charAt(trimmed.length - 1);
    if (last === "," || last === ";" || last === ":") m = Math.max(m, 1.5);
    if (endsSentence(token)) m = Math.max(m, 2.2);
    return m;
  }

  const wordEl   = document.getElementById("word");
  const beforeEl = document.getElementById("before");
  const orpEl    = document.getElementById("orp");
  const afterEl  = document.getElementById("after");

  function render(token) {
    if (token === PARAGRAPH_BREAK) {
      wordEl.classList.add("break");
      beforeEl.textContent = "";
      orpEl.textContent    = "—";
      afterEl.textContent  = "";
      return;
    }
    wordEl.classList.remove("break");
    const i = orpIndex(token);
    beforeEl.textContent = token.slice(0, i);
    orpEl.textContent    = token.charAt(i);
    afterEl.textContent  = token.slice(i + 1);
  }

  let { tokens, paragraphs, tokenToPara, wordTokenIndices, tokenToWordOrdinal, sentenceStarts } = tokenize(textToRead);

  // ---------- Playback state machine ----------

  const STATE_PLAYING = "playing";
  const STATE_PAUSED  = "paused";
  const STATE_LOADING = "loading";
  const STATE_ERROR   = "error";

  let currentIdx     = 0;     // always points at the token currently displayed
  let pendingTimer   = null;  // single in-flight setTimeout cell
  let state          = STATE_PLAYING;
  let rampRemaining  = 0;     // 5..1 during ease-in after a resume, 0 otherwise
  let manuallySeeked = false; // true once the user steps/scrubs during a pause

  function setState(s) {
    state = s;
    document.body.classList.remove("paused", "loading", "error");
    if (s === STATE_PAUSED)       document.body.classList.add("paused");
    else if (s === STATE_LOADING) document.body.classList.add("loading");
    else if (s === STATE_ERROR)   document.body.classList.add("error");
  }

  function rampSpeedFactor() {
    // word 1 of resume = 0.5x, word 2 = 0.625x, ..., word 5 = 1.0x
    if (rampRemaining <= 0) return 1;
    return 0.5 + (5 - rampRemaining) * 0.125;
  }

  function play() {
    if (state !== STATE_PLAYING) return;
    if (currentIdx >= tokens.length) currentIdx = 0;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }

    const tok = tokens[currentIdx];
    render(tok);
    updateSeekUI();

    const baseMs = 60000 / currentWPM;
    let dur = baseMs * durationMultiplier(tok);
    if (rampRemaining > 0 && tok !== PARAGRAPH_BREAK) {
      dur = dur / rampSpeedFactor();
      rampRemaining--;
    }

    pendingTimer = setTimeout(() => {
      pendingTimer = null;
      currentIdx++;
      play();
    }, dur);
  }

  function pause() {
    if (state !== STATE_PLAYING) return;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    manuallySeeked = false;
    setState(STATE_PAUSED);
    contextViewEl.setAttribute("aria-hidden", "false");
    renderContext();
    updateSeekUI();
  }

  function resume() {
    if (state !== STATE_PAUSED) return;
    // After a deliberate seek, resume from the exact spot; for a plain
    // tap-to-pause, rewind a few words to help re-orient.
    currentIdx = manuallySeeked
      ? Math.min(currentIdx, tokens.length - 1)
      : rewindWords(currentIdx, 3);
    manuallySeeked = false;
    rampRemaining = 5;
    setState(STATE_PLAYING);
    contextViewEl.setAttribute("aria-hidden", "true");
    play();
  }

  function rewindWords(from, count) {
    let i = Math.min(from, tokens.length - 1);
    let rewound = 0;
    while (rewound < count && i > 0) {
      i--;
      if (tokens[i] !== PARAGRAPH_BREAK) rewound++;
    }
    return i;
  }

  // ---------- Position navigation ----------

  function wordOrdinalAt(idx) {
    if (!wordTokenIndices.length) return 0;
    let i = Math.max(0, Math.min(idx, tokens.length - 1));
    if (tokenToWordOrdinal[i] >= 0) return tokenToWordOrdinal[i];
    // Landed on a paragraph break: snap to the next word, else the previous.
    let f = i;
    while (f < tokens.length && tokenToWordOrdinal[f] < 0) f++;
    if (f < tokens.length) return tokenToWordOrdinal[f];
    while (i >= 0 && tokenToWordOrdinal[i] < 0) i--;
    return i >= 0 ? tokenToWordOrdinal[i] : 0;
  }

  function ordinalToIdx(ord) {
    if (!wordTokenIndices.length) return 0;
    const o = Math.max(0, Math.min(ord, wordTokenIndices.length - 1));
    return wordTokenIndices[o];
  }

  function currentWordIdx(from) {
    return ordinalToIdx(wordOrdinalAt(from));
  }

  function stepWord(from, dir) {
    return ordinalToIdx(wordOrdinalAt(from) + dir);
  }

  function stepSentence(from, dir) {
    if (!sentenceStarts.length) return from;
    const cur = currentWordIdx(from);
    let si = 0;
    for (let k = 0; k < sentenceStarts.length; k++) {
      if (sentenceStarts[k] <= cur) si = k; else break;
    }
    if (dir < 0) {
      // If mid-sentence, snap to the start of the current sentence first.
      if (cur > sentenceStarts[si]) return sentenceStarts[si];
      return sentenceStarts[Math.max(0, si - 1)];
    }
    return sentenceStarts[Math.min(sentenceStarts.length - 1, si + 1)];
  }

  function stepParagraph(from, dir) {
    const cur = currentWordIdx(from);
    const pi = getParagraphIndex(cur);
    if (dir < 0) {
      if (paragraphs[pi].length && cur > paragraphs[pi][0]) return paragraphs[pi][0];
      for (let p = pi - 1; p >= 0; p--) {
        if (paragraphs[p].length) return paragraphs[p][0];
      }
      return paragraphs[pi].length ? paragraphs[pi][0] : cur;
    }
    for (let p = pi + 1; p < paragraphs.length; p++) {
      if (paragraphs[p].length) return paragraphs[p][0];
    }
    return cur;
  }

  function seekTo(idx, opts) {
    opts = opts || {};
    currentIdx = Math.max(0, Math.min(idx, tokens.length - 1));
    manuallySeeked = true;
    render(tokens[currentIdx]);
    updateSeekUI();
    if (state === STATE_PAUSED && opts.updateContext !== false) {
      updateContextHighlight();
    }
  }

  function seekToFraction(frac) {
    if (!wordTokenIndices.length) return;
    const ord = Math.round(frac * (wordTokenIndices.length - 1));
    seekTo(ordinalToIdx(ord), { updateContext: false });
  }

  // ---------- Context view ----------

  const contextViewEl      = document.getElementById("contextView");
  const contextTextEl      = document.getElementById("contextText");
  const contextTextInnerEl = document.getElementById("contextTextInner");
  const resumeBtn          = document.getElementById("resumeBtn");

  // ---------- Seek UI ----------

  const seekbarEl     = document.getElementById("seekbar");
  const seekFillEl    = document.getElementById("seekbarFill");
  const seekSliderEl  = document.getElementById("seekSlider");
  const seekReadoutEl = document.getElementById("seekReadout");
  const prevBtns = ["prevPara", "prevSent", "prevWord"].map((id) => document.getElementById(id));
  const nextBtns = ["nextWord", "nextSent", "nextPara"].map((id) => document.getElementById(id));

  function updateSeekUI() {
    const total = wordTokenIndices.length;
    const ord = wordOrdinalAt(currentIdx);
    const frac = total > 1 ? ord / (total - 1) : 0;

    seekFillEl.style.width = (frac * 100) + "%";
    const max = Math.max(0, total - 1);
    if (+seekSliderEl.max !== max) seekSliderEl.max = max;
    seekSliderEl.value = ord;

    const pi = getParagraphIndex(currentIdx);
    seekReadoutEl.textContent =
      "word " + (total ? ord + 1 : 0).toLocaleString() + " / " + total.toLocaleString() +
      "  ·  ¶ " + (pi + 1) + " / " + paragraphs.length +
      "  ·  " + Math.round(frac * 100) + "%";

    const atStart = ord <= 0;
    const atEnd = ord >= max;
    prevBtns.forEach((b) => { b.disabled = atStart; });
    nextBtns.forEach((b) => { b.disabled = atEnd; });
  }

  function updateContextHighlight() {
    const hIdx = highlightIdx();
    const target = contextTextInnerEl.querySelector('.cw[data-idx="' + hIdx + '"]');
    if (!target) { renderContext(); return; }
    const prev = contextTextInnerEl.querySelector(".cw.current");
    if (prev && prev !== target) prev.classList.remove("current");
    target.classList.add("current");
    target.scrollIntoView({ block: "nearest" });
  }

  // How far either side of the current paragraph we render in the reading view.
  // Big enough to feel like a chapter you can scroll, small enough to stay snappy.
  const CONTEXT_WINDOW = 100;

  function highlightIdx() {
    // If we paused on a paragraph-break token, jump highlight to the next word.
    let i = currentIdx;
    while (i < tokens.length && tokens[i] === PARAGRAPH_BREAK) i++;
    return Math.min(i, tokens.length - 1);
  }

  function getParagraphIndex(idx) {
    if (idx < 0) return 0;
    if (idx >= tokens.length) return paragraphs.length - 1;
    if (tokenToPara[idx] >= 0) return tokenToPara[idx];
    // Land on a break: prefer next paragraph, fall back to previous.
    let i = idx;
    while (i < tokens.length && tokenToPara[i] < 0) i++;
    if (i < tokens.length) return tokenToPara[i];
    i = idx;
    while (i >= 0 && tokenToPara[i] < 0) i--;
    return Math.max(0, tokenToPara[i] || 0);
  }

  function renderContext() {
    const hIdx = highlightIdx();
    const paraIdx = getParagraphIndex(hIdx);

    // Render a large window around the current paragraph so the paused view
    // feels like a chapter you can read normally, not just a quote card.
    const startPara = Math.max(0, paraIdx - CONTEXT_WINDOW);
    const endPara   = Math.min(paragraphs.length - 1, paraIdx + CONTEXT_WINDOW);

    contextTextInnerEl.innerHTML = "";
    for (let pi = startPara; pi <= endPara; pi++) {
      const pEl = document.createElement("p");
      pEl.className = "context-para";
      const wIndices = paragraphs[pi];
      wIndices.forEach((wIdx, j) => {
        const span = document.createElement("span");
        span.className = "cw";
        if (wIdx === hIdx) span.classList.add("current");
        span.textContent = tokens[wIdx];
        span.dataset.idx = wIdx;
        pEl.appendChild(span);
        if (j < wIndices.length - 1) {
          pEl.appendChild(document.createTextNode(" "));
        }
      });
      contextTextInnerEl.appendChild(pEl);
    }

    const cur = contextTextInnerEl.querySelector(".cw.current");
    if (cur) cur.scrollIntoView({ block: "center" });
    else contextTextEl.scrollTop = 0;
  }

  function selectWord(idx, spanEl) {
    currentIdx = idx;
    manuallySeeked = true;
    render(tokens[currentIdx]);
    const prev = contextTextInnerEl.querySelector(".cw.current");
    if (prev && prev !== spanEl) prev.classList.remove("current");
    spanEl.classList.add("current");
    spanEl.classList.add("flash");
    setTimeout(() => spanEl.classList.remove("flash"), 240);
    updateSeekUI();
  }

  // ---------- Input ----------

  document.addEventListener("click", (e) => {
    if (state !== STATE_PLAYING) return;
    if (e.target.closest(".pickers")) return;
    if (e.target.closest("#seekbar")) return;
    pause();
  });

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      if (state === STATE_PLAYING) pause();
      else if (state === STATE_PAUSED) resume();
      return;
    }
    if (state !== STATE_PAUSED) return;
    let fn = null, dir = 0;
    if (e.code === "ArrowLeft")       { dir = -1; fn = e.shiftKey ? stepSentence : stepWord; }
    else if (e.code === "ArrowRight") { dir = 1;  fn = e.shiftKey ? stepSentence : stepWord; }
    else if (e.code === "ArrowUp")    { dir = -1; fn = stepParagraph; }
    else if (e.code === "ArrowDown")  { dir = 1;  fn = stepParagraph; }
    if (fn) {
      e.preventDefault();
      seekTo(fn(currentIdx, dir));
    }
  });

  resumeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    resume();
  });

  contextTextEl.addEventListener("click", (e) => {
    e.stopPropagation();
    const span = e.target.closest(".cw");
    if (!span) return;
    selectWord(parseInt(span.dataset.idx, 10), span);
  });

  // Slim progress bar: tap or drag to pause and scrub.
  let seekDragging = false;
  function fractionFromEvent(e) {
    const rect = seekbarEl.getBoundingClientRect();
    if (rect.width <= 0) return 0;
    return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  }
  seekbarEl.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (state === STATE_PLAYING) pause();
    if (state !== STATE_PAUSED) return;
    seekDragging = true;
    try { seekbarEl.setPointerCapture(e.pointerId); } catch (_) {}
    seekToFraction(fractionFromEvent(e));
  });
  seekbarEl.addEventListener("pointermove", (e) => {
    if (seekDragging) seekToFraction(fractionFromEvent(e));
  });
  function endSeekDrag(e) {
    if (!seekDragging) return;
    seekDragging = false;
    try { seekbarEl.releasePointerCapture(e.pointerId); } catch (_) {}
    if (state === STATE_PAUSED) renderContext();
  }
  seekbarEl.addEventListener("pointerup", endSeekDrag);
  seekbarEl.addEventListener("pointercancel", endSeekDrag);

  // Full slider: scrub live, re-center the context when released.
  seekSliderEl.addEventListener("click", (e) => e.stopPropagation());
  seekSliderEl.addEventListener("input", () => {
    seekTo(ordinalToIdx(parseInt(seekSliderEl.value, 10) || 0), { updateContext: false });
  });
  seekSliderEl.addEventListener("change", () => {
    if (state === STATE_PAUSED) renderContext();
  });

  // Step buttons.
  function bindStep(id, fn, dir) {
    document.getElementById(id).addEventListener("click", (e) => {
      e.stopPropagation();
      if (state !== STATE_PAUSED) return;
      seekTo(fn(currentIdx, dir));
    });
  }
  bindStep("prevPara", stepParagraph, -1);
  bindStep("prevSent", stepSentence, -1);
  bindStep("prevWord", stepWord, -1);
  bindStep("nextWord", stepWord, 1);
  bindStep("nextSent", stepSentence, 1);
  bindStep("nextPara", stepParagraph, 1);

  // ---------- Picker factory ----------

  const TICK_PX = 18;

  function createPicker(opts) {
    const { stripId, trackId, valueId, min, max, step, majorEvery, initial, onChange } = opts;
    const stripEl = document.getElementById(stripId);
    const trackEl = document.getElementById(trackId);
    const valueEl = document.getElementById(valueId);
    let current = initial;

    function buildTrack() {
      const frag = document.createDocumentFragment();
      for (let v = min; v <= max; v += step) {
        const t = document.createElement("div");
        const major = v % majorEvery === 0;
        t.className = major ? "tick major" : "tick";
        t.dataset.value = v;
        if (major) {
          const label = document.createElement("div");
          label.className = "tick-label";
          label.textContent = v;
          t.appendChild(label);
        }
        frag.appendChild(t);
      }
      trackEl.appendChild(frag);
    }

    function setEdgePadding() {
      const pad = (stripEl.clientWidth - TICK_PX) / 2;
      trackEl.style.paddingLeft  = pad + "px";
      trackEl.style.paddingRight = pad + "px";
    }

    function valueToScrollLeft(v) {
      return ((v - min) / step) * TICK_PX;
    }

    function scrollLeftToValue(sl) {
      const i = Math.round(sl / TICK_PX);
      const v = min + i * step;
      return Math.max(min, Math.min(max, v));
    }

    function syncFromScroll() {
      const v = scrollLeftToValue(stripEl.scrollLeft);
      if (v !== current) {
        current = v;
        valueEl.textContent = v;
        if (onChange) onChange(v);
      }
    }

    function scrollToValue(v, smooth) {
      stripEl.scrollTo({
        left: valueToScrollLeft(v),
        behavior: smooth ? "smooth" : "auto",
      });
    }

    buildTrack();
    valueEl.textContent = current;

    requestAnimationFrame(() => {
      setEdgePadding();
      scrollToValue(current, false);
    });

    stripEl.addEventListener("scroll", syncFromScroll, { passive: true });

    stripEl.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        stripEl.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    trackEl.addEventListener("click", (e) => {
      const tick = e.target.closest(".tick");
      if (!tick) return;
      scrollToValue(parseInt(tick.dataset.value, 10), true);
    });

    window.addEventListener("resize", () => {
      setEdgePadding();
      scrollToValue(current, false);
    });
  }

  createPicker({
    stripId: "wpmStrip", trackId: "wpmTrack", valueId: "wpmValue",
    min: 100, max: 800, step: 25, majorEvery: 100,
    initial: currentWPM,
    onChange: (v) => { currentWPM = v; },
  });

  createPicker({
    stripId: "lenStrip", trackId: "lenTrack", valueId: "lenValue",
    min: 0, max: 100, step: 5, majorEvery: 25,
    initial: lengthStrength,
    onChange: (v) => { lengthStrength = v; },
  });

  // ---------- EPUB loading ----------

  const statusMsgEl     = document.getElementById("statusMsg");
  const statusRetryBtn  = document.getElementById("statusRetryBtn");
  const openEpubBtn     = document.getElementById("openEpubBtn");
  const epubFileInput   = document.getElementById("epubFileInput");

  const BLOCK_TAGS = new Set([
    "P", "DIV", "SECTION", "ARTICLE",
    "H1", "H2", "H3", "H4", "H5", "H6",
    "LI", "BLOCKQUOTE", "PRE", "DT", "DD",
  ]);
  const SKIP_TAGS = new Set([
    "SCRIPT", "STYLE", "NAV", "HEADER", "FOOTER",
    "ASIDE", "FORM", "BUTTON", "SELECT", "INPUT",
    "NOSCRIPT", "TEMPLATE", "IMG", "FIGURE", "FIGCAPTION",
  ]);

  function walkForText(node, buf) {
    if (!node) return;
    if (node.nodeType === Node.TEXT_NODE) {
      buf.push(node.nodeValue);
      return;
    }
    if (node.nodeType !== Node.ELEMENT_NODE) return;

    const tag = node.tagName.toUpperCase();
    if (SKIP_TAGS.has(tag)) return;
    if (tag === "BR") { buf.push("\n"); return; }

    const isBlock = BLOCK_TAGS.has(tag);
    if (isBlock) buf.push("\n\n");
    for (const child of node.childNodes) walkForText(child, buf);
    if (isBlock) buf.push("\n\n");
  }

  function extractTextFromDoc(docOrEl) {
    if (!docOrEl) return "";
    let root;
    if (docOrEl.nodeType === 9 /* DOCUMENT */) {
      root = docOrEl.body
        || (docOrEl.querySelector && docOrEl.querySelector("body"))
        || docOrEl.documentElement;
    } else if (docOrEl.nodeType === 1 /* ELEMENT */) {
      // epub.js' section.load() resolves with xml.documentElement (the <html>
      // element), not the Document. Look for body inside it; fall back to the
      // element itself if no body is present.
      const tag = docOrEl.tagName ? docOrEl.tagName.toUpperCase() : "";
      if (tag === "HTML") {
        root = (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl;
      } else {
        root = docOrEl;
      }
    } else {
      return "";
    }
    if (!root) return "";
    const buf = [];
    walkForText(root, buf);
    let text = buf.join("");
    text = text.replace(/ /g, " ");
    text = text.replace(/[^\S\n]+/g, " ");
    text = text.replace(/ ?\n ?/g, "\n");
    text = text.replace(/\n{3,}/g, "\n\n");
    return text.trim();
  }

  async function extractFullText(book) {
    const items = (book.spine && book.spine.spineItems) || [];
    if (!items.length) throw new Error("This EPUB has no readable spine items.");

    const parts = [];
    for (let i = 0; i < items.length; i++) {
      const section = items[i];
      statusMsgEl.textContent = "Parsing… " + (i + 1) + " / " + items.length;
      try {
        const doc = await section.load(book.load.bind(book));
        const text = extractTextFromDoc(doc);
        if (text) parts.push(text);
      } catch (sectionErr) {
        console.warn("Skipping section:", section && section.href, sectionErr);
      } finally {
        if (section && typeof section.unload === "function") {
          try { section.unload(); } catch (_) {}
        }
      }
    }
    return parts.join("\n\n");
  }

  function loadText(text) {
    const result = tokenize(text);
    tokens             = result.tokens;
    paragraphs         = result.paragraphs;
    tokenToPara        = result.tokenToPara;
    wordTokenIndices   = result.wordTokenIndices;
    tokenToWordOrdinal = result.tokenToWordOrdinal;
    sentenceStarts     = result.sentenceStarts;
    currentIdx     = 0;
    rampRemaining  = 0;
    manuallySeeked = false;
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    setState(STATE_PLAYING);
    contextViewEl.setAttribute("aria-hidden", "true");
    play();
  }

  function showLoadError(msg) {
    setState(STATE_ERROR);
    statusMsgEl.classList.add("error");
    statusMsgEl.textContent = msg;
    statusRetryBtn.hidden = false;
  }

  async function loadEpub(file) {
    if (pendingTimer !== null) {
      clearTimeout(pendingTimer);
      pendingTimer = null;
    }
    rampRemaining = 0;
    setState(STATE_LOADING);
    statusMsgEl.classList.remove("error");
    statusRetryBtn.hidden = true;
    statusMsgEl.textContent = "Loading " + file.name + "…";

    let book = null;
    try {
      if (typeof ePub !== "function") {
        throw new Error("EPUB library failed to load. Check your connection.");
      }
      const buffer = await file.arrayBuffer();
      book = ePub(buffer);
      await book.ready;

      const text = await extractFullText(book);
      if (!text || text.length < 32) {
        throw new Error("No readable text found in this EPUB (it may be image-only or DRM-protected).");
      }
      loadText(text);
    } catch (err) {
      console.error("EPUB load failed:", err);
      showLoadError(err && err.message ? err.message : "Couldn't read that file.");
    } finally {
      if (book && typeof book.destroy === "function") {
        try { book.destroy(); } catch (_) {}
      }
    }
  }

  openEpubBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    epubFileInput.click();
  });

  statusRetryBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    epubFileInput.click();
  });

  epubFileInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";  // allow re-picking the same file
    if (file) loadEpub(file);
  });

  play();
})();
</script>
</body>
</html>
