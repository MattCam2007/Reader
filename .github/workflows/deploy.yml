name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject commit hash
        run: |
          HASH=$(git rev-parse --short HEAD)
          echo "Stamping build with $HASH"

          # Stamp the commit hash into the HTML build-version meta and the
          # service worker's cache version. The service worker now handles
          # cache-busting (a new hash = a new versioned cache that refetches
          # every asset once), so the old per-file JS import-path rewriting is
          # no longer needed and has been removed.
          find . -name "*.html" -not -path "./.git/*" \
            -exec sed -i "s/__COMMIT_HASH__/$HASH/g" {} +
          sed -i "s/__COMMIT_HASH__/$HASH/g" sw.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
