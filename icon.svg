<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 96 96">
  <!-- Navy border -->
  <rect width="96" height="96" rx="40" fill="#0d3a8a"/>
  <!-- Dark inner background -->
  <rect x="5" y="5" width="86" height="86" rx="36" fill="#04030a"/>
  <!-- Eye sclera -->
  <path d="M9 48Q48 14 87 48Q48 82 9 48Z" fill="#070420"/>
  <!-- Sclera lines left - bell curve opacity -->
  <rect x="11" y="36" width="14" height="1.5" rx="1" fill="#ff6eb4" opacity=".22"/>
  <rect x="11" y="41" width="16" height="1.5" rx="1" fill="#ff6eb4" opacity=".42"/>
  <rect x="11" y="46" width="13" height="1.5" rx="1" fill="#ff6eb4" opacity=".55"/>
  <rect x="11" y="51" width="15" height="1.5" rx="1" fill="#ff6eb4" opacity=".42"/>
  <rect x="11" y="56" width="11" height="1.5" rx="1" fill="#ff6eb4" opacity=".22"/>
  <!-- Sclera lines right - bell curve opacity -->
  <rect x="71" y="36" width="14" height="1.5" rx="1" fill="#ff6eb4" opacity=".22"/>
  <rect x="69" y="41" width="16" height="1.5" rx="1" fill="#ff6eb4" opacity=".42"/>
  <rect x="72" y="46" width="13" height="1.5" rx="1" fill="#ff6eb4" opacity=".55"/>
  <rect x="70" y="51" width="15" height="1.5" rx="1" fill="#ff6eb4" opacity=".42"/>
  <rect x="74" y="56" width="11" height="1.5" rx="1" fill="#ff6eb4" opacity=".22"/>
  <!-- Galaxy iris -->
  <circle cx="48" cy="48" r="21" fill="#050218"/>
  <!-- Stars -->
  <circle cx="35" cy="38" r="2.5" fill="#fff" opacity=".9"/>
  <circle cx="57" cy="36" r="1.5" fill="#fff" opacity=".74"/>
  <circle cx="62" cy="51" r="1.5" fill="#fff" opacity=".64"/>
  <circle cx="54" cy="60" r="2" fill="#fff" opacity=".69"/>
  <circle cx="31" cy="54" r="1" fill="#fff" opacity=".54"/>
  <circle cx="64" cy="42" r="1" fill="#fff" opacity=".49"/>
  <circle cx="40" cy="63" r="1" fill="#fff" opacity=".44"/>
  <circle cx="61" cy="43" r="1" fill="#fff" opacity=".59"/>
  <circle cx="36" cy="59" r="1.5" fill="#fff" opacity=".39"/>
  <circle cx="51" cy="33" r="1" fill="#fff" opacity=".52"/>
  <circle cx="43" cy="63" r="1" fill="#fff" opacity=".34"/>
  <!-- Purple pupil -->
  <circle cx="48" cy="48" r="9" fill="#7b3fe4"/>
  <!-- Iris text lines -->
  <rect x="39" y="44" width="18" height="1.5" rx="1" fill="#c09aff" opacity=".42"/>
  <rect x="41" y="49" width="14" height="1.5" rx="1" fill="#c09aff" opacity=".32"/>
  <!-- Highlight -->
  <circle cx="43" cy="43" r="3.2" fill="#c09aff" opacity=".68"/>
  <!-- Deep pupil center -->
  <circle cx="48" cy="48" r="3" fill="#18084a"/>
  <!-- Sky blue eye outline -->
  <path d="M9 48Q48 14 87 48Q48 82 9 48Z" fill="none" stroke="#0099ff" stroke-width="2.2"/>
  <!-- Pink vertical ORP ticks -->
  <line x1="48" y1="21" x2="48" y2="13" stroke="#ff6eb4" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="48" y1="75" x2="48" y2="83" stroke="#ff6eb4" stroke-width="2.4" stroke-linecap="round"/>
</svg>
