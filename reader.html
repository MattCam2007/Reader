<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
  :root {
    --bg: #1a1a1a;
    --fg: #e8e8e8;
    --content-fg: #d9d9d9;
    --muted: rgba(232, 232, 232, 0.5);
    --chrome-bg: rgba(22, 22, 22, 0.92);
    --panel-bg: #232323;
    --border: rgba(255, 255, 255, 0.12);
    --accent: #e74c3c;
    --shadow: rgba(0, 0, 0, 0.5);
  }
  body.theme-sepia {
    --bg: #f4ecd8;
    --fg: #5b4636;
    --content-fg: #5b4636;
    --muted: rgba(91, 70, 54, 0.6);
    --chrome-bg: rgba(244, 236, 216, 0.94);
    --panel-bg: #efe6cf;
    --border: rgba(91, 70, 54, 0.2);
    --accent: #b5651d;
    --shadow: rgba(91, 70, 54, 0.25);
  }
  body.theme-light {
    --bg: #ffffff;
    --fg: #1f1f1f;
    --content-fg: #262626;
    --muted: rgba(0, 0, 0, 0.45);
    --chrome-bg: rgba(255, 255, 255, 0.94);
    --panel-bg: #f4f4f4;
    --border: rgba(0, 0, 0, 0.12);
    --accent: #c0392b;
    --shadow: rgba(0, 0, 0, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    overscroll-behavior: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* ---------- Reading surface ---------- */

  .viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--bg);
    padding-top: calc(env(safe-area-inset-top, 0px) + 1.2rem);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1.4rem);
    padding-left: clamp(1.25rem, 6vw, 3rem);
    padding-right: clamp(1.25rem, 6vw, 3rem);
    z-index: 1;
  }

  .content {
    height: 100%;
    column-fill: auto;
    column-gap: 40px;
    transform: translate3d(0, 0, 0);
    will-change: transform;
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Cambria, "Times New Roman", serif;
    font-size: 19px;
    line-height: 1.62;
    color: var(--content-fg);
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
    overflow-wrap: break-word;
  }

  .content .blk-p {
    margin: 0;
    text-indent: 1.3em;
  }
  .content .chap > .blk-p:first-child,
  .content .blk-h1 + .blk-p,
  .content .blk-h2 + .blk-p,
  .content .blk-h3 + .blk-p,
  .content .blk-h4 + .blk-p,
  .content .blk-h5 + .blk-p,
  .content .blk-h6 + .blk-p {
    text-indent: 0;
  }

  .content .blk-h1,
  .content .blk-h2,
  .content .blk-h3,
  .content .blk-h4,
  .content .blk-h5,
  .content .blk-h6 {
    text-align: center;
    hyphens: none;
    -webkit-hyphens: none;
    line-height: 1.25;
    font-weight: 600;
    break-inside: avoid;
    margin: 0.2em 0 0.9em;
  }
  .content .blk-h1 { font-size: 1.7em; margin-top: 0.4em; }
  .content .blk-h2 { font-size: 1.4em; }
  .content .blk-h3 { font-size: 1.2em; }
  .content .chap { break-before: column; -webkit-column-break-before: always; }
  .content .chap:first-child { break-before: auto; -webkit-column-break-before: auto; }

  .content .blk-blockquote {
    margin: 0.8em 1.4em;
    font-style: italic;
    color: var(--muted);
    text-indent: 0;
  }
  .content .blk-li {
    margin: 0.3em 0 0.3em 1.4em;
    text-indent: 0;
    list-style: disc;
  }
  .content .blk-pre {
    white-space: pre-wrap;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.85em;
    text-indent: 0;
    margin: 0.6em 0;
  }

  /* ---------- Inline formatting (U6) ---------- */
  .content em, .content i { font-style: italic; }
  .content strong, .content b { font-weight: 700; }
  .content sup { font-size: 0.75em; vertical-align: super; }
  .content sub { font-size: 0.75em; vertical-align: sub; }
  .content code {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.88em;
    background: var(--border);
    padding: 0.05em 0.25em;
    border-radius: 3px;
  }
  .content a {
    color: var(--accent);
    text-decoration: none;
    pointer-events: auto;
  }
  .content small { font-size: 0.85em; }
  .content u { text-decoration: underline; }

  /* ---------- Images & figures (U5) ---------- */
  .content .blk-figure {
    margin: 0.8em 0;
    text-align: center;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
  }
  .content .blk-figure img,
  .content .blk-p img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }
  .content .blk-figcaption {
    font-size: 0.85em;
    color: var(--muted);
    text-align: center;
    text-indent: 0;
    margin: 0.3em 0;
  }
  body.images-off .content img,
  body.images-off .content .blk-figure { display: none; }

  /* ---------- Footnote popover (U7) ---------- */
  .note-popover-backdrop {
    position: fixed;
    inset: 0;
    z-index: 45;
    background: rgba(0, 0, 0, 0.3);
  }
  .note-popover {
    position: fixed;
    z-index: 46;
    background: var(--panel-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    box-shadow: 0 8px 30px var(--shadow);
    padding: 0.9rem 1.1rem;
    max-width: min(88vw, 26rem);
    max-height: 40vh;
    overflow-y: auto;
    font-size: 0.92rem;
    line-height: 1.55;
  }
  .note-popover .note-close {
    display: block;
    margin-top: 0.6rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  /* ---------- Top header (info only) ---------- */

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--chrome-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 1rem 0.7rem;
    text-align: center;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .book-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-sub {
    margin-top: 0.15rem;
    font-size: 0.7rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Bottom toolbar (thumb zone) ---------- */

  .bottombar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--chrome-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transition: opacity 220ms ease, transform 220ms ease;
  }
  body.chrome-hidden .topbar { opacity: 0; transform: translateY(-100%); pointer-events: none; }
  body.chrome-hidden .bottombar { opacity: 0; transform: translateY(100%); pointer-events: none; }

  .scrub {
    padding: 0.7rem 1.25rem 0.15rem;
  }
  .progress-label {
    margin-top: 0.05rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
  .toolbar {
    display: flex;
    align-items: stretch;
  }
  .tool {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    min-height: 60px;
    background: transparent;
    border: 0;
    color: var(--fg);
    font: inherit;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tool:active { background: var(--border); }
  .tool svg {
    width: 23px;
    height: 23px;
    display: block;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .tool span { line-height: 1; }

  .chip {
    background: var(--accent);
    color: #fff;
    border: 0;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    cursor: pointer;
  }
  .chip:active { opacity: 0.85; }

  /* chunky, easy-to-grab scrubber */
  input[type="range"].progress {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 28px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"].progress::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 3px;
    background: var(--border);
  }
  input[type="range"].progress::-moz-range-track {
    height: 4px;
    border-radius: 3px;
    background: var(--border);
  }
  input[type="range"].progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 26px;
    height: 26px;
    margin-top: -11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 5px var(--shadow);
  }
  input[type="range"].progress::-moz-range-thumb {
    width: 26px;
    height: 26px;
    border: 0;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 5px var(--shadow);
  }

  /* ---------- Drawers / sheets ---------- */

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0, 0, 0, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  body.show-toc .backdrop,
  body.show-settings .backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .toc {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    width: min(82vw, 22rem);
    z-index: 50;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    box-shadow: 0 0 40px var(--shadow);
    transform: translateX(-102%);
    transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
    display: flex;
    flex-direction: column;
  }
  body.show-toc .toc { transform: translateX(0); }
  .toc-head {
    flex: 0 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 0.9rem) 1rem 0.7rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .toc-list {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.4rem 0 calc(env(safe-area-inset-bottom, 0px) + 0.8rem);
  }
  .toc-item {
    display: block;
    width: 100%;
    min-height: 54px;
    text-align: left;
    background: transparent;
    border: 0;
    color: var(--fg);
    font: inherit;
    font-size: 0.98rem;
    line-height: 1.35;
    padding: 0.95rem 1.15rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .toc-item:active { background: var(--border); }
  .toc-item.depth-1 { padding-left: 2.1rem; font-size: 0.9rem; color: var(--muted); }
  .toc-item.depth-2 { padding-left: 3.1rem; font-size: 0.86rem; color: var(--muted); }
  .toc-empty { padding: 1rem; color: var(--muted); font-size: 0.85rem; }

  .settings {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0 auto;
    max-width: 34rem;
    z-index: 50;
    background: var(--panel-bg);
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 40px var(--shadow);
    border-radius: 1.1rem 1.1rem 0 0;
    transform: translateY(102%);
    transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
    padding: 0.6rem 1.1rem calc(env(safe-area-inset-bottom, 0px) + 1.4rem);
  }
  .settings::before {
    content: "";
    display: block;
    width: 38px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0.2rem auto 0.7rem;
  }
  body.show-settings .settings { transform: translateY(0); }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: 0; }
  .settings-label {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .seg {
    display: flex;
    gap: 0.45rem;
    align-items: center;
  }
  .seg-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    font: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.6rem 1rem;
    min-height: 44px;
    min-width: 3rem;
    border-radius: 999px;
    cursor: pointer;
  }
  .seg-btn:active { background: var(--border); }
  .seg-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .size-display {
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    min-width: 2.6rem;
    text-align: center;
    color: var(--fg);
  }

  /* ---------- Loading / error overlay ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    text-align: center;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease;
  }
  body.loading .overlay,
  body.error .overlay {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-msg {
    font-size: 1.02rem;
    color: var(--fg);
    line-height: 1.45;
    max-width: 28rem;
    font-variant-numeric: tabular-nums;
  }
  body.error .overlay-msg { color: var(--accent); }
  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  body.error .spinner { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- First-run coach hint ---------- */

  .coach {
    position: fixed;
    inset: 0;
    z-index: 55;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 1.5rem calc(env(safe-area-inset-bottom, 0px) + 4.5rem);
    pointer-events: none;
    opacity: 1;
    transition: opacity 400ms ease;
  }
  .coach.hide { opacity: 0; }
  .coach-card {
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    padding: 0.9rem 1.15rem;
    border-radius: 0.9rem;
    font-size: 0.86rem;
    line-height: 1.5;
    max-width: 19rem;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }
  .coach-card b { color: var(--accent); font-weight: 700; }
</style>
</head>
<body class="chrome-hidden">
  <div class="viewport" id="viewport">
    <div class="content" id="content"></div>
  </div>

  <header class="topbar" id="topbar">
    <div class="book-title" id="bookTitle">Reader</div>
    <div class="book-sub" id="bookSub">&nbsp;</div>
  </header>

  <footer class="bottombar" id="bottombar">
    <div class="scrub">
      <input type="range" class="progress" id="progress" min="0" max="0" value="0" step="1" aria-label="Reading position">
      <div class="progress-label" id="progressLabel">&nbsp;</div>
    </div>
    <div class="toolbar">
      <button class="tool" id="tocBtn" type="button" aria-label="Contents">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        <span>Contents</span>
      </button>
      <button class="tool" id="settingsBtn" type="button" aria-label="Display settings">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="10" cy="8" r="2.6"/><circle cx="15" cy="16" r="2.6"/></svg>
        <span>Display</span>
      </button>
      <button class="tool" id="openBtn" type="button" aria-label="Open EPUB">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6c-1.8-1.3-4.6-1.6-7-0.8v12c2.4-0.8 5.2-0.5 7 0.8 1.8-1.3 4.6-1.6 7-0.8V5.2c-2.4-0.8-5.2-0.5-7 0.8z"/><line x1="12" y1="6" x2="12" y2="18.8"/></svg>
        <span>Open</span>
      </button>
    </div>
  </footer>

  <div class="backdrop" id="backdrop"></div>

  <nav class="toc" id="toc" aria-label="Table of contents">
    <div class="toc-head">Contents</div>
    <div class="toc-list" id="tocList"></div>
  </nav>

  <section class="settings" id="settings" aria-label="Display settings">
    <div class="settings-row">
      <span class="settings-label">Theme</span>
      <div class="seg" id="themeSeg">
        <button class="seg-btn" data-theme="dark" type="button">Dark</button>
        <button class="seg-btn" data-theme="sepia" type="button">Sepia</button>
        <button class="seg-btn" data-theme="light" type="button">Light</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Text size</span>
      <div class="seg">
        <button class="seg-btn" id="sizeDown" type="button">&minus;</button>
        <span class="size-display" id="sizeDisplay">19</span>
        <button class="seg-btn" id="sizeUp" type="button">+</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Typeface</span>
      <div class="seg" id="fontSeg">
        <button class="seg-btn" data-font="serif" type="button">Serif</button>
        <button class="seg-btn" data-font="sans" type="button">Sans</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Images</span>
      <div class="seg" id="imagesSeg">
        <button class="seg-btn" data-images="true" type="button">On</button>
        <button class="seg-btn" data-images="false" type="button">Off</button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Note popovers</span>
      <div class="seg" id="notePopSeg">
        <button class="seg-btn" data-notepop="true" type="button">On</button>
        <button class="seg-btn" data-notepop="false" type="button">Off</button>
      </div>
    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="spinner" id="spinner"></div>
    <div class="overlay-msg" id="overlayMsg">Loading&hellip;</div>
    <button class="chip" id="overlayBtn" type="button" hidden>Open EPUB</button>
  </div>

  <div class="coach" id="coach" aria-hidden="true">
    <div class="coach-card">Tap the <b>center</b> for the menu.<br>Swipe or tap the <b>edges</b> to turn pages.</div>
  </div>

  <input type="file" id="fileInput" accept=".epub,application/epub+zip" hidden>

<script>
(() => {
  "use strict";

  const FONT_SERIF = 'Georgia, "Iowan Old Style", "Palatino Linotype", Cambria, "Times New Roman", serif';
  const FONT_SANS  = 'system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
  const COLUMN_GAP = 40;
  const MIN_SIZE = 14, MAX_SIZE = 30;

  // ---------- DOM ----------
  const viewport      = document.getElementById("viewport");
  const content       = document.getElementById("content");
  const bookTitleEl   = document.getElementById("bookTitle");
  const progressEl    = document.getElementById("progress");
  const progressLabel = document.getElementById("progressLabel");
  const tocBtn        = document.getElementById("tocBtn");
  const settingsBtn   = document.getElementById("settingsBtn");
  const openBtn       = document.getElementById("openBtn");
  const backdrop      = document.getElementById("backdrop");
  const tocListEl     = document.getElementById("tocList");
  const overlay       = document.getElementById("overlay");
  const overlayMsg    = document.getElementById("overlayMsg");
  const overlayBtn    = document.getElementById("overlayBtn");
  const fileInput     = document.getElementById("fileInput");
  const sizeDisplay   = document.getElementById("sizeDisplay");
  const bookSubEl     = document.getElementById("bookSub");
  const coachEl       = document.getElementById("coach");

  // ---------- URL params ----------
  const urlParams = new URLSearchParams(location.search);

  // ---------- State ----------
  let page = 0, total = 1, stride = 1;
  let bookId = "sample";
  const sectionEls = new Map();   // section href base -> wrapper element
  let headingToc = [];            // fallback TOC built from headings

  // Document model (built by buildDocModel after render+paginate)
  const doc = {
    words: [],          // [{node:Text, start, end, block, section}]
    blocks: [],         // [{el, type, section, wordStart, wordEnd}]
    sections: [],       // [{href, el, wordStart, wordEnd}]
    text: "",           // full concatenated plain text
    wordCharStart: [],  // char offset of each word in doc.text
  };

  let prefs = { v: 1, theme: "dark", font: "serif", size: 19, images: true, notePopovers: true };
  let blobUrls = []; // U5: track blob URLs for cleanup

  // ---------- Preferences ----------
  function loadPrefs() {
    try {
      const raw = localStorage.getItem("reader:prefs");
      if (raw) prefs = Object.assign(prefs, JSON.parse(raw));
    } catch (_) {}
    prefs.size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, prefs.size | 0 || 19));
    if (!prefs.v) prefs.v = 1;  // migrate pre-v1 prefs
  }
  function savePrefs() {
    try { localStorage.setItem("reader:prefs", JSON.stringify(prefs)); } catch (_) {}
  }
  function applyPrefs() {
    document.body.classList.remove("theme-sepia", "theme-light");
    if (prefs.theme === "sepia") document.body.classList.add("theme-sepia");
    else if (prefs.theme === "light") document.body.classList.add("theme-light");
    content.style.fontFamily = prefs.font === "sans" ? FONT_SANS : FONT_SERIF;
    content.style.fontSize = prefs.size + "px";
    sizeDisplay.textContent = prefs.size;
    document.querySelectorAll("#themeSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.theme === prefs.theme));
    document.querySelectorAll("#fontSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.font === prefs.font));
    document.querySelectorAll("#imagesSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.images === String(prefs.images)));
    document.querySelectorAll("#notePopSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.notepop === String(prefs.notePopovers)));
    document.body.classList.toggle("images-off", !prefs.images);
    const tc = { dark: "#1a1a1a", sepia: "#f4ecd8", light: "#ffffff" }[prefs.theme];
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta && tc) meta.setAttribute("content", tc);
  }

  // ---------- Position persistence ----------
  let saveTimer = null;
  function savePos() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      if (!bookId) return;
      const f = total > 1 ? page / (total - 1) : 0;
      // Always write fraction for library back-compat
      try { localStorage.setItem("reader:pos:" + bookId, JSON.stringify({ f })); } catch (_) {}
      // Write word-level locator if model is available
      if (doc.words.length) {
        try {
          const loc = currentLocator();
          if (loc) localStorage.setItem("reader:loc:" + bookId, JSON.stringify(loc));
        } catch (_) {}
      }
    }, 500);
  }
  function restorePos() {
    // Prefer word-level locator
    try {
      const raw = localStorage.getItem("reader:loc:" + bookId);
      if (raw && doc.words.length) {
        const loc = JSON.parse(raw);
        const wi = resolveLocator(loc);
        if (wi >= 0) {
          goTo(pageOfWord(wi), false);
          return;
        }
      }
    } catch (_) {}
    // Fall back to fraction
    let f = 0;
    try {
      const raw = localStorage.getItem("reader:pos:" + bookId);
      if (raw) f = JSON.parse(raw).f || 0;
    } catch (_) {}
    goTo(Math.round(f * (total - 1)), false);
  }

  // ---------- Rendering ----------
  function renderBook(sections) {
    // U5: revoke old blob URLs
    blobUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch (_) {} });
    blobUrls = [];
    content.innerHTML = "";
    sectionEls.clear();
    headingToc = [];
    docModelBuilt = false;
    const frag = document.createDocumentFragment();
    sections.forEach((sec, si) => {
      const wrap = document.createElement("div");
      wrap.className = "chap";
      if (sec.href) { wrap.dataset.href = sec.href; sectionEls.set(sec.href, wrap); }
      sec.blocks.forEach((b) => {
        const el = document.createElement(b.type === "figure" ? "div" : b.type);
        if (b.frag) el.appendChild(b.frag);
        else el.textContent = b.text;
        if (b.id) el.id = b.id;
        el.className = "blk blk-" + b.type;
        // U5: add class to figcaptions inside figures
        if (b.type === "figure") {
          el.querySelectorAll("figcaption").forEach(fc => fc.className = "blk-figcaption");
        }
        wrap.appendChild(el);
        if (b.type === "h1" || b.type === "h2") {
          headingToc.push({ label: b.text, el, depth: b.type === "h1" ? 0 : 1 });
        }
      });
      frag.appendChild(wrap);
    });
    content.appendChild(frag);
  }

  // ---------- Pagination ----------
  let docModelBuilt = false;
  function paginate(keepFraction) {
    // Capture position before re-layout: prefer word locator, fall back to fraction
    let savedLoc = null;
    const frac = (keepFraction && total > 1) ? page / (total - 1) : 0;
    if (keepFraction && docModelBuilt && doc.words.length) {
      savedLoc = currentLocator();
    }

    content.style.transition = "none";
    content.style.transform = "translate3d(0,0,0)";
    const colW = content.clientWidth;
    content.style.columnWidth = colW + "px";
    content.style.columnGap = COLUMN_GAP + "px";
    stride = colW + COLUMN_GAP;
    void content.offsetWidth; // force reflow before measuring
    total = Math.max(1, Math.round(content.scrollWidth / stride));
    progressEl.max = String(total - 1);

    // Build model on first paginate; re-paginates only re-measure geometry
    if (!docModelBuilt) {
      buildDocModel();
      docModelBuilt = true;
    }

    // Restore position: prefer locator, fall back to fraction
    if (savedLoc && doc.words.length) {
      const wi = resolveLocator(savedLoc);
      if (wi >= 0) {
        page = pageOfWord(wi);
      } else {
        page = Math.max(0, Math.min(total - 1, Math.round(frac * (total - 1))));
      }
    } else {
      page = Math.max(0, Math.min(total - 1, Math.round(frac * (total - 1))));
    }
    goTo(page, false);
  }

  function goTo(p, animate) {
    page = Math.max(0, Math.min(total - 1, p));
    content.style.transition = animate
      ? "transform 240ms cubic-bezier(0.22,0.61,0.36,1)"
      : "none";
    content.style.transform = "translate3d(" + (-(page * stride)) + "px,0,0)";
    updateProgress();
    savePos();
  }
  function next() { if (page < total - 1) goTo(page + 1, true); }
  function prev() { if (page > 0) goTo(page - 1, true); }

  function updateProgress() {
    progressEl.value = String(page);
    const pct = total > 1 ? Math.round((page / (total - 1)) * 100) : 100;
    progressLabel.textContent = "Page " + (page + 1) + " of " + total;
    if (bookSubEl) bookSubEl.textContent = pct + "%";
  }

  function pageOfElement(el) {
    const prevT = content.style.transform, prevTr = content.style.transition;
    content.style.transition = "none";
    content.style.transform = "translate3d(0,0,0)";
    const x = el.getBoundingClientRect().left - content.getBoundingClientRect().left;
    content.style.transform = prevT;
    content.style.transition = prevTr;
    return Math.max(0, Math.min(total - 1, Math.round(x / stride)));
  }

  // ---------- Document model ----------
  function buildDocModel() {
    doc.words.length = 0;
    doc.blocks.length = 0;
    doc.sections.length = 0;
    doc.text = "";
    doc.wordCharStart.length = 0;

    sectionBlockStart = [];
    const textParts = [];
    let charOffset = 0;

    const chaps = content.querySelectorAll(".chap");
    chaps.forEach((chap, si) => {
      const secEntry = { href: chap.dataset.href || "", el: chap, wordStart: doc.words.length, wordEnd: doc.words.length };
      doc.sections.push(secEntry);
      sectionBlockStart.push(doc.blocks.length);

      const blkEls = chap.querySelectorAll(".blk");
      blkEls.forEach((blkEl) => {
        const bi = doc.blocks.length;
        const blockEntry = { el: blkEl, type: blkEl.tagName.toLowerCase(), section: si, wordStart: doc.words.length, wordEnd: doc.words.length };
        doc.blocks.push(blockEntry);

        // Walk text nodes in this block
        const walker = document.createTreeWalker(blkEl, NodeFilter.SHOW_TEXT, null);
        let textNode;
        while ((textNode = walker.nextNode())) {
          const txt = textNode.nodeValue;
          if (!txt) continue;
          // Find word boundaries with regex
          const re = /\S+/g;
          let m;
          while ((m = re.exec(txt)) !== null) {
            const word = m[0];
            doc.wordCharStart.push(charOffset);
            doc.words.push({
              node: textNode,
              start: m.index,
              end: m.index + word.length,
              block: bi,
              section: si,
            });
            textParts.push(word);
            charOffset += word.length + 1; // +1 for space separator
          }
        }
        blockEntry.wordEnd = doc.words.length;
      });
      secEntry.wordEnd = doc.words.length;
    });

    doc.text = textParts.join(" ");
  }

  // --- Locator: portable position ---
  // sectionBlockStart[s] = index of first block in doc.blocks for section s
  let sectionBlockStart = [];

  function toLocator(globalWordIndex) {
    if (!doc.words.length) return null;
    const wi = Math.max(0, Math.min(doc.words.length - 1, globalWordIndex));
    const w = doc.words[wi];
    const blk = doc.blocks[w.block];
    const blockInSection = w.block - sectionBlockStart[w.section];
    return {
      s: w.section,
      b: blockInSection,
      w: wi - blk.wordStart,
    };
  }

  function resolveLocator(loc) {
    if (!loc || !doc.sections.length) return -1;
    const si = Math.max(0, Math.min(doc.sections.length - 1, loc.s || 0));
    const startBI = sectionBlockStart[si];
    const endBI = si + 1 < doc.sections.length ? sectionBlockStart[si + 1] : doc.blocks.length;
    const sectionBlockCount = endBI - startBI;
    if (!sectionBlockCount) return doc.sections[si].wordStart;
    const bi = Math.max(0, Math.min(sectionBlockCount - 1, loc.b || 0));
    const blk = doc.blocks[startBI + bi];
    const wordCount = blk.wordEnd - blk.wordStart;
    const wi = Math.max(0, Math.min(Math.max(0, wordCount - 1), loc.w || 0));
    return blk.wordStart + wi;
  }

  // --- Range geometry (no per-word spans) ---
  function wordRange(i) {
    const w = doc.words[i];
    if (!w) return null;
    const range = document.createRange();
    range.setStart(w.node, w.start);
    range.setEnd(w.node, w.end);
    return range;
  }

  function pageOfWord(i) {
    const range = wordRange(i);
    if (!range) return 0;
    // Temporarily reset transform to measure true position
    const prevT = content.style.transform;
    const prevTr = content.style.transition;
    content.style.transition = "none";
    content.style.transform = "translate3d(0,0,0)";
    const x = range.getBoundingClientRect().left - content.getBoundingClientRect().left;
    content.style.transform = prevT;
    content.style.transition = prevTr;
    return Math.max(0, Math.min(total - 1, Math.floor(x / stride)));
  }

  function wordAtPageStart(p) {
    if (!doc.words.length) return 0;
    // Binary search: find the first word whose page >= p
    let lo = 0, hi = doc.words.length - 1;
    let result = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >>> 1;
      const wp = pageOfWord(mid);
      if (wp < p) {
        lo = mid + 1;
      } else {
        result = mid;
        hi = mid - 1;
      }
    }
    return result;
  }

  function currentLocator() {
    return toLocator(wordAtPageStart(page));
  }

  function goToLocator(loc) {
    const wi = resolveLocator(loc);
    if (wi >= 0) goTo(pageOfWord(wi), false);
  }

  // --- Speed-reader bridge (dormant) ---
  function exportTokens() {
    return doc.words.map((w, i) => {
      const text = w.node.nodeValue.slice(w.start, w.end);
      // Insert break tokens between blocks
      const needsBreak = i > 0 && doc.words[i].block !== doc.words[i - 1].block;
      const tokens = [];
      if (needsBreak) tokens.push({ text: "\n", kind: "break" });
      tokens.push({ text, kind: "word" });
      return tokens;
    }).flat();
  }

  // ---------- Chrome / drawers ----------
  function toggleChrome() { document.body.classList.toggle("chrome-hidden"); }
  function dismissCoach() {
    if (coachEl && !coachEl.classList.contains("hide")) {
      coachEl.classList.add("hide");
      try { localStorage.setItem("reader:hinted", "1"); } catch (_) {}
    }
  }
  function closePanels() { document.body.classList.remove("show-toc", "show-settings"); }
  function openTOC() { closePanels(); document.body.classList.add("show-toc"); document.body.classList.remove("chrome-hidden"); }
  function openSettings() { closePanels(); document.body.classList.add("show-settings"); }

  // ---------- Footnote popovers (U7) ----------
  let activePopover = null;

  function isNoteRef(anchor) {
    if (!anchor || anchor.tagName !== "A") return false;
    const href = anchor.getAttribute("href") || "";
    if (!href.startsWith("#") && !href.includes("#")) return false;
    // Check epub:type or common note-ref patterns
    const epubType = anchor.getAttribute("epub:type") || anchor.getAttribute("data-epub-type") || "";
    if (epubType.includes("noteref")) return true;
    // Heuristic: link to a fragment whose target looks like a note (short text, or in a notes section)
    return href.includes("#");
  }

  function findNoteTarget(anchor) {
    const href = anchor.getAttribute("href") || "";
    const hashIdx = href.indexOf("#");
    if (hashIdx < 0) return null;
    const frag = href.slice(hashIdx + 1);
    if (!frag) return null;
    try {
      return content.querySelector("#" + CSS.escape(frag));
    } catch (_) {
      return null;
    }
  }

  function showNotePopover(anchor, target) {
    dismissNotePopover();
    const text = (target.textContent || "").trim();
    if (!text) return;

    // Position near the anchor
    const rect = anchor.getBoundingClientRect();
    const vpW = window.innerWidth;
    const vpH = window.innerHeight;

    const backdropEl = document.createElement("div");
    backdropEl.className = "note-popover-backdrop";
    backdropEl.addEventListener("click", dismissNotePopover);

    const pop = document.createElement("div");
    pop.className = "note-popover";
    pop.textContent = text;
    const closeBtn = document.createElement("button");
    closeBtn.className = "note-close";
    closeBtn.textContent = "Dismiss";
    closeBtn.type = "button";
    closeBtn.addEventListener("click", dismissNotePopover);
    pop.appendChild(closeBtn);

    document.body.appendChild(backdropEl);
    document.body.appendChild(pop);

    // Compute position after adding to DOM so we can measure
    const popRect = pop.getBoundingClientRect();
    let top = rect.bottom + 8;
    let left = Math.max(8, rect.left - popRect.width / 2 + rect.width / 2);
    // Keep within viewport
    if (left + popRect.width > vpW - 8) left = vpW - popRect.width - 8;
    if (left < 8) left = 8;
    if (top + popRect.height > vpH - 8) top = rect.top - popRect.height - 8;
    if (top < 8) top = 8;

    pop.style.top = top + "px";
    pop.style.left = left + "px";

    activePopover = { backdrop: backdropEl, popover: pop };
  }

  function dismissNotePopover() {
    if (!activePopover) return;
    activePopover.backdrop.remove();
    activePopover.popover.remove();
    activePopover = null;
  }

  function handleContentClick(e) {
    const anchor = e.target.closest("a[href]");
    if (!anchor || !content.contains(anchor)) return;
    e.preventDefault();
    e.stopPropagation();
    if (!prefs.notePopovers) {
      // Jump to target instead
      const target = findNoteTarget(anchor);
      if (target) goTo(pageOfElement(target), true);
      return;
    }
    if (isNoteRef(anchor)) {
      const target = findNoteTarget(anchor);
      if (target) {
        showNotePopover(anchor, target);
        return;
      }
    }
    // For non-note internal links, jump to target
    const target = findNoteTarget(anchor);
    if (target) goTo(pageOfElement(target), true);
  }

  // ---------- Table of contents ----------
  function buildTOC(epubToc) {
    const items = [];
    if (epubToc && epubToc.length) {
      epubToc.forEach((it) => items.push({ label: it.label, href: it.href, depth: it.depth }));
    } else if (headingToc.length > 1) {
      headingToc.forEach((h) => items.push({ label: h.label, el: h.el, depth: h.depth }));
    }
    tocListEl.innerHTML = "";
    if (!items.length) {
      const empty = document.createElement("div");
      empty.className = "toc-empty";
      empty.textContent = "No contents available.";
      tocListEl.appendChild(empty);
      return;
    }
    items.forEach((it) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "toc-item depth-" + Math.min(2, it.depth || 0);
      btn.textContent = it.label || "Untitled";
      btn.addEventListener("click", () => {
        const el = it.el || resolveHref(it.href);
        if (el) goTo(pageOfElement(el), false);
        closePanels();
      });
      tocListEl.appendChild(btn);
    });
  }

  function resolveHref(href) {
    if (!href) return null;
    const parts = href.split("#");
    const frag = parts[1];
    if (frag) {
      try {
        const e = content.querySelector("#" + CSS.escape(frag));
        if (e) return e;
      } catch (_) {}
    }
    const base = parts[0].split("/").pop();
    return sectionEls.get(base) || null;
  }

  function flattenToc(nodes, depth, acc) {
    (nodes || []).forEach((n) => {
      acc.push({ label: (n.label || "").trim() || "Untitled", href: n.href || "", depth: depth });
      if (n.subitems && n.subitems.length) flattenToc(n.subitems, depth + 1, acc);
    });
    return acc;
  }

  // ---------- Overlay ----------
  function showLoading(msg) {
    document.body.classList.remove("error");
    document.body.classList.add("loading");
    overlayBtn.hidden = true;
    overlayMsg.textContent = msg;
  }
  function showError(msg) {
    document.body.classList.remove("loading");
    document.body.classList.add("error");
    overlayMsg.textContent = msg;
    overlayBtn.hidden = false;
  }
  function clearOverlay() {
    document.body.classList.remove("loading", "error");
  }

  // ---------- EPUB text extraction ----------
  const RICH_INLINE = true; // U6: set false to revert to plain-text extraction
  const SEL = "h1,h2,h3,h4,h5,h6,p,div,blockquote,li,pre,dd,dt,figure,figcaption";
  const SKIP_SEL = "script,style,nav,header,footer,aside,form";
  const INLINE_TAGS = new Set(["b","strong","i","em","u","sup","sub","small","a","span","br","code","img"]);
  const SAFE_ATTRS = { a: new Set(["href"]), img: new Set(["src","alt"]) }; // per-tag safe attributes; id is always kept

  function sanitizeInline(srcNode) {
    const frag = document.createDocumentFragment();
    for (const child of srcNode.childNodes) {
      if (child.nodeType === 3) { // Text
        frag.appendChild(document.createTextNode(child.nodeValue));
      } else if (child.nodeType === 1) { // Element
        const tag = child.tagName.toLowerCase();
        if (INLINE_TAGS.has(tag)) {
          const el = document.createElement(tag);
          if (child.id) el.id = child.id;
          const allowed = SAFE_ATTRS[tag];
          if (allowed) {
            for (const attr of allowed) {
              if (child.hasAttribute(attr)) el.setAttribute(attr, child.getAttribute(attr));
            }
          }
          el.appendChild(sanitizeInline(child));
          frag.appendChild(el);
        } else {
          // Unwrap: keep children, drop the tag
          frag.appendChild(sanitizeInline(child));
        }
      }
    }
    return frag;
  }

  function rootOf(docOrEl) {
    if (!docOrEl) return null;
    if (docOrEl.nodeType === 9) {
      return docOrEl.body || (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl.documentElement;
    }
    if (docOrEl.nodeType === 1) {
      const tag = docOrEl.tagName ? docOrEl.tagName.toUpperCase() : "";
      if (tag === "HTML") return (docOrEl.querySelector && docOrEl.querySelector("body")) || docOrEl;
      return docOrEl;
    }
    return null;
  }

  function blocksFromDoc(docOrEl, imgUrls) {
    const root = rootOf(docOrEl);
    if (!root || !root.querySelectorAll) return [];
    const out = [];
    root.querySelectorAll(SEL).forEach((el) => {
      if (el.closest && el.closest(SKIP_SEL)) return;
      const tag0 = el.tagName.toLowerCase();
      // figure: emit as a single block (don't require leaf check — may contain figcaption)
      if (tag0 === "figure") {
        const block = { type: "figure", text: "", id: el.id || "" };
        if (RICH_INLINE) block.frag = sanitizeInline(el);
        if (block.frag) collectImgSrcs(block.frag, imgUrls);
        out.push(block);
        return;
      }
      if (tag0 === "figcaption") return; // handled inside figure
      if (el.querySelector(SEL)) return; // keep only leaf blocks to avoid duplicate text
      const text = (el.textContent || "").replace(/\s+/g, " ").trim();
      const hasImg = el.querySelector("img");
      if (!text && !hasImg) return;
      let tag = tag0;
      if (tag === "div" || tag === "dd" || tag === "dt") tag = "p";
      const block = { type: tag, text: text, id: el.id || "" };
      if (RICH_INLINE) {
        block.frag = sanitizeInline(el);
        collectImgSrcs(block.frag, imgUrls);
      }
      out.push(block);
    });
    return out;
  }

  // Collect img src attributes that need blob URL resolution
  function collectImgSrcs(frag, imgUrls) {
    if (!imgUrls) return;
    const imgs = frag.querySelectorAll ? frag.querySelectorAll("img") : [];
    imgs.forEach(img => {
      const src = img.getAttribute("src");
      if (src) imgUrls.push({ img, src });
    });
  }

  async function extractSections(book) {
    const items = (book.spine && book.spine.spineItems) || [];
    if (!items.length) throw new Error("This EPUB has no readable spine items.");
    const sections = [];
    const allImgUrls = []; // U5: collect {img, src} pairs for resolution
    for (let i = 0; i < items.length; i++) {
      const section = items[i];
      overlayMsg.textContent = "Parsing… " + (i + 1) + " / " + items.length;
      try {
        const sectionDoc = await section.load(book.load.bind(book));
        const imgUrls = [];
        const blocks = blocksFromDoc(sectionDoc, imgUrls);
        if (blocks.length) {
          const base = (section.href || ("sec" + i)).split("/").pop().split("#")[0];
          // Resolve relative img srcs against section href
          const sectionDir = (section.href || "").replace(/[^/]*$/, "");
          imgUrls.forEach(entry => {
            entry.resolvedSrc = sectionDir + entry.src;
          });
          allImgUrls.push(...imgUrls);
          sections.push({ href: base, blocks: blocks });
        }
      } catch (err) {
        console.warn("Skipping section:", section && section.href, err);
      } finally {
        if (section && typeof section.unload === "function") {
          try { section.unload(); } catch (_) {}
        }
      }
    }
    // U5: resolve image srcs to blob URLs via epub archive
    if (allImgUrls.length && book.archive) {
      await resolveImageUrls(allImgUrls, book);
    }
    return sections;
  }

  // U5: resolve collected img srcs to blob URLs
  async function resolveImageUrls(imgEntries, book) {
    for (const entry of imgEntries) {
      try {
        let blob = null;
        // Try epub.js archive methods
        if (book.archive && typeof book.archive.getBlob === "function") {
          blob = await book.archive.getBlob(entry.resolvedSrc);
        } else if (book.archive && typeof book.archive.request === "function") {
          const data = await book.archive.request(entry.resolvedSrc, "blob");
          if (data instanceof Blob) blob = data;
        }
        if (blob && blob.size > 0) {
          const url = URL.createObjectURL(blob);
          blobUrls.push(url);
          entry.img.setAttribute("src", url);
        } else {
          entry.img.removeAttribute("src");
        }
      } catch (err) {
        console.warn("Image resolve failed:", entry.src, err);
        entry.img.removeAttribute("src");
      }
    }
  }

  async function loadEpub(file) {
    showLoading("Loading " + file.name + "…");
    closePanels();
    let book = null;
    try {
      if (typeof ePub !== "function") {
        throw new Error("EPUB library failed to load. Check your connection.");
      }
      const buffer = await file.arrayBuffer();
      book = ePub(buffer);
      await book.ready;

      let epubToc = [];
      try {
        const nav = await book.loaded.navigation;
        epubToc = flattenToc(nav && nav.toc, 0, []);
      } catch (_) {}

      const sections = await extractSections(book);
      const chars = sections.reduce((n, s) => n + s.blocks.reduce((m, b) => m + b.text.length, 0), 0);
      if (chars < 32) {
        throw new Error("No readable text found (this EPUB may be image-only or DRM-protected).");
      }

      const meta = (book.packaging && book.packaging.metadata) || {};
      const title = (meta.title || file.name).trim();
      bookId = urlParams.get("id") || title || file.name;
      bookTitleEl.textContent = title;

      renderBook(sections);
      clearOverlay();
      requestAnimationFrame(() => {
        paginate(false);
        buildTOC(epubToc);
        restorePos();
        if (urlParams.get("selftest") === "1") {
          requestAnimationFrame(() => runSelftest());
        }
      });
    } catch (err) {
      console.error("EPUB load failed:", err);
      showError(err && err.message ? err.message : "Couldn't read that file.");
    } finally {
      if (book && typeof book.destroy === "function") {
        try { book.destroy(); } catch (_) {}
      }
    }
  }

  // ---------- Input: swipe + tap ----------
  let dragging = false, decided = null, startX = 0, startY = 0, baseTx = 0, startT = 0;
  let lastTouchEnd = 0;

  viewport.addEventListener("touchstart", (e) => {
    dismissCoach();
    if (e.touches.length !== 1 || total <= 1) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    baseTx = -(page * stride);
    decided = null; dragging = true;
    content.style.transition = "none";
  }, { passive: true });

  viewport.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (decided === null) {
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) decided = "h";
      else if (Math.abs(dy) > 12) decided = "v";
    }
    if (decided === "h") {
      e.preventDefault();
      let tx = baseTx + dx;
      const min = -((total - 1) * stride), max = 0;
      if (tx > max) tx = max + (tx - max) * 0.3;          // edge resistance
      if (tx < min) tx = min + (tx - min) * 0.3;
      content.style.transform = "translate3d(" + tx + "px,0,0)";
    }
  }, { passive: false });

  viewport.addEventListener("touchend", (e) => {
    if (!dragging) return;
    dragging = false;
    lastTouchEnd = Date.now();
    const t = e.changedTouches && e.changedTouches[0];
    const dx = t ? t.clientX - startX : 0;
    const dy = t ? t.clientY - startY : 0;
    if (decided === "h") {
      const threshold = Math.min(80, viewport.clientWidth * 0.18);
      if (dx <= -threshold) goTo(page + 1, true);
      else if (dx >= threshold) goTo(page - 1, true);
      else goTo(page, true);
    } else if (decided !== "v" && Math.abs(dx) < 10 && Math.abs(dy) < 10 && (Date.now() - startT) < 400) {
      handleTap(startX);
    }
  }, { passive: true });

  viewport.addEventListener("click", (e) => {
    dismissCoach();
    if (Date.now() - lastTouchEnd < 600) return; // ignore synthetic click after touch
    handleTap(e.clientX);
  });

  function handleTap(x) {
    // U7: dismiss popover on tap, don't page-turn
    if (activePopover) { dismissNotePopover(); return; }
    if (!document.body.classList.contains("chrome-hidden") &&
        (document.body.classList.contains("show-toc") || document.body.classList.contains("show-settings"))) {
      closePanels();
      return;
    }
    const w = viewport.clientWidth;
    if (x < w * 0.3) prev();
    else if (x > w * 0.7) next();
    else toggleChrome();
  }

  document.addEventListener("keydown", (e) => {
    if (activePopover && e.key === "Escape") { dismissNotePopover(); return; }
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.code === "Space") { e.preventDefault(); next(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); prev(); }
    else if (e.key === "Escape") closePanels();
  });

  // U7: intercept link clicks in content
  content.addEventListener("click", handleContentClick);

  // ---------- Wiring ----------
  tocBtn.addEventListener("click", openTOC);
  settingsBtn.addEventListener("click", openSettings);
  backdrop.addEventListener("click", closePanels);
  openBtn.addEventListener("click", () => fileInput.click());
  overlayBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (file) loadEpub(file);
  });

  progressEl.addEventListener("input", () => goTo(parseInt(progressEl.value, 10) || 0, false));

  document.getElementById("themeSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-theme]");
    if (!btn) return;
    prefs.theme = btn.dataset.theme;
    applyPrefs(); savePrefs();
  });
  document.getElementById("fontSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-font]");
    if (!btn) return;
    prefs.font = btn.dataset.font;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("imagesSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-images]");
    if (!btn) return;
    prefs.images = btn.dataset.images === "true";
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("notePopSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-notepop]");
    if (!btn) return;
    prefs.notePopovers = btn.dataset.notepop === "true";
    applyPrefs(); savePrefs();
  });
  document.getElementById("sizeDown").addEventListener("click", () => changeSize(-1));
  document.getElementById("sizeUp").addEventListener("click", () => changeSize(1));
  function changeSize(dir) {
    const next = Math.max(MIN_SIZE, Math.min(MAX_SIZE, prefs.size + dir * 2));
    if (next === prefs.size) return;
    prefs.size = next;
    applyPrefs(); savePrefs(); paginate(true);
  }

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => paginate(true), 150);
  });

  // ---------- Sample book ----------
  const SAMPLE_TEXT = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  function buildSample() {
    const blocks = [
      { type: "h1", text: "Pride and Prejudice" },
      { type: "h2", text: "Chapter I" },
    ];
    SAMPLE_TEXT.split(/\n{2,}/).forEach((p) => {
      const t = p.replace(/\s+/g, " ").trim();
      if (t) blocks.push({ type: "p", text: t });
    });
    return [{ href: "sample", blocks: blocks }];
  }

  // ---------- Load from URL ?src= ----------
  async function loadFromUrl(url) {
    showLoading("Fetching book…");
    closePanels();
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("Fetch failed: " + resp.status);
      const blob = await resp.blob();
      const filename = url.split("/").pop() || "book.epub";
      const file = new File([blob], filename, { type: "application/epub+zip" });
      await loadEpub(file);
    } catch (err) {
      console.error("URL load failed:", err);
      showError(err && err.message ? err.message : "Couldn't fetch that book.");
    }
  }

  // ---------- Selftest harness ----------
  function runSelftest() {
    const results = [];
    const assert = (label, ok) => { results.push((ok ? "PASS" : "FAIL") + ": " + label); };

    assert("doc.words populated", doc.words.length > 0);
    assert("doc.blocks populated", doc.blocks.length > 0);
    assert("doc.sections populated", doc.sections.length > 0);
    assert("doc.text non-empty", doc.text.length > 0);
    assert("wordCharStart aligned", doc.wordCharStart.length === doc.words.length);

    // Locator round-trip
    if (doc.words.length > 0) {
      const testIdx = Math.min(5, doc.words.length - 1);
      const loc = toLocator(testIdx);
      const resolved = resolveLocator(loc);
      assert("locator round-trip (word " + testIdx + ")", resolved === testIdx);
    }

    // exportTokens count
    const tokens = exportTokens();
    const wordTokens = tokens.filter(t => t.kind === "word");
    assert("exportTokens word count matches doc.words", wordTokens.length === doc.words.length);

    // Range geometry
    if (doc.words.length > 0) {
      const range = wordRange(0);
      assert("wordRange returns Range", range instanceof Range);
      const p = pageOfWord(0);
      assert("pageOfWord returns number >= 0", typeof p === "number" && p >= 0);
    }

    console.log("=== Reader Selftest ===");
    results.forEach(r => console.log(r));
    const failures = results.filter(r => r.startsWith("FAIL"));
    if (failures.length) {
      console.warn(failures.length + " test(s) failed");
    } else {
      console.log("All " + results.length + " tests passed");
    }
    return results;
  }

  // ---------- Init ----------
  loadPrefs();
  applyPrefs();
  let hinted = false;
  try { hinted = localStorage.getItem("reader:hinted") === "1"; } catch (_) {}
  if (hinted) coachEl.classList.add("hide");
  else setTimeout(dismissCoach, 6000);

  const srcUrl = urlParams.get("src");
  if (srcUrl) {
    // Load from URL (library handoff)
    loadFromUrl(srcUrl);
  } else {
    // Default sample
    bookId = urlParams.get("id") || "Pride and Prejudice (sample)";
    bookTitleEl.textContent = "Pride and Prejudice";
    renderBook(buildSample());
    requestAnimationFrame(() => {
      paginate(false);
      buildTOC([]);
      restorePos();
      if (urlParams.get("selftest") === "1") {
        requestAnimationFrame(() => runSelftest());
      }
    });
  }
})();
</script>
