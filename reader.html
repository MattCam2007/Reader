<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<link rel="stylesheet" href="css/reader.css">
<link rel="modulepreload" href="js/core/constants.js">
<link rel="modulepreload" href="js/core/events.js">
<link rel="modulepreload" href="js/core/prefs.js">
<link rel="modulepreload" href="js/core/state.js">
<link rel="modulepreload" href="js/reader-app.js">
</head>
<body class="chrome-hidden">
  <!-- Skip link for keyboard users (Phase 7) -->
  <a href="#content" class="reader-skip-link">Skip to content</a>

  <div class="reader-comfort-overlay" id="comfortOverlay">
    <div class="reader-comfort-dim" id="comfortDim"></div>
    <div class="reader-comfort-warm" id="comfortWarm"></div>
  </div>
  <div class="reader-viewport margin-normal" id="viewport">
    <div class="reader-content-clip" id="contentClip">
      <div class="reader-content" id="content"></div>
    </div>
  </div>

  <header class="reader-topbar" id="topbar">
    <div class="reader-book-title" id="bookTitle">Reader</div>
    <div class="reader-book-sub" id="bookSub">&nbsp;</div>
  </header>

  <footer class="reader-bottombar" id="bottombar">
    <div class="reader-scrub">
      <input type="range" class="reader-progress" id="progress" min="0" max="0" value="0" step="1" aria-label="Reading position">
      <div class="reader-progress-label" id="progressLabel" aria-live="polite">&nbsp;</div>
    </div>
    <div class="reader-toolbar">
      <button class="reader-tool" id="tocBtn" type="button" aria-label="Contents" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        <span>Contents</span>
      </button>
      <button class="reader-tool" id="settingsBtn" type="button" aria-label="Display settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="10" cy="8" r="2.6"/><circle cx="15" cy="16" r="2.6"/></svg>
        <span>Display</span>
      </button>
      <button class="reader-tool" id="searchBtn" type="button" aria-label="Search" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <span>Search</span>
      </button>
      <button class="reader-tool" id="openBtn" type="button" aria-label="Open EPUB">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6c-1.8-1.3-4.6-1.6-7-0.8v12c2.4-0.8 5.2-0.5 7 0.8 1.8-1.3 4.6-1.6 7-0.8V5.2c-2.4-0.8-5.2-0.5-7 0.8z"/><line x1="12" y1="6" x2="12" y2="18.8"/></svg>
        <span>Open</span>
      </button>
    </div>
  </footer>

  <div class="ui-backdrop" id="backdrop"></div>

  <nav class="reader-toc" id="toc" role="dialog" aria-modal="true" aria-label="Table of contents">
    <div class="reader-toc-head">Contents</div>
    <div class="reader-toc-list" id="tocList"></div>
  </nav>

  <div class="reader-search-panel" id="searchPanel" role="search" aria-label="Search in book">
    <div class="reader-search-head">
      <input class="reader-search-input" id="searchInput" type="search" placeholder="Search in book…" autocomplete="off">
    </div>
    <div class="reader-search-results" id="searchResults"></div>
  </div>

  <section class="reader-settings" id="settings" role="dialog" aria-modal="true" aria-label="Display settings">
    <div class="reader-settings-row">
      <span class="reader-settings-label">Theme</span>
      <div class="reader-seg" id="themeSeg">
        <button class="reader-seg-btn" data-theme="dark" type="button">Dark</button>
        <button class="reader-seg-btn" data-theme="sepia" type="button">Sepia</button>
        <button class="reader-seg-btn" data-theme="light" type="button">Light</button>
        <button class="reader-seg-btn" data-theme="oled" type="button">OLED</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Brightness</span>
      <div class="reader-seg reader-slider-row">
        <input type="range" id="brightnessSlider" min="30" max="100" value="100" class="reader-slider" aria-label="Brightness">
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Warmth</span>
      <div class="reader-seg reader-slider-row">
        <input type="range" id="warmthSlider" min="0" max="100" value="0" class="reader-slider" aria-label="Warmth">
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Text size</span>
      <div class="reader-seg">
        <button class="reader-seg-btn" id="sizeDown" type="button">&minus;</button>
        <span class="reader-size-display" id="sizeDisplay">19</span>
        <button class="reader-seg-btn" id="sizeUp" type="button">+</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Typeface</span>
      <div class="reader-seg" id="fontSeg">
        <button class="reader-seg-btn" data-font="serif" type="button">Serif</button>
        <button class="reader-seg-btn" data-font="sans" type="button">Sans</button>
        <button class="reader-seg-btn" data-font="dyslexic" type="button">Dyslexic</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Images</span>
      <div class="reader-seg" id="imagesSeg">
        <button class="reader-seg-btn" data-images="true" type="button">On</button>
        <button class="reader-seg-btn" data-images="false" type="button">Off</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Note popovers</span>
      <div class="reader-seg" id="notePopSeg">
        <button class="reader-seg-btn" data-notepop="true" type="button">On</button>
        <button class="reader-seg-btn" data-notepop="false" type="button">Off</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Line spacing</span>
      <div class="reader-seg">
        <button class="reader-seg-btn" id="lineHeightDown" type="button">&minus;</button>
        <span class="reader-size-display" id="lineHeightDisplay">1.6</span>
        <button class="reader-seg-btn" id="lineHeightUp" type="button">+</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Margins</span>
      <div class="reader-seg" id="marginSeg">
        <button class="reader-seg-btn" data-margin="narrow" type="button">Narrow</button>
        <button class="reader-seg-btn" data-margin="normal" type="button">Normal</button>
        <button class="reader-seg-btn" data-margin="wide" type="button">Wide</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Paragraphs</span>
      <div class="reader-seg" id="paraSeg">
        <button class="reader-seg-btn" data-para="indent" type="button">Indented</button>
        <button class="reader-seg-btn" data-para="spaced" type="button">Spaced</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Alignment</span>
      <div class="reader-seg" id="alignSeg">
        <button class="reader-seg-btn" data-align="justify" type="button">Justify</button>
        <button class="reader-seg-btn" data-align="left" type="button">Left</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Selection</span>
      <div class="reader-seg" id="selectionSeg">
        <button class="reader-seg-btn" data-sel="true" type="button">On</button>
        <button class="reader-seg-btn" data-sel="false" type="button">Off</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Page turn</span>
      <div class="reader-seg" id="pageAnimSeg">
        <button class="reader-seg-btn" data-anim="slide" type="button">Slide</button>
        <button class="reader-seg-btn" data-anim="fade" type="button">Fade</button>
        <button class="reader-seg-btn" data-anim="none" type="button">None</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Layout</span>
      <div class="reader-seg" id="layoutSeg">
        <button class="reader-seg-btn" data-layout="paginated" type="button">Paged</button>
        <button class="reader-seg-btn" data-layout="scroll" type="button">Scroll</button>
      </div>
    </div>
    <div class="reader-settings-row">
      <span class="reader-settings-label">Columns</span>
      <div class="reader-seg" id="columnsSeg">
        <button class="reader-seg-btn" data-cols="auto" type="button">Auto</button>
        <button class="reader-seg-btn" data-cols="1" type="button">1</button>
        <button class="reader-seg-btn" data-cols="2" type="button">2</button>
      </div>
    </div>
  </section>

  <div class="reader-overlay" id="overlay">
    <div class="reader-spinner" id="spinner"></div>
    <div class="reader-overlay-msg" id="overlayMsg">Loading&hellip;</div>
    <button class="ui-chip" id="overlayBtn" type="button" hidden>Open EPUB</button>
  </div>

  <div class="reader-coach" id="coach" role="status" aria-hidden="true">
    <div class="reader-coach-card">Tap the <b>center</b> for the menu.<br>Swipe or tap the <b>edges</b> to turn pages.</div>
  </div>

  <input type="file" id="fileInput" accept=".epub,application/epub+zip" hidden>

<script type="module" src="js/reader-app.js"></script>
</body>
</html>
