<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Reader</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<style>
  /* U17: OpenDyslexic - served from fonts/ dir when available */
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('fonts/OpenDyslexic-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('fonts/OpenDyslexic-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #1a1a1a;
    --fg: #e8e8e8;
    --content-fg: #d9d9d9;
    --muted: rgba(232, 232, 232, 0.5);
    --chrome-bg: rgba(22, 22, 22, 0.92);
    --panel-bg: #232323;
    --border: rgba(255, 255, 255, 0.12);
    --accent: #e74c3c;
    --shadow: rgba(0, 0, 0, 0.5);
  }
  body.theme-sepia {
    --bg: #f4ecd8;
    --fg: #5b4636;
    --content-fg: #5b4636;
    --muted: rgba(91, 70, 54, 0.6);
    --chrome-bg: rgba(244, 236, 216, 0.94);
    --panel-bg: #efe6cf;
    --border: rgba(91, 70, 54, 0.2);
    --accent: #b5651d;
    --shadow: rgba(91, 70, 54, 0.25);
  }
  body.theme-light {
    --bg: #ffffff;
    --fg: #1f1f1f;
    --content-fg: #262626;
    --muted: rgba(0, 0, 0, 0.45);
    --chrome-bg: rgba(255, 255, 255, 0.94);
    --panel-bg: #f4f4f4;
    --border: rgba(0, 0, 0, 0.12);
    --accent: #c0392b;
    --shadow: rgba(0, 0, 0, 0.18);
  }
  body.theme-oled {
    --bg: #000000;
    --fg: #cfcfcf;
    --content-fg: #bfbfbf;
    --muted: rgba(207, 207, 207, 0.5);
    --chrome-bg: rgba(0, 0, 0, 0.94);
    --panel-bg: #0a0a0a;
    --border: rgba(255, 255, 255, 0.1);
    --accent: #e74c3c;
    --shadow: rgba(0, 0, 0, 0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    overscroll-behavior: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* ---------- Reading surface ---------- */

  .viewport {
    --reading-margin: clamp(1.25rem, 6vw, 3rem);
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--bg);
    padding-top: calc(env(safe-area-inset-top, 0px) + 1.2rem);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1.4rem);
    padding-left: var(--reading-margin);
    padding-right: var(--reading-margin);
    z-index: 1;
  }

  .content {
    --reading-line-height: 1.62;
    height: 100%;
    column-fill: auto;
    column-gap: 40px;
    transform: translate3d(0, 0, 0);
    will-change: transform;
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Cambria, "Times New Roman", serif;
    font-size: 19px;
    line-height: var(--reading-line-height);
    color: var(--content-fg);
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
    overflow-wrap: break-word;
  }

  .content .blk-p {
    margin: 0;
    text-indent: 1.3em;
  }
  .content.para-spaced .blk-p { text-indent: 0; margin-bottom: 0.8em; }
  .content .chap > .blk-p:first-child,
  .content .blk-h1 + .blk-p,
  .content .blk-h2 + .blk-p,
  .content .blk-h3 + .blk-p,
  .content .blk-h4 + .blk-p,
  .content .blk-h5 + .blk-p,
  .content .blk-h6 + .blk-p {
    text-indent: 0;
  }

  .content .blk-h1,
  .content .blk-h2,
  .content .blk-h3,
  .content .blk-h4,
  .content .blk-h5,
  .content .blk-h6 {
    text-align: center;
    hyphens: none;
    -webkit-hyphens: none;
    line-height: 1.25;
    font-weight: 600;
    break-inside: avoid;
    margin: 0.2em 0 0.9em;
  }
  .content .blk-h1 { font-size: 1.7em; margin-top: 0.4em; }
  .content .blk-h2 { font-size: 1.4em; }
  .content .blk-h3 { font-size: 1.2em; }
  .content .chap { break-before: column; -webkit-column-break-before: always; }
  .content .chap:first-child { break-before: auto; -webkit-column-break-before: auto; }

  .content .blk-blockquote {
    margin: 0.8em 1.4em;
    font-style: italic;
    color: var(--muted);
    text-indent: 0;
  }
  .content .blk-li {
    margin: 0.3em 0 0.3em 1.4em;
    text-indent: 0;
    list-style: disc;
  }
  .content .blk-pre {
    white-space: pre-wrap;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.85em;
    text-indent: 0;
    margin: 0.6em 0;
  }

  /* ---------- Inline formatting (U6) ---------- */
  .content em, .content i { font-style: italic; }
  .content strong, .content b { font-weight: 700; }
  .content sup { font-size: 0.75em; vertical-align: super; }
  .content sub { font-size: 0.75em; vertical-align: sub; }
  .content code {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.88em;
    background: var(--border);
    padding: 0.05em 0.25em;
    border-radius: 3px;
  }
  .content a {
    color: var(--accent);
    text-decoration: none;
    pointer-events: auto;
  }
  .content small { font-size: 0.85em; }
  .content u { text-decoration: underline; }

  /* ---------- Images & figures (U5) ---------- */
  .content .blk-figure {
    margin: 0.8em 0;
    text-align: center;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
  }
  .content .blk-figure img,
  .content .blk-p img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }
  .content .blk-figcaption {
    font-size: 0.85em;
    color: var(--muted);
    text-align: center;
    text-indent: 0;
    margin: 0.3em 0;
  }
  body.images-off .content img,
  body.images-off .content .blk-figure { display: none; }

  /* ---------- Tables (U8) ---------- */
  .content .blk-table-wrap {
    margin: 0.8em 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-height: 80vh;
    overflow-y: auto;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
  }
  .content table {
    border-collapse: collapse;
    font-size: 0.9em;
    line-height: 1.4;
    text-indent: 0;
    text-align: left;
  }
  .content th, .content td {
    padding: 0.35em 0.65em;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  .content th {
    font-weight: 700;
    background: var(--border);
  }
  .content caption {
    font-size: 0.85em;
    color: var(--muted);
    text-align: center;
    padding: 0.3em 0;
    caption-side: bottom;
  }

  /* ---------- Footnote popover (U7) ---------- */
  .note-popover-backdrop {
    position: fixed;
    inset: 0;
    z-index: 45;
    background: rgba(0, 0, 0, 0.3);
  }
  .note-popover {
    position: fixed;
    z-index: 46;
    background: var(--panel-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    box-shadow: 0 8px 30px var(--shadow);
    padding: 0.9rem 1.1rem;
    max-width: min(88vw, 26rem);
    max-height: 40vh;
    overflow-y: auto;
    font-size: 0.92rem;
    line-height: 1.55;
  }
  .note-popover .note-close {
    display: block;
    margin-top: 0.6rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  /* ---------- Text selection (U11) ---------- */
  body.selection-on .content {
    user-select: text;
    -webkit-user-select: text;
  }
  .sel-bar {
    position: fixed;
    z-index: 47;
    display: flex;
    gap: 0.2rem;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    box-shadow: 0 4px 16px var(--shadow);
    padding: 0.3rem;
  }
  .sel-bar button {
    background: none;
    border: none;
    color: var(--fg);
    font: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.5rem 0.7rem;
    border-radius: 0.4rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .sel-bar button:active { background: var(--border); }

  /* ---------- Search (U12) ---------- */
  .search-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(88vw, 24rem);
    z-index: 50;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    box-shadow: 0 0 40px var(--shadow);
    transform: translateX(102%);
    transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
    display: flex;
    flex-direction: column;
  }
  body.show-search .search-panel { transform: translateX(0); }
  body.show-search .backdrop { opacity: 1; pointer-events: auto; }
  .search-head {
    flex: 0 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 0.8rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.6rem 0.8rem;
    font: inherit;
    font-size: 0.95rem;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-results {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.3rem 0;
  }
  .search-result {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    color: var(--fg);
    font: inherit;
    font-size: 0.9rem;
    line-height: 1.4;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .search-result:active { background: var(--border); }
  .search-result mark {
    background: rgba(231, 76, 60, 0.3);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }
  .search-empty {
    padding: 1.2rem;
    color: var(--muted);
    font-size: 0.88rem;
    text-align: center;
  }
  ::highlight(search-results) {
    background-color: rgba(231, 76, 60, 0.3);
    color: inherit;
  }

  /* ---------- Comfort overlay (U18) ---------- */
  .comfort-overlay {
    position: fixed;
    inset: 0;
    z-index: 29;
    pointer-events: none;
  }
  .comfort-dim {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
  }
  .comfort-warm {
    position: absolute;
    inset: 0;
    background: #ff8c00;
    opacity: 0;
    mix-blend-mode: multiply;
  }

  /* ---------- Scroll mode (U19) ---------- */
  body.layout-scroll .viewport {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  body.layout-scroll .content {
    height: auto;
    column-fill: initial;
    column-width: initial;
    column-gap: initial;
    column-count: initial;
    transform: none !important;
    will-change: auto;
    max-width: 42em;
    margin: 0 auto;
    padding-bottom: 4rem;
  }
  body.layout-scroll .scrub { display: none; }

  /* ---------- Page animation (U23) ---------- */
  .content.anim-fade {
    transition: opacity 180ms ease !important;
  }

  /* ---------- Top header (info only) ---------- */

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--chrome-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 1rem 0.7rem;
    text-align: center;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .book-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-sub {
    margin-top: 0.15rem;
    font-size: 0.7rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Bottom toolbar (thumb zone) ---------- */

  .bottombar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--chrome-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transition: opacity 220ms ease, transform 220ms ease;
  }
  body.chrome-hidden .topbar { opacity: 0; transform: translateY(-100%); pointer-events: none; }
  body.chrome-hidden .bottombar { opacity: 0; transform: translateY(100%); pointer-events: none; }

  .scrub {
    padding: 0.7rem 1.25rem 0.15rem;
  }
  .progress-label {
    margin-top: 0.05rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
  .toolbar {
    display: flex;
    align-items: stretch;
  }
  .tool {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    min-height: 60px;
    background: transparent;
    border: 0;
    color: var(--fg);
    font: inherit;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tool:active { background: var(--border); }
  .tool svg {
    width: 23px;
    height: 23px;
    display: block;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .tool span { line-height: 1; }

  .chip {
    background: var(--accent);
    color: #fff;
    border: 0;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    cursor: pointer;
  }
  .chip:active { opacity: 0.85; }

  /* chunky, easy-to-grab scrubber */
  input[type="range"].progress {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 28px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"].progress::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 3px;
    background: var(--border);
  }
  input[type="range"].progress::-moz-range-track {
    height: 4px;
    border-radius: 3px;
    background: var(--border);
  }
  input[type="range"].progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 26px;
    height: 26px;
    margin-top: -11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 5px var(--shadow);
  }
  input[type="range"].progress::-moz-range-thumb {
    width: 26px;
    height: 26px;
    border: 0;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 5px var(--shadow);
  }

  /* ---------- Drawers / sheets ---------- */

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0, 0, 0, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  body.show-toc .backdrop,
  body.show-settings .backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .toc {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    width: min(82vw, 22rem);
    z-index: 50;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    box-shadow: 0 0 40px var(--shadow);
    transform: translateX(-102%);
    transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
    display: flex;
    flex-direction: column;
  }
  body.show-toc .toc { transform: translateX(0); }
  .toc-head {
    flex: 0 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 0.9rem) 1rem 0.7rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .toc-list {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.4rem 0 calc(env(safe-area-inset-bottom, 0px) + 0.8rem);
  }
  .toc-item {
    display: block;
    width: 100%;
    min-height: 54px;
    text-align: left;
    background: transparent;
    border: 0;
    color: var(--fg);
    font: inherit;
    font-size: 0.98rem;
    line-height: 1.35;
    padding: 0.95rem 1.15rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .toc-item:active { background: var(--border); }
  .toc-item.depth-1 { padding-left: 2.1rem; font-size: 0.9rem; color: var(--muted); }
  .toc-item.depth-2 { padding-left: 3.1rem; font-size: 0.86rem; color: var(--muted); }
  .toc-empty { padding: 1rem; color: var(--muted); font-size: 0.85rem; }

  .settings {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0 auto;
    max-width: 34rem;
    z-index: 50;
    background: var(--panel-bg);
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 40px var(--shadow);
    border-radius: 1.1rem 1.1rem 0 0;
    transform: translateY(102%);
    transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
    padding: 0.6rem 1.1rem calc(env(safe-area-inset-bottom, 0px) + 1.4rem);
  }
  .settings::before {
    content: "";
    display: block;
    width: 38px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0.2rem auto 0.7rem;
  }
  body.show-settings .settings { transform: translateY(0); }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: 0; }
  .settings-label {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .seg {
    display: flex;
    gap: 0.45rem;
    align-items: center;
  }
  .seg-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    font: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.6rem 1rem;
    min-height: 44px;
    min-width: 3rem;
    border-radius: 999px;
    cursor: pointer;
  }
  .seg-btn:active { background: var(--border); }
  .seg-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .size-display {
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    min-width: 2.6rem;
    text-align: center;
    color: var(--fg);
  }

  /* ---------- Loading / error overlay ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    text-align: center;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease;
  }
  body.loading .overlay,
  body.error .overlay {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-msg {
    font-size: 1.02rem;
    color: var(--fg);
    line-height: 1.45;
    max-width: 28rem;
    font-variant-numeric: tabular-nums;
  }
  body.error .overlay-msg { color: var(--accent); }
  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  body.error .spinner { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- First-run coach hint ---------- */

  .coach {
    position: fixed;
    inset: 0;
    z-index: 55;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 1.5rem calc(env(safe-area-inset-bottom, 0px) + 4.5rem);
    pointer-events: none;
    opacity: 1;
    transition: opacity 400ms ease;
  }
  .coach.hide { opacity: 0; }
  .coach-card {
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    padding: 0.9rem 1.15rem;
    border-radius: 0.9rem;

<script>
(() => {
  "use strict";

  const FONT_SERIF = 'Georgia, "Iowan Old Style", "Palatino Linotype", Cambria, "Times New Roman", serif';
  const FONT_SANS  = 'system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
  const FONT_DYSLEXIC = '"OpenDyslexic", "Comic Sans MS", cursive';
  const FONT_MAP = { serif: FONT_SERIF, sans: FONT_SANS, dyslexic: FONT_DYSLEXIC };
  const COLUMN_GAP = 40;
  const MIN_SIZE = 14, MAX_SIZE = 30;

  // ---------- DOM ----------
  const viewport      = document.getElementById("viewport");
  const content       = document.getElementById("content");
  const bookTitleEl   = document.getElementById("bookTitle");
  const progressEl    = document.getElementById("progress");
  const progressLabel = document.getElementById("progressLabel");
  const tocBtn        = document.getElementById("tocBtn");
  const settingsBtn   = document.getElementById("settingsBtn");
  const openBtn       = document.getElementById("openBtn");
  const backdrop      = document.getElementById("backdrop");
  const tocListEl     = document.getElementById("tocList");
  const overlay       = document.getElementById("overlay");
  const overlayMsg    = document.getElementById("overlayMsg");
  const overlayBtn    = document.getElementById("overlayBtn");
  const fileInput     = document.getElementById("fileInput");
  const sizeDisplay   = document.getElementById("sizeDisplay");
  const bookSubEl     = document.getElementById("bookSub");
  const coachEl       = document.getElementById("coach");

  // ---------- URL params ----------
  const urlParams = new URLSearchParams(location.search);

  // ---------- State ----------
  let page = 0, total = 1, stride = 1;
  let bookId = "sample";
  const sectionEls = new Map();   // section href base -> wrapper element
  let headingToc = [];            // fallback TOC built from headings
  let chapterIndex = []; // [{label, page}] sorted by page, rebuilt on paginate

  // Document model (built by buildDocModel after render+paginate)
  const doc = {
    words: [],          // [{node:Text, start, end, block, section}]
    blocks: [],         // [{el, type, section, wordStart, wordEnd}]
    sections: [],       // [{href, el, wordStart, wordEnd}]
    text: "",           // full concatenated plain text
    wordCharStart: [],  // char offset of each word in doc.text
  };

  let prefs = { v: 1, theme: "dark", font: "serif", size: 19, weight: "regular", images: true, notePopovers: true, lineHeight: 1.62, margin: "normal", paraSpacing: "indent", align: "justify", hyphens: true, selection: true, brightness: 1, warmth: 0, pageAnim: "slide", layout: "paginated", columns: "auto" };
  let blobUrls = []; // U5: track blob URLs for cleanup

  // ---------- Preferences ----------
  function loadPrefs() {
    try {
      const raw = localStorage.getItem("reader:prefs");
      if (raw) prefs = Object.assign(prefs, JSON.parse(raw));
    } catch (_) {}
    prefs.size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, prefs.size | 0 || 19));
    if (!prefs.v) prefs.v = 1;  // migrate pre-v1 prefs
  }
  function savePrefs() {
    try { localStorage.setItem("reader:prefs", JSON.stringify(prefs)); } catch (_) {}
  }
  function applyPrefs() {
    document.body.classList.remove("theme-sepia", "theme-light", "theme-oled");
    if (prefs.theme === "sepia") document.body.classList.add("theme-sepia");
    else if (prefs.theme === "light") document.body.classList.add("theme-light");
    else if (prefs.theme === "oled") document.body.classList.add("theme-oled");
    content.style.fontFamily = FONT_MAP[prefs.font] || FONT_SERIF;
    content.style.fontWeight = prefs.weight === "medium" ? "500" : "400";
    content.style.fontSize = prefs.size + "px";
    sizeDisplay.textContent = prefs.size;
    document.querySelectorAll("#themeSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.theme === prefs.theme));
    document.querySelectorAll("#fontSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.font === prefs.font));
    document.querySelectorAll("#weightSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.weight === prefs.weight));
    document.querySelectorAll("#imagesSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.images === String(prefs.images)));
    document.querySelectorAll("#notePopSeg .seg-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.notepop === String(prefs.notePopovers)));
    document.body.classList.toggle("images-off", !prefs.images);
    // U15: spacing
    content.style.setProperty("--reading-line-height", String(prefs.lineHeight));
    const margins = { narrow: "1rem", normal: "clamp(1.25rem, 6vw, 3rem)", wide: "clamp(2rem, 10vw, 5rem)" };
    viewport.style.paddingLeft = margins[prefs.margin] || margins.normal;
    viewport.style.paddingRight = margins[prefs.margin] || margins.normal;
    content.classList.toggle("para-spaced", prefs.paraSpacing === "spaced");
    document.querySelectorAll("#marginSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.margin === prefs.margin));
    document.querySelectorAll("#paraSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.para === prefs.paraSpacing));
    const lhEl = document.getElementById("lineHeightDisplay");
    if (lhEl) lhEl.textContent = prefs.lineHeight.toFixed(1);
    // U16: alignment & hyphenation
    content.style.textAlign = prefs.align === "left" ? "left" : "justify";
    const hyph = prefs.hyphens ? "auto" : "none";
    content.style.hyphens = hyph;
    content.style.webkitHyphens = hyph;
    document.querySelectorAll("#alignSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.align === prefs.align));
    document.querySelectorAll("#hyphensSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.hyphens === String(prefs.hyphens)));
    // U11: selection toggle
    document.body.classList.toggle("selection-on", !!prefs.selection);
    document.querySelectorAll("#selectionSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.sel === String(prefs.selection)));
    // U23: page animation toggle
    document.querySelectorAll("#pageAnimSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.anim === prefs.pageAnim));
    // U19: layout mode + columns
    document.body.classList.toggle("layout-scroll", prefs.layout === "scroll");
    document.querySelectorAll("#layoutSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.layout === prefs.layout));
    document.querySelectorAll("#columnsSeg .seg-btn").forEach(b => b.classList.toggle("active", b.dataset.cols === prefs.columns));
    const tc = { dark: "#1a1a1a", sepia: "#f4ecd8", light: "#ffffff", oled: "#000000" }[prefs.theme];
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta && tc) meta.setAttribute("content", tc);
    // U18: comfort overlay
    const dimEl = document.getElementById("comfortDim");
    const warmEl = document.getElementById("comfortWarm");
    if (dimEl) dimEl.style.opacity = String(1 - (prefs.brightness || 1));
    if (warmEl) warmEl.style.opacity = String(prefs.warmth || 0);
    const brSlider = document.getElementById("brightnessSlider");
    if (brSlider) brSlider.value = String(Math.round((prefs.brightness || 1) * 100));
    const wmSlider = document.getElementById("warmthSlider");
    if (wmSlider) wmSlider.value = String(Math.round((prefs.warmth || 0) * 100));
  }

  // ---------- Position persistence ----------
  let saveTimer = null;
  function savePos() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      if (!bookId) return;
      let f;
      if (isScrollMode()) {
        const sh = viewport.scrollHeight - viewport.clientHeight;
        f = sh > 0 ? viewport.scrollTop / sh : 0;
      } else {
        f = total > 1 ? page / (total - 1) : 0;
      }
      // Always write fraction for library back-compat
      try { localStorage.setItem("reader:pos:" + bookId, JSON.stringify({ f })); } catch (_) {}
      // Write word-level locator if model is available
      if (doc.words.length) {
        try {
          const loc = currentLocator();
          if (loc) localStorage.setItem("reader:loc:" + bookId, JSON.stringify(loc));
        } catch (_) {}
      }
    }, 500);
  }
  function restorePos() {
    // Prefer word-level locator
    try {
      const raw = localStorage.getItem("reader:loc:" + bookId);
      if (raw && doc.words.length) {
        const loc = JSON.parse(raw);
        const wi = resolveLocator(loc);
        if (wi >= 0) {
          if (isScrollMode()) { scrollToWord(wi); }
          else { goTo(pageOfWord(wi), false); }
          return;
        }
      }
    } catch (_) {}
    // Fall back to fraction
    let f = 0;
    try {
      const raw = localStorage.getItem("reader:pos:" + bookId);
      if (raw) f = JSON.parse(raw).f || 0;
    } catch (_) {}
    if (isScrollMode()) {
      const sh = viewport.scrollHeight - viewport.clientHeight;
      viewport.scrollTop = Math.round(f * sh);
    } else {
      goTo(Math.round(f * (total - 1)), false);
    }
  }

  // ---------- Rendering ----------
  function renderBook(sections) {
    // U5: revoke old blob URLs
    blobUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch (_) {} });
    blobUrls = [];
    content.innerHTML = "";
    sectionEls.clear();
    headingToc = [];
    docModelBuilt = false;
    const frag = document.createDocumentFragment();
    sections.forEach((sec, si) => {
      const wrap = document.createElement("div");
      wrap.className = "chap";
      if (sec.href) { wrap.dataset.href = sec.href; sectionEls.set(sec.href, wrap); }
      sec.blocks.forEach((b) => {
        const el = document.createElement((b.type === "figure" || b.type === "table-wrap") ? "div" : b.type);
        if (b.frag) el.appendChild(b.frag);
        else el.textContent = b.text;
        if (b.id) el.id = b.id;
        el.className = "blk blk-" + b.type;
        // U5: add class to figcaptions inside figures
        if (b.type === "figure") {
          el.querySelectorAll("figcaption").forEach(fc => fc.className = "blk-figcaption");
        }
        wrap.appendChild(el);
        if (b.type === "h1" || b.type === "h2") {
          headingToc.push({ label: b.text, el, depth: b.type === "h1" ? 0 : 1 });
        }
      });
      frag.appendChild(wrap);
    });
    content.appendChild(frag);
  }

  // ---------- Pagination ----------
  let docModelBuilt = false;
  function isScrollMode() { return prefs.layout === "scroll"; }

  function paginate(keepFraction) {
    // Capture position before re-layout: prefer word locator, fall back to fraction
    let savedLoc = null;
    const frac = (keepFraction && total > 1) ? page / (total - 1) : 0;
    if (keepFraction && docModelBuilt && doc.words.length) {
      savedLoc = currentLocator();
    }

    if (isScrollMode()) {
      // Scroll mode: no columns, no transform
      content.style.columnWidth = "";
      content.style.columnGap = "";
      content.style.columnCount = "";
      content.style.transition = "none";
      content.style.transform = "none";
      total = 1;
      page = 0;
      progressEl.max = "0";
    } else {
      content.style.transition = "none";
      content.style.transform = "translate3d(0,0,0)";
      const vpW = content.clientWidth;
      // U19a: two-column support
      let cols = 1;
      if (prefs.columns === "2" || (prefs.columns === "auto" && vpW > 700)) {
        cols = 2;
      }
      const colW = cols === 2 ? Math.floor((vpW - COLUMN_GAP) / 2) : vpW;
      if (cols === 2) {
        content.style.columnCount = "2";
        content.style.columnWidth = "";
      } else {
        content.style.columnCount = "";
        content.style.columnWidth = vpW + "px";
      }
      content.style.columnGap = COLUMN_GAP + "px";
      // stride = full viewport width (both columns + gap = one "page")
      stride = vpW + COLUMN_GAP;
      void content.offsetWidth; // force reflow before measuring
      total = Math.max(1, Math.round(content.scrollWidth / stride));
      progressEl.max = String(total - 1);
    }

    // Build model on first paginate; re-paginates only re-measure geometry
    if (!docModelBuilt) {
      buildDocModel();
      docModelBuilt = true;
    }

    if (isScrollMode()) {
      // Restore scroll position from locator
      buildChapterIndex();
      if (savedLoc && doc.words.length) {
        const wi = resolveLocator(savedLoc);
        if (wi >= 0) scrollToWord(wi);
      }
      return;
    }

    // Restore position: prefer locator, fall back to fraction
    if (savedLoc && doc.words.length) {
      const wi = resolveLocator(savedLoc);
      if (wi >= 0) {
        page = pageOfWord(wi);
      } else {
        page = Math.max(0, Math.min(total - 1, Math.round(frac * (total - 1))));
      }
    } else {
      page = Math.max(0, Math.min(total - 1, Math.round(frac * (total - 1))));
    }
    buildChapterIndex();
    goTo(page, false);
  }

  // U19: scroll to a specific word in scroll mode
  function scrollToWord(wi) {
    const range = wordRange(wi);
    if (!range) return;
    const rect = range.getBoundingClientRect();
    viewport.scrollTop += rect.top - viewport.getBoundingClientRect().top - 20;
  }

  function goTo(p, animate) {
    const prevPage = page;
    page = Math.max(0, Math.min(total - 1, p));
    if (animate) console.log("goTo:", prevPage, "→", page, "stride:", stride, "tx:", -(page * stride));
    const anim = animate ? (prefs.pageAnim || "slide") : "none";
    if (anim === "fade") {
      content.style.transition = "opacity 140ms ease";
      content.style.opacity = "0";
      setTimeout(() => {
        content.style.transition = "none";
        content.style.transform = "translate3d(" + (-(page * stride)) + "px,0,0)";
        content.style.transition = "opacity 140ms ease";
        content.style.opacity = "1";
      }, 150);
    } else if (anim === "slide") {
      content.style.transition = "transform 240ms cubic-bezier(0.22,0.61,0.36,1)";
      content.style.transform = "translate3d(" + (-(page * stride)) + "px,0,0)";
    } else {
      content.style.transition = "none";
      content.style.transform = "translate3d(" + (-(page * stride)) + "px,0,0)";
    }
    updateProgress();
    savePos();
  }
  function next() { if (page < total - 1) goTo(page + 1, true); }
  function prev() { if (page > 0) goTo(page - 1, true); }

  function updateProgress() {
    if (isScrollMode()) {
      const sh = viewport.scrollHeight - viewport.clientHeight;
      const pct = sh > 0 ? Math.round((viewport.scrollTop / sh) * 100) : 100;
      progressLabel.textContent = pct + "% read";

  function runSearch(query) {

      if (query && query.length >= 2) {
        resultsEl.innerHTML = '<div class="search-empty">No results</div>';
      }
      return;
    }
    const lower = doc.text.toLowerCase();
    const q = query.toLowerCase();
    const hits = [];
    let pos = 0;
    while ((pos = lower.indexOf(q, pos)) !== -1 && hits.length < 200) {
      hits.push(pos);
      pos += q.length;
    }
    if (!hits.length) {
      resultsEl.innerHTML = '<div class="search-empty">No results</div>';
      return;

      const after = doc.text.slice(charOff + query.length, snippetEnd) + (snippetEnd < doc.text.length ? "\u2026" : "");

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "search-result";
      btn.appendChild(document.createTextNode(before));
      const mark = document.createElement("mark");
      mark.textContent = match;
      btn.appendChild(mark);
      btn.appendChild(document.createTextNode(after));

        const loc = toLocator(wi);
        if (loc) goToLocator(loc);

    selBar.className = "sel-bar";

      if (RICH_INLINE) {
        block.frag = sanitizeInline(el);
        collectImgSrcs(block.frag, imgUrls);
      }
      out.push(block);
    });
    return out;
  }

  // Collect img elements that need blob URL resolution
  function collectImgSrcs(frag, imgUrls) {
    if (!imgUrls) return;
    const imgs = frag.querySelectorAll ? frag.querySelectorAll("img") : [];
    imgs.forEach(img => {
      const src = img.dataset.origSrc || img.getAttribute("src");
      if (src) imgUrls.push({ img, src });
    });
  }

  async function extractSections(book) {
    const items = (book.spine && book.spine.spineItems) || [];
    if (!items.length) throw new Error("This EPUB has no readable spine items.");
    const sections = [];
    const allImgUrls = []; // U5: collect {img, src} pairs for resolution
    for (let i = 0; i < items.length; i++) {
      const section = items[i];
      overlayMsg.textContent = "Parsing… " + (i + 1) + " / " + items.length;
      try {
        const sectionDoc = await section.load(book.load.bind(book));
        const imgUrls = [];
        const blocks = blocksFromDoc(sectionDoc, imgUrls);
        if (blocks.length) {
          const base = (section.href || ("sec" + i)).split("/").pop().split("#")[0];
          // Resolve relative img srcs against section href
          const sectionDir = (section.href || "").replace(/[^/]*$/, "");
          imgUrls.forEach(entry => {
            entry.resolvedSrc = sectionDir + entry.src;
          });
          allImgUrls.push(...imgUrls);
          sections.push({ href: base, blocks: blocks });
        }
      } catch (err) {
        console.warn("Skipping section:", section && section.href, err);
      } finally {
        if (section && typeof section.unload === "function") {
          try { section.unload(); } catch (_) {}
        }
      }
    }
    // U5: resolve image srcs to blob URLs via epub archive
    if (allImgUrls.length && book.archive) {
      await resolveImageUrls(allImgUrls, book);
    }
    return sections;
  }

  // U5: resolve collected img srcs to blob URLs
  async function resolveImageUrls(imgEntries, book) {
    // Build manifest href lookup for fallback path matching
    let manifestPaths = [];
    try {
      const manifest = book.packaging && book.packaging.manifest;
      if (manifest) {
        Object.values(manifest).forEach(item => {
          if (item.href) manifestPaths.push(item.href);
        });
      }
    } catch (_) {}
    // Also try to enumerate the archive directly (JSZip)
    try {
      const arc = book.archive;
      if (arc && arc.urlCache) {
        Object.keys(arc.urlCache).forEach(k => {
          if (manifestPaths.indexOf(k) < 0) manifestPaths.push(k);
        });
      }
    } catch (_) {}

    for (const entry of imgEntries) {
      try {
        let blob = null;
        const pathsToTry = [entry.resolvedSrc];
        // Fallback: match by basename against manifest/archive paths
        const basename = entry.src.split("/").pop().toLowerCase();
        manifestPaths.forEach(p => {
          if (p.toLowerCase().endsWith("/" + basename) || p.toLowerCase() === basename) {
            if (pathsToTry.indexOf(p) < 0) pathsToTry.push(p);
          }
        });
        for (const tryPath of pathsToTry) {
          if (blob && blob.size > 0) break;
          try {
            if (book.archive && typeof book.archive.getBlob === "function") {
              blob = await book.archive.getBlob(tryPath);
            }
          } catch (_) {}
          if (!blob || !blob.size) {
            try {
              if (book.archive && typeof book.archive.request === "function") {
                const data = await book.archive.request(tryPath, "blob");
                if (data instanceof Blob) blob = data;
              }
            } catch (_) {}
          }
          if (!blob || !blob.size) {
            // Try via book.resources or book.load
            try {
              if (typeof book.load === "function") {
                const data = await book.load(tryPath);
                if (data instanceof Blob) blob = data;
              }
            } catch (_) {}
          }
        }
        if (blob && blob.size > 0) {
          const url = URL.createObjectURL(blob);
          blobUrls.push(url);
          entry.img.setAttribute("src", url);
        } else {
          console.warn("Image not found in archive:", entry.src, "tried:", pathsToTry, "manifest:", manifestPaths.slice(0, 20));
          entry.img.removeAttribute("src");
        }
      } catch (err) {
        console.warn("Image resolve failed:", entry.src, err);
        entry.img.removeAttribute("src");
      }
    }
  }

  async function loadEpub(file) {
    showLoading("Loading " + file.name + "…");
    closePanels();
    let book = null;
    try {
      if (typeof ePub !== "function") {
        throw new Error("EPUB library failed to load. Check your connection.");
      }
      const buffer = await file.arrayBuffer();
      book = ePub(buffer);
      await book.ready;

      let epubToc = [];
      try {
        const nav = await book.loaded.navigation;
        epubToc = flattenToc(nav && nav.toc, 0, []);
      } catch (_) {}

      const sections = await extractSections(book);
      const chars = sections.reduce((n, s) => n + s.blocks.reduce((m, b) => m + b.text.length, 0), 0);
      if (chars < 32) {
        throw new Error("No readable text found (this EPUB may be image-only or DRM-protected).");
      }

      const meta = (book.packaging && book.packaging.metadata) || {};
      const title = (meta.title || file.name).trim();
      bookId = urlParams.get("id") || title || file.name;
      bookTitleEl.textContent = title;

      renderBook(sections);
      clearOverlay();
      requestAnimationFrame(() => {
        paginate(false);
        buildTOC(epubToc);
        restorePos();
        if (urlParams.get("selftest") === "1") {
          requestAnimationFrame(() => runSelftest());
        }
      });
    } catch (err) {
      console.error("EPUB load failed:", err);
      showError(err && err.message ? err.message : "Couldn't read that file.");
    } finally {
      if (book && typeof book.destroy === "function") {
        try { book.destroy(); } catch (_) {}
      }
    }
  }

  // ---------- Input: swipe + tap ----------
  let dragging = false, decided = null, startX = 0, startY = 0, baseTx = 0, startT = 0;
  let lastTouchEnd = 0;

  viewport.addEventListener("touchstart", (e) => {
    dismissCoach();
    if (isScrollMode() || e.touches.length !== 1 || total <= 1) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; startT = Date.now();
    baseTx = -(page * stride);
    decided = null; dragging = true;
  }, { passive: true });

  viewport.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (decided === null) {
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) decided = "h";
      else if (Math.abs(dy) > 12) decided = "v";
    }
    if (decided === "h") {
      content.style.transition = "none";
      e.preventDefault();
      let tx = baseTx + dx;
      const min = -((total - 1) * stride), max = 0;
      if (tx > max) tx = max + (tx - max) * 0.3;          // edge resistance
      if (tx < min) tx = min + (tx - min) * 0.3;
      content.style.transform = "translate3d(" + tx + "px,0,0)";
    }
  }, { passive: false });

  viewport.addEventListener("touchend", (e) => {
    if (!dragging) return;
    dragging = false;
    lastTouchEnd = Date.now();
    const t = e.changedTouches && e.changedTouches[0];
    const dx = t ? t.clientX - startX : 0;
    const dy = t ? t.clientY - startY : 0;
    if (decided === "h") {
      const threshold = Math.min(80, viewport.clientWidth * 0.18);
      if (dx <= -threshold) goTo(page + 1, true);
      else if (dx >= threshold) goTo(page - 1, true);
      else goTo(page, true);
    } else if (decided !== "v" && Math.abs(dx) < 10 && Math.abs(dy) < 10 && (Date.now() - startT) < 400) {
      handleTap(startX);
    }
  }, { passive: true });

  viewport.addEventListener("click", (e) => {
    dismissCoach();
    if (Date.now() - lastTouchEnd < 600) return; // ignore synthetic click after touch
    handleTap(e.clientX);
  });

  function handleTap(x) {
    // U11: don't page-turn if text is selected
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed) { dismissSelBar(); sel.removeAllRanges(); return; }
    // U7: dismiss popover on tap, don't page-turn
    if (activePopover) { dismissNotePopover(); return; }
    if (!document.body.classList.contains("chrome-hidden") &&
        (document.body.classList.contains("show-toc") || document.body.classList.contains("show-settings"))) {
      closePanels();
      return;
    }
    // U19: in scroll mode, taps only toggle chrome
    if (isScrollMode()) { toggleChrome(); return; }
    const w = viewport.clientWidth;
    if (x < w * 0.3) prev();
    else if (x > w * 0.7) next();
    else toggleChrome();
  }

  document.addEventListener("keydown", (e) => {
    if (activePopover && e.key === "Escape") { dismissNotePopover(); return; }
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.code === "Space") { e.preventDefault(); next(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); prev(); }
    else if (e.key === "Escape") closePanels();
  });

  // U7: intercept link clicks in content
  content.addEventListener("click", handleContentClick);

  // ---------- Wiring ----------
  document.getElementById("searchBtn").addEventListener("click", openSearch);
  document.getElementById("searchInput").addEventListener("input", (e) => {
    runSearch(e.target.value.trim());
  });
  tocBtn.addEventListener("click", openTOC);
  settingsBtn.addEventListener("click", openSettings);
  backdrop.addEventListener("click", closePanels);
  openBtn.addEventListener("click", () => fileInput.click());
  overlayBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (file) loadEpub(file);
  });

  progressEl.addEventListener("input", () => goTo(parseInt(progressEl.value, 10) || 0, false));

  document.getElementById("themeSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-theme]");
    if (!btn) return;
    prefs.theme = btn.dataset.theme;
    applyPrefs(); savePrefs();
  });
  document.getElementById("brightnessSlider").addEventListener("input", (e) => {
    prefs.brightness = parseInt(e.target.value, 10) / 100;
    applyPrefs(); savePrefs();
  });
  document.getElementById("warmthSlider").addEventListener("input", (e) => {
    prefs.warmth = parseInt(e.target.value, 10) / 100;
    applyPrefs(); savePrefs();
  });
  document.getElementById("fontSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-font]");
    if (!btn) return;
    prefs.font = btn.dataset.font;
    applyPrefs(); savePrefs();
    document.fonts.ready.then(() => paginate(true));
  });
  document.getElementById("weightSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-weight]");
    if (!btn) return;
    prefs.weight = btn.dataset.weight;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("imagesSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-images]");
    if (!btn) return;
    prefs.images = btn.dataset.images === "true";
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("notePopSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-notepop]");
    if (!btn) return;
    prefs.notePopovers = btn.dataset.notepop === "true";
    applyPrefs(); savePrefs();
  });
  // U15: spacing controls
  document.getElementById("marginSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-margin]");
    if (!btn) return;
    prefs.margin = btn.dataset.margin;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("paraSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-para]");
    if (!btn) return;
    prefs.paraSpacing = btn.dataset.para;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("lineHeightDown").addEventListener("click", () => changeLineHeight(-0.1));
  document.getElementById("lineHeightUp").addEventListener("click", () => changeLineHeight(0.1));
  function changeLineHeight(dir) {
    const next = Math.round(Math.max(1.0, Math.min(2.4, prefs.lineHeight + dir)) * 10) / 10;
    if (next === prefs.lineHeight) return;
    prefs.lineHeight = next;
    applyPrefs(); savePrefs(); paginate(true);
  }
  // U16: alignment & hyphenation
  document.getElementById("alignSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-align]");
    if (!btn) return;
    prefs.align = btn.dataset.align;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("hyphensSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-hyphens]");
    if (!btn) return;
    prefs.hyphens = btn.dataset.hyphens === "true";
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("selectionSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-sel]");
    if (!btn) return;
    prefs.selection = btn.dataset.sel === "true";
    if (!prefs.selection) { dismissSelBar(); const s = window.getSelection(); if (s) s.removeAllRanges(); }
    applyPrefs(); savePrefs();
  });
  document.getElementById("pageAnimSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-anim]");
    if (!btn) return;
    prefs.pageAnim = btn.dataset.anim;
    applyPrefs(); savePrefs();
  });
  document.getElementById("layoutSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-layout]");
    if (!btn) return;
    prefs.layout = btn.dataset.layout;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("columnsSeg").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-cols]");
    if (!btn) return;
    prefs.columns = btn.dataset.cols;
    applyPrefs(); savePrefs(); paginate(true);
  });
  document.getElementById("sizeDown").addEventListener("click", () => changeSize(-1));
  document.getElementById("sizeUp").addEventListener("click", () => changeSize(1));
  function changeSize(dir) {
    const next = Math.max(MIN_SIZE, Math.min(MAX_SIZE, prefs.size + dir * 2));
    if (next === prefs.size) return;
    prefs.size = next;
    applyPrefs(); savePrefs(); paginate(true);
  }

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => paginate(true), 150);
  });

  // U19: scroll mode progress tracking
  let scrollSaveTimer = null;
  viewport.addEventListener("scroll", () => {
    if (!isScrollMode()) return;
    updateProgress();
    clearTimeout(scrollSaveTimer);
    scrollSaveTimer = setTimeout(savePos, 500);
  }, { passive: true });

  // ---------- Sample book ----------
  const SAMPLE_TEXT = `It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered the rightful property of some one or other of their daughters.

"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

Mr. Bennet replied that he had not.

"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

Mr. Bennet made no answer.

"Do you not want to know who has taken it?" cried his wife impatiently.

"You want to tell me, and I have no objection to hearing it."

This was invitation enough.

"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

"What is his name?"

"Bingley."

"Is he married or single?"

"Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"`;

  function buildSample() {
    const blocks = [
      { type: "h1", text: "Pride and Prejudice" },
      { type: "h2", text: "Chapter I" },
    ];
    SAMPLE_TEXT.split(/\n{2,}/).forEach((p) => {
      const t = p.replace(/\s+/g, " ").trim();
      if (t) blocks.push({ type: "p", text: t });
    });
    return [{ href: "sample", blocks: blocks }];
  }

  // ---------- Load from URL ?src= ----------
  async function loadFromUrl(url) {
    showLoading("Fetching book…");
    closePanels();
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("Fetch failed: " + resp.status);
      const blob = await resp.blob();
      const filename = url.split("/").pop() || "book.epub";
      const file = new File([blob], filename, { type: "application/epub+zip" });
      await loadEpub(file);
    } catch (err) {
      console.error("URL load failed:", err);
      showError(err && err.message ? err.message : "Couldn't fetch that book.");
    }
  }

  // ---------- Selftest harness ----------
  function runSelftest() {
    const results = [];
    const assert = (label, ok) => { results.push((ok ? "PASS" : "FAIL") + ": " + label); };

    assert("doc.words populated", doc.words.length > 0);
    assert("doc.blocks populated", doc.blocks.length > 0);
    assert("doc.sections populated", doc.sections.length > 0);
    assert("doc.text non-empty", doc.text.length > 0);
    assert("wordCharStart aligned", doc.wordCharStart.length === doc.words.length);

    // Locator round-trip
    if (doc.words.length > 0) {
      const testIdx = Math.min(5, doc.words.length - 1);
      const loc = toLocator(testIdx);
      const resolved = resolveLocator(loc);
      assert("locator round-trip (word " + testIdx + ")", resolved === testIdx);
    }

    // exportTokens count
    const tokens = exportTokens();
    const wordTokens = tokens.filter(t => t.kind === "word");
    assert("exportTokens word count matches doc.words", wordTokens.length === doc.words.length);

    // Range geometry
    if (doc.words.length > 0) {
      const range = wordRange(0);
      assert("wordRange returns Range", range instanceof Range);
      const p = pageOfWord(0);
      assert("pageOfWord returns number >= 0", typeof p === "number" && p >= 0);
    }

    console.log("=== Reader Selftest ===");
    results.forEach(r => console.log(r));
    const failures = results.filter(r => r.startsWith("FAIL"));
    if (failures.length) {
      console.warn(failures.length + " test(s) failed");
    } else {
      console.log("All " + results.length + " tests passed");
    }
    return results;
  }

  // ---------- Init ----------
  loadPrefs();
  applyPrefs();
  // U23: respect prefers-reduced-motion
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
  if (reduceMotion.matches && !localStorage.getItem("reader:prefs")) {
    prefs.pageAnim = "none";
  }
  reduceMotion.addEventListener("change", (e) => {
    if (e.matches && prefs.pageAnim === "slide") {
      prefs.pageAnim = "none";
      applyPrefs(); savePrefs();
    }
  });
  let hinted = false;
  try { hinted = localStorage.getItem("reader:hinted") === "1"; } catch (_) {}
  if (hinted) coachEl.classList.add("hide");
  else setTimeout(dismissCoach, 6000);

  const srcUrl = urlParams.get("src");
  if (srcUrl) {
    // Load from URL (library handoff)
    loadFromUrl(srcUrl);
  } else {
    // Default sample
    bookId = urlParams.get("id") || "Pride and Prejudice (sample)";
    bookTitleEl.textContent = "Pride and Prejudice";
    renderBook(buildSample());
    requestAnimationFrame(() => {
      paginate(false);
      buildTOC([]);
      restorePos();
      if (urlParams.get("selftest") === "1") {
        requestAnimationFrame(() => runSelftest());
      }
    });
  }
})();
