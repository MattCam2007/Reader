<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d3a8a">
<meta name="build-version" content="__COMMIT_HASH__">
<title>Reader</title>
<!-- EPUB libs load deferred (not render-blocking); the service worker precaches
     them so they're available offline and never gate first paint. -->
<script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<link rel="stylesheet" href="css/reader.css">
<link rel="stylesheet" href="css/rsvp.css">
<link rel="stylesheet" href="css/tts.css">
<link rel="modulepreload" href="js/core/constants.js">
<link rel="modulepreload" href="js/core/events.js">
<link rel="modulepreload" href="js/core/prefs.js">
<link rel="modulepreload" href="js/core/state.js">
<link rel="modulepreload" href="js/mode-switcher.js">
</head>
<body class="paused">
  <div id="app"></div>
  <input type="file" id="fileInput" accept=".epub,application/epub+zip" hidden>
<script type="module" src="js/mode-switcher.js"></script>
<script>
// Register the service worker (versioned cache + offline). On a new deploy the
// SW updates; show a small toast prompting a reload to pick up the new build.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateToast(reg);
        });
      });
    }).catch(() => {});
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });
  });
}
function showUpdateToast(reg) {
  if (document.getElementById('sw-update-toast')) return;
  const t = document.createElement('div');
  t.id = 'sw-update-toast';
  t.style.cssText = 'position:fixed;left:50%;bottom:1.25rem;transform:translateX(-50%);z-index:10000;background:#222;color:#fff;padding:.6rem .9rem;border-radius:.6rem;font:14px/1.4 system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;gap:.75rem;align-items:center;';
  const msg = document.createElement('span');
  msg.textContent = 'A new version is available.';
  const btn = document.createElement('button');
  btn.textContent = 'Reload';
  btn.style.cssText = 'background:#4a8;color:#04130c;border:0;padding:.35rem .7rem;border-radius:.4rem;font:inherit;font-weight:600;cursor:pointer;';
  btn.addEventListener('click', () => { if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING'); t.remove(); });
  t.appendChild(msg);
  t.appendChild(btn);
  document.body.appendChild(t);
}
</script>
</body>
</html>
