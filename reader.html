<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d3a8a">
<meta name="build-version" content="__COMMIT_HASH__">
<title>Reader</title>
<!-- EPUB libs load deferred (not render-blocking); the service worker precaches
     them so they're available offline and never gate first paint. -->
<script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<link rel="stylesheet" href="css/reader.css">
<link rel="stylesheet" href="css/rsvp.css">
<link rel="stylesheet" href="css/tts.css">
<link rel="modulepreload" href="js/core/constants.js">
<link rel="modulepreload" href="js/core/events.js">
<link rel="modulepreload" href="js/core/prefs.js">
<link rel="modulepreload" href="js/core/state.js">
<link rel="modulepreload" href="js/mode-switcher.js">
</head>
<body class="paused">
  <div id="bgImageLayer"></div>
  <div id="app"></div>
  <input type="file" id="fileInput" accept=".epub,application/epub+zip" hidden>
<script type="module" src="js/mode-switcher.js"></script>
<script type="module">
  import { registerServiceWorker } from './js/core/sw-register.js';
  registerServiceWorker();
</script>
</body>
</html>
